<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;display=swap');
      text { font-family: 'DM Sans', 'Arial', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" rx="12" fill="#FAFAFA" stroke="#E5E5E5" stroke-width="1"/>

  <!-- === STEP 1 === -->
  <rect x="28" y="28" width="224" height="264" rx="8" fill="#fff" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Step number -->
  <circle cx="60" cy="56" r="16" fill="#000"/>
  <text x="60" y="61" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">1</text>
  <text x="84" y="61" fill="#000" font-size="15" font-weight="700">Show</text>

  <!-- Phone with QR -->
  <rect x="94" y="86" width="80" height="120" rx="10" fill="#000"/>
  <rect x="100" y="98" width="68" height="96" rx="2" fill="#fff"/>
  <!-- QR dots -->
  <rect x="112" y="108" width="14" height="14" fill="#000"/>
  <rect x="132" y="108" width="14" height="14" fill="#000"/>
  <rect x="112" y="128" width="14" height="14" fill="#000"/>
  <rect x="132" y="128" width="6" height="6" fill="#000"/>
  <rect x="144" y="122" width="6" height="6" fill="#000"/>
  <rect x="152" y="108" width="14" height="14" fill="#000"/>
  <rect x="152" y="128" width="14" height="14" fill="#000"/>
  <rect x="112" y="150" width="6" height="6" fill="#000"/>
  <rect x="124" y="150" width="6" height="6" fill="#000"/>
  <rect x="136" y="150" width="6" height="6" fill="#000"/>
  <rect x="148" y="150" width="6" height="6" fill="#000"/>
  <rect x="160" y="150" width="6" height="6" fill="#000"/>
  <!-- Label -->
  <rect x="110" y="162" width="48" height="16" rx="3" fill="#000"/>
  <text x="134" y="174" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">HELLO</text>
  <!-- Notch -->
  <rect x="122" y="89" width="24" height="5" rx="2.5" fill="#222"/>

  <!-- Person A figure -->
  <circle cx="60" cy="106" r="14" fill="#000"/>
  <rect x="50" y="124" width="20" height="28" rx="4" fill="#000"/>
  <rect x="54" y="152" width="5" height="16" rx="2" fill="#000"/>
  <rect x="61" y="152" width="5" height="16" rx="2" fill="#000"/>
  <text x="60" y="182" text-anchor="middle" fill="#888" font-size="9" font-weight="500">Person A</text>

  <!-- Description -->
  <text x="44" y="220" fill="#444" font-size="12">Person A opens IRLid.</text>
  <text x="44" y="238" fill="#444" font-size="12">A signed HELLO QR</text>
  <text x="44" y="256" fill="#444" font-size="12">appears with their key,</text>
  <text x="44" y="274" fill="#444" font-size="12">location &amp; timestamp.</text>

  <!-- Arrow 1→2 -->
  <line x1="260" y1="160" x2="284" y2="160" stroke="#000" stroke-width="2"/>
  <polygon points="284,155 296,160 284,165" fill="#000"/>

  <!-- === STEP 2 === -->
  <rect x="300" y="28" width="224" height="264" rx="8" fill="#fff" stroke="#E5E5E5" stroke-width="1"/>

  <circle cx="332" cy="56" r="16" fill="#000"/>
  <text x="332" y="61" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">2</text>
  <text x="356" y="61" fill="#000" font-size="15" font-weight="700">Scan &amp; Accept</text>

  <!-- Person B with phone scanning -->
  <circle cx="338" cy="106" r="14" fill="#555"/>
  <rect x="328" y="124" width="20" height="28" rx="4" fill="#555"/>
  <rect x="332" y="152" width="5" height="16" rx="2" fill="#555"/>
  <rect x="339" y="152" width="5" height="16" rx="2" fill="#555"/>
  <text x="338" y="182" text-anchor="middle" fill="#888" font-size="9" font-weight="500">Person B</text>

  <!-- Phone scanning then showing accept -->
  <rect x="380" y="86" width="80" height="120" rx="10" fill="#000"/>
  <rect x="386" y="98" width="68" height="96" rx="2" fill="#fff"/>
  <!-- Accept QR dots -->
  <rect x="398" y="108" width="14" height="14" fill="#555"/>
  <rect x="418" y="108" width="14" height="14" fill="#555"/>
  <rect x="398" y="128" width="14" height="14" fill="#555"/>
  <rect x="438" y="108" width="14" height="14" fill="#555"/>
  <rect x="438" y="128" width="14" height="14" fill="#555"/>
  <rect x="418" y="128" width="6" height="6" fill="#555"/>
  <rect x="398" y="150" width="6" height="6" fill="#555"/>
  <rect x="410" y="150" width="6" height="6" fill="#555"/>
  <rect x="422" y="150" width="6" height="6" fill="#555"/>
  <rect x="434" y="150" width="6" height="6" fill="#555"/>
  <rect x="446" y="150" width="6" height="6" fill="#555"/>
  <!-- Label -->
  <rect x="396" y="162" width="52" height="16" rx="3" fill="#555"/>
  <text x="422" y="174" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">ACCEPT</text>
  <rect x="408" y="89" width="24" height="5" rx="2.5" fill="#222"/>

  <!-- Description -->
  <text x="316" y="220" fill="#444" font-size="12">B scans A's QR with</text>
  <text x="316" y="238" fill="#444" font-size="12">their camera. IRLid</text>
  <text x="316" y="256" fill="#444" font-size="12">creates a signed Accept</text>
  <text x="316" y="274" fill="#444" font-size="12">QR bound to A's HELLO.</text>

  <!-- Arrow 2→3 -->
  <line x1="532" y1="160" x2="556" y2="160" stroke="#000" stroke-width="2"/>
  <polygon points="556,155 568,160 556,165" fill="#000"/>

  <!-- === STEP 3 === -->
  <rect x="572" y="28" width="204" height="264" rx="8" fill="#fff" stroke="#E5E5E5" stroke-width="1"/>

  <circle cx="604" cy="56" r="16" fill="#000"/>
  <text x="604" y="61" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">3</text>
  <text x="628" y="61" fill="#000" font-size="15" font-weight="700">Verify</text>

  <!-- Receipt icon -->
  <rect x="622" y="84" width="100" height="106" rx="4" fill="#fff" stroke="#000" stroke-width="2"/>
  <rect x="622" y="84" width="100" height="28" rx="4" fill="#000"/>
  <rect x="622" y="108" width="100" height="4" fill="#000"/>
  <text x="672" y="103" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">RECEIPT</text>
  <!-- Checkmark -->
  <circle cx="672" cy="140" r="14" fill="none" stroke="#2d8" stroke-width="2.5"/>
  <path d="M664 140 L669 145 L681 133" stroke="#2d8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Receipt lines -->
  <rect x="640" y="162" width="64" height="4" rx="2" fill="#E5E5E5"/>
  <rect x="640" y="172" width="48" height="4" rx="2" fill="#E5E5E5"/>
  <!-- Verification bar -->
  <rect x="638" y="182" width="68" height="12" rx="3" fill="#2d8"/>

  <!-- Both person icons -->
  <circle cx="642" cy="208" r="8" fill="#000"/>
  <circle cx="702" cy="208" r="8" fill="#555"/>
  <line x1="654" y1="208" x2="690" y2="208" stroke="#CCC" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Description -->
  <text x="588" y="238" fill="#444" font-size="12">A scans B's Accept.</text>
  <text x="588" y="256" fill="#444" font-size="12">Both signatures are</text>
  <text x="588" y="274" fill="#444" font-size="12">combined into a verified</text>
  <text x="588" y="292" fill="#444" font-size="12">co-presence receipt.</text>
</svg>
