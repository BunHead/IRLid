<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;display=swap');
      text { font-family: 'DM Sans', 'Arial', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="#FAFAFA" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Step badge -->
  <rect x="24" y="24" width="88" height="36" rx="4" fill="#000"/>
  <text x="68" y="47" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">STEP 1</text>

  <!-- Person A (left side) -->
  <!-- Head -->
  <circle cx="200" cy="140" r="28" fill="#000"/>
  <!-- Body -->
  <rect x="180" y="174" width="40" height="56" rx="6" fill="#000"/>
  <!-- Arms -->
  <rect x="152" y="180" width="28" height="10" rx="5" fill="#000"/>
  <rect x="220" y="180" width="28" height="10" rx="5" fill="#000"/>
  <!-- Legs -->
  <rect x="184" y="230" width="12" height="32" rx="4" fill="#000"/>
  <rect x="204" y="230" width="12" height="32" rx="4" fill="#000"/>
  <!-- Label -->
  <text x="200" y="290" text-anchor="middle" fill="#000" font-size="16" font-weight="700">Person A</text>
  <text x="200" y="310" text-anchor="middle" fill="#666" font-size="13" font-weight="400">Initiator</text>

  <!-- Phone showing QR -->
  <rect x="310" y="80" width="180" height="240" rx="16" fill="#000" stroke="#333" stroke-width="2"/>
  <rect x="322" y="104" width="156" height="196" rx="4" fill="#fff"/>
  <!-- QR pattern (simplified) -->
  <rect x="342" y="124" width="24" height="24" fill="#000"/>
  <rect x="342" y="124" width="8" height="8" fill="#000"/>
  <rect x="358" y="124" width="8" height="8" fill="#000"/>
  <rect x="342" y="140" width="8" height="8" fill="#000"/>
  <rect x="374" y="124" width="24" height="24" fill="#000"/>
  <rect x="342" y="156" width="24" height="24" fill="#000"/>
  <rect x="374" y="156" width="8" height="8" fill="#000"/>
  <rect x="390" y="140" width="8" height="8" fill="#000"/>
  <rect x="342" y="188" width="8" height="8" fill="#000"/>
  <rect x="358" y="188" width="8" height="8" fill="#000"/>
  <rect x="374" y="188" width="8" height="8" fill="#000"/>
  <rect x="390" y="188" width="8" height="8" fill="#000"/>

  <!-- More QR blocks -->
  <rect x="414" y="124" width="8" height="8" fill="#000"/>
  <rect x="430" y="124" width="24" height="24" fill="#000"/>
  <rect x="414" y="140" width="8" height="8" fill="#000"/>
  <rect x="430" y="156" width="24" height="24" fill="#000"/>
  <rect x="414" y="172" width="8" height="8" fill="#000"/>
  <rect x="430" y="188" width="8" height="8" fill="#000"/>
  <rect x="446" y="188" width="8" height="8" fill="#000"/>

  <!-- "HELLO" label on phone -->
  <rect x="346" y="210" width="108" height="28" rx="4" fill="#000"/>
  <text x="400" y="229" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">HELLO QR</text>

  <!-- Camera notch -->
  <rect x="378" y="86" width="44" height="10" rx="5" fill="#222"/>

  <!-- Arrow from person to phone -->
  <line x1="248" y1="190" x2="304" y2="190" stroke="#000" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="304,185 314,190 304,195" fill="#000"/>

  <!-- Right side description -->
  <rect x="530" y="100" width="240" height="200" rx="8" fill="#fff" stroke="#E5E5E5" stroke-width="1"/>
  <text x="650" y="136" text-anchor="middle" fill="#000" font-size="16" font-weight="700">Show Your QR</text>
  <line x1="560" y1="150" x2="740" y2="150" stroke="#E5E5E5" stroke-width="1"/>
  <text x="560" y="174" fill="#444" font-size="13">Person A opens IRLid.</text>
  <text x="560" y="196" fill="#444" font-size="13">A signed HELLO QR code</text>
  <text x="560" y="218" fill="#444" font-size="13">appears automatically,</text>
  <text x="560" y="240" fill="#444" font-size="13">containing their public key,</text>
  <text x="560" y="262" fill="#444" font-size="13">GPS location, timestamp,</text>
  <text x="560" y="284" fill="#444" font-size="13">and a cryptographic nonce.</text>

  <!-- Decorative dots -->
  <circle cx="36" cy="380" r="3" fill="#DDD"/>
  <circle cx="50" cy="380" r="3" fill="#CCC"/>
  <circle cx="64" cy="380" r="3" fill="#BBB"/>
</svg>
