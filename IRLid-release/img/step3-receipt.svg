<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;display=swap');
      text { font-family: 'DM Sans', 'Arial', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="#FAFAFA" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Step badge -->
  <rect x="24" y="24" width="88" height="36" rx="4" fill="#000"/>
  <text x="68" y="47" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">STEP 3</text>

  <!-- Person A (left side) -->
  <circle cx="110" cy="140" r="28" fill="#000"/>
  <rect x="90" y="174" width="40" height="56" rx="6" fill="#000"/>
  <rect x="62" y="180" width="28" height="10" rx="5" fill="#000"/>
  <rect x="130" y="180" width="28" height="10" rx="5" fill="#000"/>
  <rect x="94" y="230" width="12" height="32" rx="4" fill="#000"/>
  <rect x="114" y="230" width="12" height="32" rx="4" fill="#000"/>
  <text x="110" y="290" text-anchor="middle" fill="#000" font-size="16" font-weight="700">Person A</text>
  <text x="110" y="310" text-anchor="middle" fill="#666" font-size="13" font-weight="400">Initiator</text>

  <!-- Phone A scanning -->
  <rect x="180" y="100" width="120" height="170" rx="12" fill="#000" stroke="#333" stroke-width="2"/>
  <rect x="190" y="118" width="100" height="134" rx="3" fill="#2a2a3a"/>
  <!-- Camera viewfinder -->
  <path d="M204 132 L204 140 M204 132 L212 132" stroke="#0f0" stroke-width="2" fill="none"/>
  <path d="M276 132 L276 140 M276 132 L268 132" stroke="#0f0" stroke-width="2" fill="none"/>
  <path d="M204 238 L204 230 M204 238 L212 238" stroke="#0f0" stroke-width="2" fill="none"/>
  <path d="M276 238 L276 230 M276 238 L268 238" stroke="#0f0" stroke-width="2" fill="none"/>
  <!-- QR in viewfinder -->
  <rect x="225" y="168" width="30" height="30" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="229" y="172" width="6" height="6" fill="rgba(255,255,255,0.6)"/>
  <rect x="241" y="172" width="6" height="6" fill="rgba(255,255,255,0.6)"/>
  <rect x="229" y="184" width="6" height="6" fill="rgba(255,255,255,0.6)"/>
  <rect x="241" y="184" width="6" height="6" fill="rgba(255,255,255,0.6)"/>
  <rect x="210" y="104" width="36" height="8" rx="4" fill="#222"/>

  <!-- Arrow to receipt -->
  <line x1="310" y1="185" x2="356" y2="185" stroke="#000" stroke-width="2"/>
  <polygon points="356,180 368,185 356,190" fill="#000"/>

  <!-- Receipt document -->
  <rect x="376" y="78" width="168" height="236" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <!-- Receipt header -->
  <rect x="376" y="78" width="168" height="44" rx="6" fill="#000"/>
  <rect x="376" y="106" width="168" height="16" fill="#000"/>
  <text x="460" y="105" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">RECEIPT</text>
  <!-- Checkmark -->
  <circle cx="460" cy="160" r="24" fill="none" stroke="#2d8" stroke-width="3"/>
  <path d="M446 160 L456 170 L476 150" stroke="#2d8" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Receipt lines -->
  <rect x="400" y="198" width="112" height="6" rx="3" fill="#E5E5E5"/>
  <rect x="400" y="212" width="90" height="6" rx="3" fill="#E5E5E5"/>
  <rect x="400" y="226" width="100" height="6" rx="3" fill="#E5E5E5"/>
  <!-- Verification bar -->
  <rect x="396" y="246" width="128" height="20" rx="4" fill="#2d8"/>
  <text x="460" y="260" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">VERIFIED 100%</text>
  <!-- Person icons on receipt -->
  <circle cx="424" y="280" r="8" fill="#000"/>
  <text x="436" y="284" fill="#000" font-size="9" font-weight="500">A</text>
  <circle cx="476" cy="280" r="8" fill="#555"/>
  <text x="488" y="284" fill="#555" font-size="9" font-weight="500">B</text>
  <line x1="442" y1="280" x2="468" y2="280" stroke="#CCC" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Right side description -->
  <rect x="574" y="100" width="200" height="200" rx="8" fill="#fff" stroke="#E5E5E5" stroke-width="1"/>
  <text x="674" y="136" text-anchor="middle" fill="#000" font-size="16" font-weight="700">Receipt Created</text>
  <line x1="596" y1="150" x2="754" y2="150" stroke="#E5E5E5" stroke-width="1"/>
  <text x="596" y="174" fill="#444" font-size="13">Person A opens Scan,</text>
  <text x="596" y="196" fill="#444" font-size="13">scans B's Accept QR.</text>
  <text x="596" y="224" fill="#444" font-size="13">Both signatures, GPS,</text>
  <text x="596" y="246" fill="#444" font-size="13">and timestamps are</text>
  <text x="596" y="268" fill="#444" font-size="13">combined into a signed</text>
  <text x="596" y="290" fill="#444" font-size="13">receipt and uploaded.</text>

  <!-- Decorative dots -->
  <circle cx="36" cy="380" r="3" fill="#DDD"/>
  <circle cx="50" cy="380" r="3" fill="#CCC"/>
  <circle cx="64" cy="380" r="3" fill="#BBB"/>
</svg>
