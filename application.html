<!DOCTYPE html>
<!-- Deploy 31 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Scan</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    :root{
      --black:#000;
      --white:#fff;
      --mobile-nav-h:124px;
      --side-pad:12px;
      --top-gap:10px;
    }

    html,body{height:100%;}
    body{margin:0;background:#fff;overflow-x:hidden;}

    header.site-header{width:100%;background:#fff;}
    .brand-wrap{padding:10px 14px 0;}
    .brand{display:inline-flex;text-decoration:none;color:inherit;align-items:center;}

    nav.site-nav{
      width:100%;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:0;
      padding:0;
      margin:0;
      position:sticky;
      top:0;
      z-index:1000;
    }

    #accountSlot{ display: contents; }

    a.nav-btn,summary.nav-btn{
      border:0;
      background:#000;
      color:#fff;
      padding:10px 14px;
      font-weight:700;
      border-radius:0;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      white-space:nowrap;
    }
    a.nav-btn:hover,summary.nav-btn:hover{background:#111;}

    details.nav-dropdown{position:relative;}
    details.nav-dropdown>summary{list-style:none;}
    details.nav-dropdown>summary::-webkit-details-marker{display:none;}

    .dropdown-menu{
      position:absolute;
      top:100%;
      left:0;
      min-width:180px;
      background:#111;
      border:0;
      padding:0;
      margin:0;
      z-index:1200;
    }
    .dropdown-menu a{
      display:block;
      width:100%;
      text-align:left;
      padding:12px 14px;
      color:#fff;
      background:#111;
      border:0;
      text-decoration:none;
      font-weight:700;
      border-top:1px solid rgba(255,255,255,0.06);
      box-sizing:border-box;
    }
    .dropdown-menu a:hover{ background:#000; }

    main.page-main{
      max-width:980px;
      margin:0 auto;
      padding:var(--top-gap) var(--side-pad) 20px;
      box-sizing:border-box;
    }

    .small{text-align:center; margin:8px 0;}

    #responseArea{
      display:none;
      text-align:center;
      margin-top:10px;
      margin-bottom:10px;
    }
    #responseQr canvas, #responseQr img{
      display:block;
      margin:0 auto;
      max-width:100%;
      height:auto;
      image-rendering: pixelated;
    }

    #scanner{
      width:min(92vw,460px);
      height:min(92vw,460px);
      margin:10px auto 8px;
      border:2px dashed #999;
      display:flex;
      align-items:center;
      justify-content:center;
      box-sizing:border-box;
      overflow:hidden;
      background:#f8f8f8;
      position:relative;
    }

    /* Our own video when using BarcodeDetector */
    #nativeVideo{
      width:100%;
      height:100%;
      object-fit:cover;
      background:#000;
    }

    .controls{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin:10px 0;
    }

    /* Diagnostics UI (hidden unless enabled) */
    .diag-wrap{
      max-width:980px;
      margin:12px auto 0;
      border:1px solid #ddd;
      padding:10px 12px;
      box-sizing:border-box;
    }
    .diag-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .diag-title{ font-weight:800; }
    .diag-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    #diagText{
      margin-top:10px;
      white-space:pre-wrap;
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:12px;
      line-height:1.35;
      background:#fafafa;
      border:1px solid #eee;
      padding:10px;
      overflow:auto;
      max-height:260px;
    }

    #debug{
      display:none;
      white-space:pre-wrap;
      font-family:monospace;
      font-size:12px;
      border:1px solid #ddd;
      padding:10px;
      margin-top:12px;
      box-sizing:border-box;
    }

    @media(max-width:720px){
      .brand-wrap{padding:4px var(--side-pad) 0;}
      #logo{max-width:72vw;max-height:90px;width:auto;height:auto;display:block;}

      nav.site-nav{
        position:fixed;
        top:auto;
        bottom:env(safe-area-inset-bottom,0);
        left:0;
        right:0;
        height:var(--mobile-nav-h);
        display:grid;
        grid-template-columns:1fr 1fr;
        grid-template-rows:1fr 1fr;
        z-index:2000;
      }

      a.nav-btn,summary.nav-btn{
        width:100%;
        height:100%;
        padding:0;
        font-size:18px;
      }

      .dropdown-menu{
        position:fixed;
        left:0;
        right:0;
        top:auto;
        bottom:calc(var(--mobile-nav-h) + env(safe-area-inset-bottom,0));
      }

      body{
        padding-bottom:calc(var(--mobile-nav-h) + env(safe-area-inset-bottom,0));
      }
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="brand-wrap">
    <a class="brand" href="index.html" aria-label="IRLid Home">
      <img src="logo.png" alt="IRLid Logo" id="logo">
    </a>
  </div>

  <nav class="site-nav" aria-label="Primary">
    <a class="nav-btn" href="index.html">Home</a>
    <a class="nav-btn" href="application.html">Scan</a>

    <details class="nav-dropdown">
      <summary class="nav-btn">About ▼</summary>
      <div class="dropdown-menu" role="menu" aria-label="About menu">
        <a href="about.html">About</a>
        <a href="features.html">Features</a>
        <a href="contact.html">Contact</a>
      </div>
    </details>

    <span id="accountSlot"></span>
  </nav>
</header>

<main class="page-main">
  <p id="status" class="small">Ready.</p>

  <div class="controls">
    <button class="btn" id="startBtn">Start Scanner</button>
    <button class="btn secondary" id="stopBtn">Stop</button>
  </div>

  <div id="responseArea">
    <h3 id="responseTitle">Your Return QR</h3>
    <div class="qr-box" id="responseQr"></div>
    <p class="small" id="responseHint" style="margin-top:8px;">Show this to the other person to scan.</p>
  </div>

  <div id="scanner"></div>

  <div class="small">
    <label for="cameraSelect"><b>Camera:</b></label><br>
    <select id="cameraSelect"></select>
  </div>

  <!-- Diagnostics panel (hidden unless enabled) -->
  <div class="diag-wrap" id="diagWrap" aria-label="Diagnostics" style="display:none;">
    <div class="diag-head">
      <div class="diag-title">Diagnostics</div>
      <div class="diag-actions">
        <button class="btn secondary" id="diagRefreshBtn" type="button">Refresh Diagnostics</button>
        <button class="btn secondary" id="diagCopyBtn" type="button">Copy Diagnostics</button>
      </div>
    </div>
    <div id="diagText">Diagnostics not yet collected.</div>
  </div>

  <div id="debug"></div>
</main>

<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script src="js/sign.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

<!-- Keep html5-qrcode loaded as fallback -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<script src="js/qr.js?v=deploy23"></script>

<script>
  // thresholds (as requested)
  const IRLID_TS_TOL_S = 60;
  const IRLID_DIST_TOL_M = 2;

  // storage keys
  const KEY_SELF  = "irlid_resp_self";
  const KEY_OTHER = "irlid_resp_other";
  const KEY_PREF_CAM = "irlid_preferred_camera_id";

  // diagnostics flags (future Settings will flip these)
  const KEY_SETTINGS = "irlid_settings";
  const KEY_DIAG_SIMPLE = "irlid_diagnostics";

  const urlParams = new URLSearchParams(location.search);
  const debugMode = urlParams.get("debug") === "1";        // existing
  const diagQuery = urlParams.get("diag") === "1";         // new explicit toggle

  const debugEl = document.getElementById("debug");
  if (debugMode) debugEl.style.display = "block";

  function log(...args){
    if (!debugMode) return;
    debugEl.textContent += args.map(a => (typeof a === "string" ? a : JSON.stringify(a, null, 2))).join(" ") + "\n";
  }

  function isDiagnosticsEnabled(){
    if (debugMode || diagQuery) return true;

    // Future Settings object: { diagnostics: true }
    try{
      const raw = localStorage.getItem(KEY_SETTINGS);
      if (raw) {
        const obj = JSON.parse(raw);
        if (obj && obj.diagnostics === true) return true;
      }
    }catch{}

    // Simple flag: "1"
    try{
      return localStorage.getItem(KEY_DIAG_SIMPLE) === "1";
    }catch{
      return false;
    }
  }

  const diagnosticsEnabled = isDiagnosticsEnabled();
  const diagWrap = document.getElementById("diagWrap");
  if (diagnosticsEnabled) {
    diagWrap.style.display = "block";
  }

  // helpers: b64url JSON decode (supports raw b64url JSON or full URL/hash)
  function b64urlToBytes(str){
    str = (str || "").replace(/-/g, "+").replace(/_/g, "/");
    while (str.length % 4) str += "=";
    const bin = atob(str);
    const out = new Uint8Array(bin.length);
    for (let i=0;i<bin.length;i++) out[i] = bin.charCodeAt(i);
    return out;
  }
  function parseB64urlJson(str){
    const bytes = b64urlToBytes(str);
    const json = new TextDecoder().decode(bytes);
    return JSON.parse(json);
  }

  function scoreRearLabel(label){
    const s = (label || "").toLowerCase();
    let score = 0;
    if (s.includes("back")) score += 80;
    if (s.includes("rear")) score += 80;
    if (s.includes("environment")) score += 80;
    if (s.includes("wide")) score += 20;
    if (s.includes("ultra")) score += 10;

    if (s.includes("front")) score -= 120;
    if (s.includes("user")) score -= 60;
    if (s.includes("face")) score -= 60;
    if (s.includes("selfie")) score -= 120;
    return score;
  }

  function getStoredPreferredCameraId(){
    try{
      const v = localStorage.getItem(KEY_PREF_CAM);
      return v && v.trim() ? v.trim() : null;
    }catch{
      return null;
    }
  }

  function setStoredPreferredCameraId(id){
    try{
      localStorage.setItem(KEY_PREF_CAM, id || "");
    }catch{}
  }

  // HELLO mode
  const hash = location.hash || "";
  const helloMatch = hash.match(/HELLO=([^&]+)/);
  const hello = helloMatch ? helloMatch[1] : null;

  const statusEl = document.getElementById("status");
  const responseArea = document.getElementById("responseArea");
  const responseQrElId = "responseQr";
  const responseTitle = document.getElementById("responseTitle");
  const responseHint = document.getElementById("responseHint");

  // Always generate a Return QR immediately in HELLO mode (Person B)
  if (hello) {
    try{
      responseArea.style.display = "block";
      responseTitle.textContent = "Your Return QR";
      responseHint.textContent = "Show this to the other person to scan.";

      if (typeof makeReturnForHello !== "function") {
        throw new Error("makeReturnForHello() missing (js/qr.js not loaded)");
      }
      const returnObj = makeReturnForHello(hello);
      const encoded = btoa(JSON.stringify(returnObj)).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/g,"");
      const url = new URL(location.href);
      url.hash = "RESP=" + encoded;

      makeQR(responseQrElId, url.toString(), 360);
      statusEl.textContent = "Ready (HELLO mode).";
    }catch(e){
      statusEl.textContent = "Error: " + e;
      log(e);
    }
  }

  // ---- UI / state ----
  const scannerEl = document.getElementById("scanner");
  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");
  const cameraSelect = document.getElementById("cameraSelect");

  // Diagnostics elements (only used if enabled)
  const diagTextEl = diagnosticsEnabled ? document.getElementById("diagText") : null;
  const diagRefreshBtn = diagnosticsEnabled ? document.getElementById("diagRefreshBtn") : null;
  const diagCopyBtn = diagnosticsEnabled ? document.getElementById("diagCopyBtn") : null;

  function setStatus(msg){ statusEl.textContent = msg; }

  // ---- scanner engines ----
  let engine = "none"; // "native" | "html5qrcode" | "none"
  let isScanning = false;

  // Native engine (BarcodeDetector)
  let nativeStream = null;
  let nativeVideoEl = null;
  let nativeDetector = null;
  let nativeRaf = 0;
  let nativeLastText = "";

  // html5-qrcode engine fallback
  let html5QrCode = null;

  // Diagnostics: what we attempted
  let lastStartAttempt = { engine: "none", mode: "none", detail: "" };

  // ---- camera listing ----
  async function listCamerasAndSelectDefault(){
    if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
      throw new Error("enumerateDevices not available.");
    }
    const all = await navigator.mediaDevices.enumerateDevices();
    const devices = all.filter(d => d.kind === "videoinput");

    cameraSelect.innerHTML = "";
    for (const d of devices){
      const opt = document.createElement("option");
      opt.value = d.deviceId;
      opt.textContent = d.label || d.deviceId;
      cameraSelect.appendChild(opt);
    }

    if (!devices.length) return devices;

    const stored = getStoredPreferredCameraId();
    if (stored && devices.some(d => d.deviceId === stored)){
      cameraSelect.value = stored;
      return devices;
    }

    const ranked = devices
      .map((d, idx) => ({ id: d.deviceId, label: d.label || "", idx, score: scoreRearLabel(d.label || "") }))
      .sort((a,b) => (b.score !== a.score ? b.score - a.score : b.idx - a.idx));

    const best = ranked[0];
    const chosenId = (best && best.score > 0) ? best.id : devices[devices.length - 1].deviceId;
    cameraSelect.value = chosenId;
    setStoredPreferredCameraId(chosenId);

    return devices;
  }

  // ---- QR parsing / processing ----
  function extractRespFromText(text){
    if (!text) return null;

    const m1 = text.match(/RESP=([A-Za-z0-9\-_]+)/);
    if (m1) return parseB64urlJson(m1[1]);

    if (/^[A-Za-z0-9\-_]+$/.test(text) && text.length > 40){
      try { return parseB64urlJson(text); } catch {}
    }

    if (text.trim().startsWith("{")){
      try { return JSON.parse(text); } catch {}
    }

    return null;
  }

  async function handleDecodedText(decodedText){
    log("scan:", decodedText);

    const resp = extractRespFromText(decodedText);
    if (resp && resp.type === "response"){
      try{
        if (typeof processScannedResponse !== "function"){
          throw new Error("processScannedResponse() missing (js/qr.js not loaded)");
        }
        const out = await processScannedResponse(resp, { tsTolS: IRLID_TS_TOL_S, distTolM: IRLID_DIST_TOL_M });
        log("processed:", out);

        if (out && out.self) localStorage.setItem(KEY_SELF, JSON.stringify(out.self));
        if (out && out.other) localStorage.setItem(KEY_OTHER, JSON.stringify(out.other));

        location.href = "receipt.html";
      }catch(e){
        setStatus("Error processing QR: " + e);
        log(e);
      }
    } else {
      setStatus("QR detected (not a response).");
    }
  }

  // ---- diagnostics (no-ops unless enabled) ----
  function safeJson(obj){
    try { return JSON.stringify(obj, null, 2); } catch { return String(obj); }
  }

  function getActiveNativeTrackInfo(){
    if (!nativeVideoEl) return { ok: false, reason: "No native video element." };
    const stream = nativeVideoEl.srcObject;
    if (!stream) return { ok: false, reason: "Native video has no srcObject." };
    const tracks = stream.getVideoTracks ? stream.getVideoTracks() : [];
    if (!tracks.length) return { ok: false, reason: "Native stream has no video tracks." };
    const t = tracks[0];
    return {
      ok: true,
      trackLabel: t.label || "",
      trackId: t.id || "",
      settings: (t.getSettings ? t.getSettings() : {}),
      constraints: (t.getConstraints ? t.getConstraints() : {}),
      capabilities: (t.getCapabilities ? t.getCapabilities() : {})
    };
  }

  function getActiveHtml5TrackInfo(){
    const video = document.querySelector("#scanner video");
    if (!video) return { ok: false, reason: "No <video> found under #scanner." };
    const stream = video.srcObject;
    if (!stream) return { ok: false, reason: "html5 video has no srcObject." };
    const tracks = stream.getVideoTracks ? stream.getVideoTracks() : [];
    if (!tracks.length) return { ok: false, reason: "html5 stream has no video tracks." };
    const t = tracks[0];
    return {
      ok: true,
      trackLabel: t.label || "",
      trackId: t.id || "",
      settings: (t.getSettings ? t.getSettings() : {}),
      constraints: (t.getConstraints ? t.getConstraints() : {}),
      capabilities: (t.getCapabilities ? t.getCapabilities() : {})
    };
  }

  async function getEnumeratedDevices(){
    if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
      return { ok: false, reason: "enumerateDevices not available." };
    }
    try{
      const all = await navigator.mediaDevices.enumerateDevices();
      const vids = all.filter(d => d.kind === "videoinput").map(d => ({
        kind: d.kind,
        deviceId: d.deviceId,
        groupId: d.groupId,
        label: d.label
      }));
      return { ok: true, videoinput: vids, total: all.length };
    }catch(e){
      return { ok: false, reason: String(e) };
    }
  }

  async function refreshDiagnostics(){
    if (!diagnosticsEnabled) return null;

    const ua = navigator.userAgent || "";
    const selectedId = cameraSelect.value || "";
    const storedId = getStoredPreferredCameraId() || "";
    const enumDevs = await getEnumeratedDevices();

    const payload = {
      time: new Date().toISOString(),
      locationHref: location.href,
      userAgent: ua,
      isSecureContext: window.isSecureContext,
      engine,
      isScanning,
      lastStartAttempt,
      cameraSelect: {
        selectedId,
        selectedText: (cameraSelect.options[cameraSelect.selectedIndex] ? cameraSelect.options[cameraSelect.selectedIndex].textContent : ""),
        storedPreferredId: storedId
      },
      features: {
        barcodeDetector: (typeof BarcodeDetector !== "undefined")
      },
      activeVideoTrack: (engine === "native") ? getActiveNativeTrackInfo() : getActiveHtml5TrackInfo(),
      enumerateDevices: enumDevs,
      lastNativeDecoded: nativeLastText ? (nativeLastText.slice(0, 160) + (nativeLastText.length > 160 ? "…" : "")) : ""
    };

    diagTextEl.textContent = safeJson(payload);
    if (debugMode) log("diagnostics:", payload);
    return payload;
  }

  if (diagnosticsEnabled) {
    diagRefreshBtn.addEventListener("click", async () => {
      try{ await refreshDiagnostics(); } catch (e) { diagTextEl.textContent = "Diagnostics error: " + e; }
    });

    diagCopyBtn.addEventListener("click", async () => {
      try{
        const text = diagTextEl.textContent || "";
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
          setStatus("Diagnostics copied.");
        } else {
          const range = document.createRange();
          range.selectNodeContents(diagTextEl);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
          setStatus("Select & copy diagnostics.");
        }
      }catch(e){
        setStatus("Copy failed: " + e);
        log(e);
      }
    });
  }

  // ---- Native scanner (BarcodeDetector) ----

  function ensureNativeVideoEl(){
    if (nativeVideoEl) return;
    nativeVideoEl = document.createElement("video");
    nativeVideoEl.id = "nativeVideo";
    nativeVideoEl.setAttribute("playsinline", "true");
    nativeVideoEl.muted = true;
    nativeVideoEl.autoplay = true;
    nativeVideoEl.controls = false;

    scannerEl.innerHTML = "";
    scannerEl.appendChild(nativeVideoEl);
  }

  async function stopNative(){
    if (nativeRaf) cancelAnimationFrame(nativeRaf);
    nativeRaf = 0;

    if (nativeVideoEl) {
      try { nativeVideoEl.pause(); } catch {}
      nativeVideoEl.srcObject = null;
    }

    if (nativeStream) {
      try {
        for (const t of nativeStream.getTracks()) t.stop();
      } catch {}
      nativeStream = null;
    }

    nativeDetector = null;
  }

  async function startNativeBarcodeDetector(camId){
    if (typeof BarcodeDetector === "undefined") {
      throw new Error("BarcodeDetector not available.");
    }

    nativeDetector = new BarcodeDetector({ formats: ["qr_code"] });
    ensureNativeVideoEl();

    lastStartAttempt = { engine: "native", mode: "getUserMedia deviceId exact", detail: "Requesting exact selected deviceId via getUserMedia." };

    nativeStream = await navigator.mediaDevices.getUserMedia({
      audio: false,
      video: {
        deviceId: { exact: camId },
        width: { ideal: 1920 },
        height: { ideal: 1080 },
        frameRate: { ideal: 30 }
      }
    });

    nativeVideoEl.srcObject = nativeStream;
    await nativeVideoEl.play().catch(() => {});

    const loop = async () => {
      if (!isScanning || engine !== "native") return;

      try {
        if (nativeVideoEl.readyState >= 2) {
          const barcodes = await nativeDetector.detect(nativeVideoEl);
          if (barcodes && barcodes.length) {
            const raw = barcodes[0].rawValue || "";
            if (raw && raw !== nativeLastText) {
              nativeLastText = raw;
              await stopNative();
              isScanning = false;
              setStatus("QR detected.");
              await refreshDiagnostics();
              await handleDecodedText(raw);
              return;
            }
          }
        }
      } catch {}

      nativeRaf = requestAnimationFrame(loop);
    };

    nativeRaf = requestAnimationFrame(loop);
  }

  // ---- html5-qrcode fallback ----
  async function stopHtml5(){
    if (!html5QrCode) return;
    try { await html5QrCode.stop(); } catch {}
    try { await html5QrCode.clear(); } catch {}
    html5QrCode = null;
  }

  async function startHtml5Qrcode(camId){
    lastStartAttempt = { engine: "html5qrcode", mode: "cameraId string", detail: "Html5Qrcode.start(cameraIdString)" };

    scannerEl.innerHTML = "";
    html5QrCode = new Html5Qrcode("scanner");

    const config = {
      fps: 10,
      qrbox: { width: 250, height: 250 },
      disableFlip: false,
      videoConstraints: {
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      }
    };

    await html5QrCode.start(
      camId,
      config,
      async (text) => {
        try { await stopHtml5(); } catch {}
        isScanning = false;
        setStatus("QR detected.");
        await refreshDiagnostics();
        await handleDecodedText(text);
      },
      () => {}
    );
  }

  // ---- start/stop unified ----
  async function startScanner(){
    setStatus("Starting camera…");

    const camId = cameraSelect.value;
    if (!camId) throw new Error("No camera selected.");
    setStoredPreferredCameraId(camId);

    await stopScanner();

    if (typeof BarcodeDetector !== "undefined") {
      engine = "native";
      isScanning = true;
      setStatus("Scanning…");
      await startNativeBarcodeDetector(camId);
      await refreshDiagnostics();
      return;
    }

    engine = "html5qrcode";
    isScanning = true;
    setStatus("Scanning…");
    await startHtml5Qrcode(camId);
    await refreshDiagnostics();
  }

  async function stopScanner(){
    if (!isScanning && engine === "none") {
      await refreshDiagnostics();
      return;
    }

    isScanning = false;

    if (engine === "native") {
      await stopNative();
    } else if (engine === "html5qrcode") {
      await stopHtml5();
    }

    engine = "none";
    setStatus("Stopped.");
    await refreshDiagnostics();
  }

  async function restartScannerForSelection(){
    if (!isScanning) {
      await refreshDiagnostics();
      return;
    }
    setStatus("Switching camera…");
    await startScanner();
  }

  startBtn.addEventListener("click", async () => {
    try{
      await listCamerasAndSelectDefault();
      await startScanner();
    }catch(e){
      setStatus("Camera error: " + e);
      log(e);
      try { await refreshDiagnostics(); } catch {}
    }
  });

  stopBtn.addEventListener("click", async () => {
    try{ await stopScanner(); }catch(e){ log(e); }
  });

  cameraSelect.addEventListener("change", async () => {
    const camId = cameraSelect.value;
    setStoredPreferredCameraId(camId);
    try{
      await restartScannerForSelection();
    }catch(e){
      setStatus("Camera switch error: " + e);
      log(e);
      try { await refreshDiagnostics(); } catch {}
    }
  });

  (async () => {
    try{
      await listCamerasAndSelectDefault();
      await refreshDiagnostics();
    }catch(e){
      log("camera list error", e);
      try { await refreshDiagnostics(); } catch {}
    }
  })();
</script>

</body>
