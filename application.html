<!DOCTYPE html>
<!-- Deploy 52 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Scan</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    :root{
      --black:#000;
      --white:#fff;
      --mobile-nav-h:124px;
      --side-pad:12px;
      --top-gap:10px;
    }

    html,body{height:100%;}
    .page-main{
      padding: 18px var(--side-pad) calc(var(--mobile-nav-h) + 22px);
      text-align:center;
    }

    .controls{
      display:flex;
      gap:10px;
      justify-content:center;
      margin: 10px 0 12px;
      flex-wrap:wrap;
    }

    #scanner{
      width: 340px;
      max-width: 92vw;
      margin: 12px auto;
      background:#000;
    }

    #scanner video, #scanner canvas{
      width:100% !important;
      height:auto !important;
      display:block;
    }

    .small{font-size:12px; opacity:.85;}
    #responseArea{display:none; margin: 12px auto 14px; max-width: 480px;}
    .qr-box{display:inline-block; background:#fff; padding:16px;}
    .diag-wrap{max-width:860px; margin: 14px auto 0; text-align:left;}
    .diag-head{display:flex; justify-content:space-between; align-items:center; gap:10px;}
    .diag-title{font-weight:bold;}
    #diagText{white-space:pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; background:#f7f7f7; border:1px solid #e5e5e5; padding:10px 12px;}
    #debug{display:none; max-width:860px; margin: 14px auto 0; text-align:left; white-space:pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; background:#fffbe6; border:1px solid #ffe58f; padding:10px 12px;}
  </style>
</head>

<body>

<header class="site-header">
  <div class="logo-row">
    <a href="index.html" class="logo-link">
      <img src="irlid-logo.png" alt="IRLid" class="logo-img" onerror="this.style.display='none'">
      <span class="logo-text">IRLid</span>
    </a>
  </div>

  <nav class="site-nav" aria-label="Primary">
    <a class="nav-btn" href="index.html">Home</a>
    <a class="nav-btn" href="application.html">Scan</a>

    <details class="nav-dropdown">
      <summary class="nav-btn">About ▼</summary>
      <div class="dropdown-menu" role="menu" aria-label="About menu">
        <a href="about.html">About</a>
        <a href="features.html">Features</a>
        <a href="contact.html">Contact</a>
      </div>
    </details>

    <span id="accountSlot"></span>
  </nav>
</header>

<main class="page-main">
  <p id="status" class="small">Ready.</p>

  <div class="controls">
    <button class="btn" id="startBtn">Start Scanner</button>
    <button class="btn secondary" id="stopBtn">Stop</button>
  </div>

  <div id="responseArea">
    <h3 id="responseTitle">Your Return QR</h3>
    <div class="qr-box" id="responseQr"></div>
    <p class="small" id="responseHint" style="margin-top:8px;">Show this to the other person to scan.</p>
  </div>

  <div id="scanner"></div>

  <div class="small">
    <label for="cameraSelect"><b>Camera:</b></label><br>
    <select id="cameraSelect"></select>
  </div>

  <!-- Diagnostics panel (hidden unless enabled) -->
  <div class="diag-wrap" id="diagWrap" aria-label="Diagnostics" style="display:none;">
    <div class="diag-head">
      <div class="diag-title">Diagnostics</div>
      <div class="diag-actions">
        <button class="btn secondary" id="diagRefreshBtn" type="button">Refresh Diagnostics</button>
        <button class="btn secondary" id="diagCopyBtn" type="button">Copy Diagnostics</button>
      </div>
    </div>
    <div id="diagText">Diagnostics not yet collected.</div>
  </div>

  <div id="debug"></div>
</main>

<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script src="js/sign.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

<!-- Keep html5-qrcode loaded as fallback -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<script src="js/qr.js?v=deploy45"></script>

<script>
  // thresholds (as requested)
  const IRLID_TS_TOL_S = 60;
  const IRLID_DIST_TOL_M = 2;

  // storage keys
  const KEY_SELF  = "irlid_resp_self";
  const KEY_OTHER = "irlid_resp_other";
  const KEY_PREF_CAM = "irlid_preferred_camera_id";

  // diagnostics flags (future Settings will flip these)
  const KEY_SETTINGS = "irlid_settings";
  const KEY_DIAG_SIMPLE = "irlid_diagnostics";

  const urlParams = new URLSearchParams(location.search);
  const debugMode = urlParams.get("debug") === "1";
  const diagQuery = urlParams.get("diag") === "1";

  const debugEl = document.getElementById("debug");
  if (debugMode) debugEl.style.display = "block";

  function log(...args){
    if (!debugMode) return;
    debugEl.textContent += args.map(a => (typeof a === "string" ? a : JSON.stringify(a, null, 2))).join(" ") + "\n";
  }

  function isDiagnosticsEnabled(){
    if (debugMode || diagQuery) return true;

    try{
      const raw = localStorage.getItem(KEY_SETTINGS);
      if (raw) {
        const obj = JSON.parse(raw);
        if (obj && obj.diagnostics === true) return true;
      }
    }catch{}

    try{
      return localStorage.getItem(KEY_DIAG_SIMPLE) === "1";
    }catch{
      return false;
    }
  }

  const diagnosticsEnabled = isDiagnosticsEnabled();
  const diagWrap = document.getElementById("diagWrap");
  if (diagnosticsEnabled) diagWrap.style.display = "block";

  // HELLO mode
  const hash = location.hash || "";
  const helloMatch = hash.match(/HELLO=([^&]+)/);
  const hello = helloMatch ? helloMatch[1] : null;

  const statusEl = document.getElementById("status");
  const responseArea = document.getElementById("responseArea");
  const responseQrElId = "responseQr";
  const responseTitle = document.getElementById("responseTitle");
  const responseHint = document.getElementById("responseHint");

  // ✅ FIX: HELLO return generation is async (geolocation + crypto).
  async function initHelloReturnQr(){
    if (!hello) return;
    try{
      responseArea.style.display = "block";
      responseTitle.textContent = "Your Return QR";
      responseHint.textContent = "Show this to the other person to scan.";

      if (typeof makeReturnForHelloAsync !== "function") {
        throw new Error("Return generation unavailable: makeReturnForHelloAsync() is missing in js/qr.js");
      }

      statusEl.textContent = "Getting location & signing…";
      const respObj = await makeReturnForHelloAsync(hello);

      if (typeof irlidEncodeJsonToB64url !== "function") {
        throw new Error("Encoding unavailable: irlidEncodeJsonToB64url() missing in js/qr.js");
      }
      const encoded = irlidEncodeJsonToB64url(respObj);
      const url = new URL(location.href);
      url.hash = "RESP=" + encoded;

      makeQR(responseQrElId, url.toString(), 360);
      statusEl.textContent = "Ready (HELLO mode).";
    }catch(e){
      statusEl.textContent = "Error: " + e;
      log(e);
    }
  }
  initHelloReturnQr();

  // ---- UI / state ----
  const scannerEl = document.getElementById("scanner");
  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");
  const cameraSelect = document.getElementById("cameraSelect");

  // Diagnostics elements (only used if enabled)
  const diagTextEl = diagnosticsEnabled ? document.getElementById("diagText") : null;
  const diagRefreshBtn = diagnosticsEnabled ? document.getElementById("diagRefreshBtn") : null;
  const diagCopyBtn = diagnosticsEnabled ? document.getElementById("diagCopyBtn") : null;

  function setStatus(msg){ statusEl.textContent = msg; }

  // ---- scanner engines ----
  let engine = "none"; // "native" | "html5qrcode" | "none"
  let isScanning = false;

  // Native engine (BarcodeDetector)
  let nativeStream = null;
  let nativeVideoEl = null;
  let nativeDetector = null;
  let nativeRaf = 0;
  let nativeLastText = "";

  // html5-qrcode engine fallback
  let html5QrCode = null;

  // Diagnostics: what we attempted
  let lastStartAttempt = { engine: "none", mode: "none", detail: "" };

  // Last decoded QR payload (for diagnostics / unrecognized QR debugging)
  let lastDecoded = null;

  function irlidAnalyzeDecodedText(rawText){
    const t = (rawText || "").trim();
    const out = {
      rawLen: t.length,
      preview: t.slice(0, 180),
      previewTail: t.length > 220 ? t.slice(-80) : "",
      looksLikeUrl: false,
      url: null,
      extracted: {
        hello: null,
        resp: null,
        comb: null
      }
    };

    // Extract tokens from either a full URL or a raw hash payload
    const rxHello = /(?:^|[#&])HELLO=([^&]+)/;
    const rxResp  = /(?:^|[#&])RESP=([A-Za-z0-9\-_]+)/;
    const rxComb  = /(?:^|[#&])COMB=([A-Za-z0-9\-_]+)/;

    const mH = t.match(rxHello);
    const mR = t.match(rxResp);
    const mC = t.match(rxComb);
    if (mH) out.extracted.hello = mH[1];
    if (mR) out.extracted.resp  = mR[1];
    if (mC) out.extracted.comb  = mC[1];

    // URL parse (best-effort)
    try{
      const u = new URL(t);
      out.looksLikeUrl = true;
      out.url = {
        origin: u.origin,
        pathname: u.pathname,
        search: u.search,
        hash: u.hash
      };

      // Try extraction from hash if not already found
      if (!out.extracted.hello) {
        const hm = (u.hash || "").match(rxHello);
        if (hm) out.extracted.hello = hm[1];
      }
      if (!out.extracted.resp) {
        const rm = (u.hash || "").match(rxResp);
        if (rm) out.extracted.resp = rm[1];
      }
      if (!out.extracted.comb) {
        const cm = (u.hash || "").match(rxComb);
        if (cm) out.extracted.comb = cm[1];
      }
    }catch{
      // not a URL; ok
    }

    // Heuristics to spot common “unrecognized” causes
    out.hints = [];
    if (t.startsWith("http") && !out.looksLikeUrl) out.hints.push("Starts with http but URL() parsing failed (likely invalid characters)." );
    if (!out.extracted.hello && !out.extracted.resp && !out.extracted.comb) {
      out.hints.push("No HELLO/RESP/COMB token found in text/hash.");
    }
    if (t.includes("HELLO=") && !out.extracted.hello) out.hints.push("Contains HELLO= but regex extraction failed (unexpected characters)." );
    if (t.includes("RESP=") && !out.extracted.resp) out.hints.push("Contains RESP= but payload not b64url (A–Z a–z 0–9 - _)." );
    if (t.includes("COMB=") && !out.extracted.comb) out.hints.push("Contains COMB= but payload not b64url (A–Z a–z 0–9 - _)." );

    return out;
  }

  function getStoredPreferredCameraId(){
    try{
      const v = localStorage.getItem(KEY_PREF_CAM);
      return v && v.trim() ? v.trim() : null;
    }catch{
      return null;
    }
  }

  function setStoredPreferredCameraId(id){
    try{
      localStorage.setItem(KEY_PREF_CAM, id || "");
    }catch{}
  }

  function scoreRearLabel(label){
    const s = (label || "").toLowerCase();
    let score = 0;
    if (s.includes("back")) score += 80;
    if (s.includes("rear")) score += 80;
    if (s.includes("environment")) score += 80;
    if (s.includes("front")) score -= 120;
    if (s.includes("selfie")) score -= 120;
    return score;
  }

  async function listCamerasAndSelectDefault(){
    if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
      throw new Error("enumerateDevices not available.");
    }
    const all = await navigator.mediaDevices.enumerateDevices();
    const devices = all.filter(d => d.kind === "videoinput");

    cameraSelect.innerHTML = "";
    for (const d of devices){
      const opt = document.createElement("option");
      opt.value = d.deviceId;
      opt.textContent = d.label || d.deviceId;
      cameraSelect.appendChild(opt);
    }

    if (!devices.length) return devices;

    const stored = getStoredPreferredCameraId();
    if (stored && devices.some(d => d.deviceId === stored)){
      cameraSelect.value = stored;
      return devices;
    }

    const ranked = devices
      .map((d, idx) => ({ id: d.deviceId, label: d.label || "", idx, score: scoreRearLabel(d.label || "") }))
      .sort((a,b) => (b.score !== a.score ? b.score - a.score : b.idx - a.idx));

    const best = ranked[0];
    const chosenId = (best && best.score > 0) ? best.id : devices[devices.length - 1].deviceId;
    cameraSelect.value = chosenId;
    setStoredPreferredCameraId(chosenId);

    return devices;
  }

  async function handleDecodedText(decodedText){
    const t = (decodedText || "").trim();

    // Collect as much info as possible for diagnostics (especially when unrecognized)
    lastDecoded = irlidAnalyzeDecodedText(t);

    // Prefer shared classifier if present
    const classifier = (typeof irlidClassifyText === "function") ? irlidClassifyText : null;
    if (lastDecoded) lastDecoded.classifierPresent = !!classifier;
    const c = classifier ? classifier(t) : { kind: "UNKNOWN", value: null };
    if (lastDecoded) lastDecoded.classification = c;

    // HELLO: open handshake mode
    if (c.kind === "HELLO") {
      setStatus("HELLO detected. Opening handshake…");
      location.href = "application.html#HELLO=" + (c.value || "");
      return;
    }

    // COMB: open receipt view (third-party verification)
    if (c.kind === "COMB_B64") {
      setStatus("Receipt detected. Opening…");
      location.href = "receipt.html#COMB=" + (c.value || "");
      return;
    }

    // RESP:
    if (c.kind === "RESP_B64") {
      // If we are in HELLO mode and processScannedResponse exists, do mutual flow and store.
      if (hello && typeof processScannedResponse === "function" && typeof irlidDecodeB64urlJson === "function") {
        try {
          const otherResp = irlidDecodeB64urlJson(c.value);

          const out = await processScannedResponse(otherResp, {
            hello,
            tsTolS: IRLID_TS_TOL_S,
            distTolM: IRLID_DIST_TOL_M
          });

          if (out && out.self) localStorage.setItem(KEY_SELF, JSON.stringify(out.self));
          if (out && out.other) localStorage.setItem(KEY_OTHER, JSON.stringify(out.other));

          location.href = "receipt.html";
          return;
        } catch (e) {
          setStatus("Error processing response: " + e);
          log(e);
        }
      }

      setStatus("Response detected. Opening receipt view…");
      location.href = "receipt.html#RESP=" + (c.value || "");
      return;
    }

    // Unknown
    let msg = "QR detected (unrecognized).";
    if (!classifier) msg += " (classifier missing)";
    if (diagnosticsEnabled) msg += " See Diagnostics.";
    setStatus(msg);

    // Capture the latest decode analysis in diagnostics output
    try { await refreshDiagnostics(); } catch {}
  }

  // ---- diagnostics (no-ops unless enabled) ----
  function safeJson(obj){
    try { return JSON.stringify(obj, null, 2); } catch { return String(obj); }
  }

  function getActiveNativeTrackInfo(){
    if (!nativeVideoEl) return { ok: false, reason: "No native video element." };
    const stream = nativeVideoEl.srcObject;
    if (!stream) return { ok: false, reason: "Native video has no srcObject." };
    const tracks = stream.getVideoTracks ? stream.getVideoTracks() : [];
    if (!tracks.length) return { ok: false, reason: "Native stream has no video tracks." };
    const t = tracks[0];
    return { ok: true, trackLabel: t.label || "", settings: (t.getSettings ? t.getSettings() : {}) };
  }

  function getActiveHtml5TrackInfo(){
    const video = document.querySelector("#scanner video");
    if (!video) return { ok: false, reason: "No <video> found under #scanner." };
    const stream = video.srcObject;
    if (!stream) return { ok: false, reason: "html5 video has no srcObject." };
    const tracks = stream.getVideoTracks ? stream.getVideoTracks() : [];
    if (!tracks.length) return { ok: false, reason: "html5 stream has no video tracks." };
    const t = tracks[0];
    return { ok: true, trackLabel: t.label || "", settings: (t.getSettings ? t.getSettings() : {}) };
  }

  async function refreshDiagnostics(){
    if (!diagnosticsEnabled) return null;
    const payload = {
      time: new Date().toISOString(),
      engine,
      isScanning,
      helloMode: !!hello,
      qrJs: {
        hasMakeReturnForHelloAsync: (typeof makeReturnForHelloAsync === "function"),
        hasProcessScannedResponse: (typeof processScannedResponse === "function"),
        hasClassifier: (typeof irlidClassifyText === "function"),
        qrScriptSrc: (function(){
          try{
            const s = Array.from(document.querySelectorAll('script[src]'))
              .map(x => x.getAttribute('src') || '')
              .find(src => src.includes('js/qr.js'));
            return s || "";
          }catch{ return ""; }
        })()
      },
      lastDecoded,
      activeVideoTrack: (engine === "native") ? getActiveNativeTrackInfo() : getActiveHtml5TrackInfo(),
      lastNativeDecoded: nativeLastText || "",
      lastStartAttempt
    };
    if (diagTextEl) diagTextEl.textContent = safeJson(payload);
    return payload;
  }

  if (diagnosticsEnabled && diagRefreshBtn) {
    diagRefreshBtn.addEventListener("click", async () => {
      try{ await refreshDiagnostics(); setStatus("Diagnostics refreshed."); }catch(e){ log(e); }
    });
  }

  if (diagnosticsEnabled && diagCopyBtn) {
    diagCopyBtn.addEventListener("click", async () => {
      try{
        const txt = diagTextEl ? diagTextEl.textContent : "";
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(txt);
          setStatus("Diagnostics copied.");
        } else {
          const range = document.createRange();
          range.selectNodeContents(diagTextEl);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
          setStatus("Select & copy diagnostics.");
        }
      }catch(e){
        setStatus("Copy failed: " + e);
        log(e);
      }
    });
  }

  // ---- scanner engines ----
  function ensureNativeVideoEl(){
    if (nativeVideoEl) return;
    nativeVideoEl = document.createElement("video");
    nativeVideoEl.id = "nativeVideo";
    nativeVideoEl.setAttribute("playsinline", "true");
    nativeVideoEl.muted = true;
    nativeVideoEl.autoplay = true;
    nativeVideoEl.controls = false;

    scannerEl.innerHTML = "";
    scannerEl.appendChild(nativeVideoEl);
  }

  async function stopNative(){
    if (nativeRaf) cancelAnimationFrame(nativeRaf);
    nativeRaf = 0;

    if (nativeVideoEl) {
      try { nativeVideoEl.pause(); } catch {}
      nativeVideoEl.srcObject = null;
    }

    if (nativeStream) {
      try { for (const t of nativeStream.getTracks()) t.stop(); } catch {}
      nativeStream = null;
    }

    nativeDetector = null;
  }

  async function startNativeBarcodeDetector(camId){
    if (typeof BarcodeDetector === "undefined") {
      throw new Error("BarcodeDetector not available.");
    }

    nativeDetector = new BarcodeDetector({ formats: ["qr_code"] });
    ensureNativeVideoEl();

    lastStartAttempt = { engine: "native", mode: "getUserMedia deviceId exact", detail: "Requesting exact selected deviceId via getUserMedia." };

    nativeStream = await navigator.mediaDevices.getUserMedia({
      audio: false,
      video: {
        deviceId: { exact: camId },
        width: { ideal: 1920 },
        height: { ideal: 1080 },
        frameRate: { ideal: 30 }
      }
    });

    nativeVideoEl.srcObject = nativeStream;
    await nativeVideoEl.play().catch(() => {});

    const loop = async () => {
      if (!isScanning || engine !== "native") return;

      try {
        if (nativeVideoEl.readyState >= 2) {
          const barcodes = await nativeDetector.detect(nativeVideoEl);
          if (barcodes && barcodes.length) {
            const raw = barcodes[0].rawValue || "";
            if (raw && raw !== nativeLastText) {
              nativeLastText = raw;
              await stopNative();
              isScanning = false;
              setStatus("QR detected.");
              await refreshDiagnostics();
              await handleDecodedText(raw);
              return;
            }
          }
        }
      } catch {}

      nativeRaf = requestAnimationFrame(loop);
    };

    nativeRaf = requestAnimationFrame(loop);
  }

  // html5-qrcode fallback
  async function stopHtml5(){
    if (!html5QrCode) return;
    try { await html5QrCode.stop(); } catch {}
    try { await html5QrCode.clear(); } catch {}
    html5QrCode = null;
  }

  async function startHtml5Qrcode(camId){
    lastStartAttempt = { engine: "html5qrcode", mode: "cameraId string", detail: "Html5Qrcode.start(cameraIdString)" };

    scannerEl.innerHTML = "";
    html5QrCode = new Html5Qrcode("scanner");

    const config = {
      fps: 10,
      qrbox: { width: 250, height: 250 },
      disableFlip: false,
      videoConstraints: {
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      }
    };

    await html5QrCode.start(
      camId,
      config,
      async (text) => {
        try { await stopHtml5(); } catch {}
        isScanning = false;
        setStatus("QR detected.");
        await refreshDiagnostics();
        await handleDecodedText(text);
      },
      () => {}
    );
  }

  async function startScanner(){
    setStatus("Starting camera…");

    const camId = cameraSelect.value;
    if (!camId) throw new Error("No camera selected.");
    setStoredPreferredCameraId(camId);

    await stopScanner();

    if (typeof BarcodeDetector !== "undefined") {
      engine = "native";
      isScanning = true;
      setStatus("Scanning…");
      await startNativeBarcodeDetector(camId);
      await refreshDiagnostics();
      return;
    }

    engine = "html5qrcode";
    isScanning = true;
    setStatus("Scanning…");
    await startHtml5Qrcode(camId);
    await refreshDiagnostics();
  }

  async function stopScanner(){
    if (!isScanning && engine === "none") {
      await refreshDiagnostics();
      return;
    }

    isScanning = false;

    if (engine === "native") {
      await stopNative();
    } else if (engine === "html5qrcode") {
      await stopHtml5();
    }

    engine = "none";
    setStatus("Stopped.");
    await refreshDiagnostics();
  }

  async function restartScannerForSelection(){
    if (!isScanning) {
      await refreshDiagnostics();
      return;
    }
    setStatus("Switching camera…");
    await startScanner();
  }

  startBtn.addEventListener("click", async () => {
    try{
      await listCamerasAndSelectDefault();
      await startScanner();
    }catch(e){
      setStatus("Camera error: " + e);
      log(e);
      try { await refreshDiagnostics(); } catch {}
    }
  });

  stopBtn.addEventListener("click", async () => {
    try{ await stopScanner(); }catch(e){ log(e); }
  });

  cameraSelect.addEventListener("change", async () => {
    const camId = cameraSelect.value;
    setStoredPreferredCameraId(camId);
    try{
      await restartScannerForSelection();
    }catch(e){
      setStatus("Camera switch error: " + e);
      log(e);
      try { await refreshDiagnostics(); } catch {}
    }
  });

  (async () => {
    try{
      await listCamerasAndSelectDefault();
      await refreshDiagnostics();
    }catch(e){
      log("camera list error", e);
      try { await refreshDiagnostics(); } catch {}
    }
  })();
</script>

</body>
</html>
