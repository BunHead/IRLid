<!-- application.html -->
<!DOCTYPE html>
<!-- Deploy 76 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Scan</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .scan-main {
      padding: 0 0 calc(var(--mobile-nav-h) + 22px);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* === Viewport: the main visual area (scanner / QR / idle) === */
    .scan-viewport {
      position: relative;
      width: 100%;
      max-width: 480px;
      aspect-ratio: 1 / 1;
      background: #0a0a0a;
      overflow: hidden;
    }

    /* Idle state — crosshair target */
    .scan-viewport .idle-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2;
      pointer-events: none;
    }
    .scan-viewport.state-idle .idle-overlay { display: flex; }
    .scan-viewport.state-scanning .idle-overlay,
    .scan-viewport.state-qr .idle-overlay { display: none; }

    .idle-crosshair {
      width: 120px;
      height: 120px;
      position: relative;
    }
    .idle-crosshair::before,
    .idle-crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.18);
    }
    .idle-crosshair::before {
      width: 1px; height: 100%;
      left: 50%; top: 0;
    }
    .idle-crosshair::after {
      height: 1px; width: 100%;
      top: 50%; left: 0;
    }
    /* Corner brackets */
    .idle-crosshair .c { position: absolute; width: 24px; height: 24px; }
    .idle-crosshair .c::before, .idle-crosshair .c::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.35);
    }
    .c.tl { top:0; left:0; }
    .c.tl::before { width:24px; height:2px; top:0; left:0; }
    .c.tl::after  { width:2px; height:24px; top:0; left:0; }
    .c.tr { top:0; right:0; }
    .c.tr::before { width:24px; height:2px; top:0; right:0; }
    .c.tr::after  { width:2px; height:24px; top:0; right:0; }
    .c.bl { bottom:0; left:0; }
    .c.bl::before { width:24px; height:2px; bottom:0; left:0; }
    .c.bl::after  { width:2px; height:24px; bottom:0; left:0; }
    .c.br { bottom:0; right:0; }
    .c.br::before { width:24px; height:2px; bottom:0; right:0; }
    .c.br::after  { width:2px; height:24px; bottom:0; right:0; }

    .idle-label {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 18px;
    }

    /* Scanner container (camera feed) */
    .scan-viewport #scanner {
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      margin: 0;
      z-index: 1;
    }
    .scan-viewport #scanner video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }

    /* === Red laser scanning line === */
    .scan-laser {
      display: none;
      position: absolute;
      left: 8%;
      right: 8%;
      height: 2px;
      z-index: 10;
      pointer-events: none;
      background: #ff2222;
      box-shadow:
        0 0 8px 2px rgba(255, 34, 34, 0.6),
        0 0 24px 4px rgba(255, 34, 34, 0.25);
      animation: laserSweep 2.2s ease-in-out infinite;
    }
    .scan-viewport.state-scanning .scan-laser { display: block; }

    @keyframes laserSweep {
      0%   { top: 12%; opacity: 0.4; }
      10%  { opacity: 1; }
      50%  { top: 86%; opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 12%; opacity: 0.4; }
    }

    /* Corner brackets overlaid on scanner */
    .scan-corners {
      display: none;
      position: absolute;
      inset: 10%;
      z-index: 9;
      pointer-events: none;
    }
    .scan-viewport.state-scanning .scan-corners { display: block; }

    .scan-corners .c { position: absolute; width: 28px; height: 28px; }
    .scan-corners .c::before, .scan-corners .c::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.55);
    }
    .scan-corners .c.tl { top:0; left:0; }
    .scan-corners .c.tl::before { width:28px; height:2px; top:0; left:0; }
    .scan-corners .c.tl::after  { width:2px; height:28px; top:0; left:0; }
    .scan-corners .c.tr { top:0; right:0; }
    .scan-corners .c.tr::before { width:28px; height:2px; top:0; right:0; }
    .scan-corners .c.tr::after  { width:2px; height:28px; top:0; right:0; }
    .scan-corners .c.bl { bottom:0; left:0; }
    .scan-corners .c.bl::before { width:28px; height:2px; bottom:0; left:0; }
    .scan-corners .c.bl::after  { width:2px; height:28px; bottom:0; left:0; }
    .scan-corners .c.br { bottom:0; right:0; }
    .scan-corners .c.br::before { width:28px; height:2px; bottom:0; right:0; }
    .scan-corners .c.br::after  { width:2px; height:28px; bottom:0; right:0; }

    /* QR response display inside viewport */
    .scan-viewport #responseQr {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3;
      background: #fff;
      padding: 12px;
    }
    .scan-viewport.state-qr #responseQr {
      display: flex;
    }
    #responseQr canvas, #responseQr img {
      max-width: 100%;
      max-height: 100%;
    }

    /* === Controls bar === */
    .scan-controls {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      gap: 0;
      background: #000;
    }

    .scan-controls .btn {
      flex: 1;
      padding: 14px 10px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: none;
      border-right: 1px solid rgba(255,255,255,0.18);
    }
    .scan-controls .btn:last-child { border-right: none; }

    .scan-controls .btn.active-scan {
      background: #ff2222;
      color: #fff;
      border-color: #ff2222;
    }

    .scan-controls .cam-select-wrap {
      flex: 0 0 auto;
      padding: 0 10px;
      display: flex;
      align-items: center;
    }
    .scan-controls select {
      background: #000;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 8px 6px;
      font-size: 12px;
      max-width: 110px;
    }

    /* === Status bar === */
    .scan-status {
      width: 100%;
      max-width: 480px;
      padding: 12px 14px;
      font-size: 13px;
      text-align: left;
      color: #555;
      min-height: 40px;
      line-height: 1.4;
    }
    .scan-status.scanning {
      color: #ff2222;
      font-weight: 700;
    }

    .scan-status .dot-pulse::after {
      content: '';
      animation: dots 1.4s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }

    /* Receipt button below status */
    .scan-footer {
      width: 100%;
      max-width: 480px;
      padding: 0 14px 14px;
    }
    .scan-footer .btn {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* QR hint label */
    .qr-hint {
      display: none;
      width: 100%;
      max-width: 480px;
      padding: 6px 14px 2px;
      font-size: 12px;
      color: #888;
      text-align: center;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .scan-viewport.state-qr ~ .qr-hint { display: block; }

    /* Debug controls */
    #debugControls {
      display: none;
      width: 100%;
      max-width: 480px;
      padding: 8px 14px;
    }
  </style>
</head>

<main class="scan-main">

  <!-- Viewport: shows idle state, camera feed, or QR response -->
  <div class="scan-viewport state-idle" id="scanViewport">

    <!-- Idle overlay -->
    <div class="idle-overlay">
      <div class="idle-crosshair">
        <div class="c tl"></div><div class="c tr"></div>

    <!-- Scanner (camera feed injected here by Html5Qrcode) -->

    <!-- Red laser line -->
    <div class="scan-laser"></div>

      <div class="c tl"></div><div class="c tr"></div>

<script src="js/auth.js"></script>
<script src="js/backend.js"></script>
  <script src="js/nav.js"></script>
<script src="js/sign.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="js/qr.js?v=63"></script>

<script>
  const IRLID_TS_TOL_S = 90;
  const IRLID_DIST_TOL_M = 12;

  const KEY_PREF_CAM = "irlid_preferred_camera_id";
  const KEY_RECEIPTS = "irlid_receipts";
  const KEY_SELF  = "irlid_resp_self";
  const KEY_GUEST = "irlid_resp_other";
  const KEY_LAST_HELLO_B64 = "irlid_last_hello_b64";
  const KEY_LAST_SELF_RESP = "irlid_last_self_response";

  const statusEl     = document.getElementById("status");
  const scanViewport = document.getElementById("scanViewport");
  const scanBtn      = document.getElementById("scanBtn");
  const stopBtn      = document.getElementById("stopBtn");
  const showReceiptBtn  = document.getElementById("showReceiptBtn");
  const showReceiptBtn2 = document.getElementById("showReceiptBtn2");
  const receiptFooter   = document.getElementById("receiptFooter");
  const clearLocalBtn   = document.getElementById("clearLocalBtn");
  const debugControls   = document.getElementById("debugControls");
  const qrHint          = document.getElementById("qrHint");

  let lastCombinedUrl = null;

  // ---- Viewport state management ----
  function setViewportState(state) {
    // state: 'idle' | 'scanning' | 'qr'
    scanViewport.className = "scan-viewport state-" + state;

    // Update qr-hint visibility (CSS sibling selector handles display,
    // but we also toggle for safety)
    qrHint.style.display = (state === "qr") ? "block" : "none";
  }

  // ---- Status helpers ----
  function setStatus(msg, isScanning) {
    if (isScanning) {
      statusEl.className = "scan-status scanning";
      statusEl.innerHTML = msg + '<span class="dot-pulse"></span>';
    } else {
      statusEl.className = "scan-status";
      statusEl.textContent = msg;
    }
  }

  function isDebug(){
    try{
      const qs = new URLSearchParams(location.search || "");
      if (qs.get("debug") === "1" || qs.get("debug") === "true") return true;
    }catch{}
    try{
      const v = localStorage.getItem("irlid_debug");
      if (v === "1" || v === "true") return true;
    }catch{}
    try{
      const h = location.hash || "";
      if (/(?:^|[#&])DEBUG=(1|true)(?:&|$)/i.test(h)) return true;
    }catch{}
    return false;
  }

  if (debugControls) debugControls.style.display = isDebug() ? "block" : "none";

  // ---- HELLO handling ----
  function getHelloFromHash(){
    const h = location.hash || "";
    const mz = h.match(/HZ=([^&]+)/);
    if (mz) return { raw: mz[1], compressed: true };
    const m = h.match(/HELLO=([^&]+)/);
    if (m) return { raw: m[1], compressed: false };
    return null;
  }

  async function decompressHelloToB64url(raw) {
    const obj = await irlidDecompressFromB64url(raw);
    return irlidEncodeJsonToB64url(obj);
  }

  function getSavedHello(){
    try{
      const v = localStorage.getItem(KEY_LAST_HELLO_B64);
      return v && v.trim() ? v.trim() : null;
    }catch{ return null; }
  }

  function saveHello(b64){
    try{ if (b64 && b64.trim()) localStorage.setItem(KEY_LAST_HELLO_B64, b64.trim()); }catch{}
  }

  function loadSavedSelfResp(){
    try{
      const raw = localStorage.getItem(KEY_LAST_SELF_RESP);
      if (!raw) return null;
      return JSON.parse(raw);
    }catch{ return null; }
  }

  function saveSelfResp(resp){
    try{ localStorage.setItem(KEY_LAST_SELF_RESP, JSON.stringify(resp)); }catch{}
  }

  let hello = getSavedHello();

  if (!window.__irlid_last_self_response) {
    const saved = loadSavedSelfResp();
    if (saved && saved.type === "response") window.__irlid_last_self_response = saved;
  }

  const scannerEl = document.getElementById("scanner");

  // ---- Init: show QR if we have a HELLO, else idle ----
  async function initHelloReturnQr(){
    const fromHash = getHelloFromHash();
    if (fromHash) {
      try {
        hello = fromHash.compressed
          ? await decompressHelloToB64url(fromHash.raw)
          : fromHash.raw;
        saveHello(hello);
      } catch(e) { console.error("HELLO decode error:", e); }
    }
    if (!hello) hello = getSavedHello();

    if (!hello) {
      setViewportState("idle");
      showReceiptBtn.style.display = "none";
      receiptFooter.style.display = "none";
      lastCombinedUrl = null;
      setStatus("Ready \u2014 tap Scan to scan any IRLid QR code.");
      return;
    }

    try {
      setStatus("Getting location & signing\u2026");

      const respObj = await makeReturnForHelloAsync(hello);
      saveSelfResp(respObj);

      let qrData;
      if (irlidHasCompression()) {
        const compressed = await irlidCompressToB64url(respObj);
        qrData = "RZ:" + compressed;
      } else {
        qrData = "R:" + irlidEncodeJsonToB64url(respObj);
      }

      await makeQR("responseQr", qrData, 360);
      setViewportState("qr");

      setStatus("Accept ready \u2014 show your QR, then tap Scan to read theirs.");

      showReceiptBtn.style.display = "none";
      receiptFooter.style.display = "none";
      lastCombinedUrl = null;
    } catch(e) {
      setStatus("Error: " + e);
      console.error(e);
    }
  }

  window.addEventListener("hashchange", () => { initHelloReturnQr(); });
  initHelloReturnQr();

  // ---- Scanner ----
  const cameraSelect = document.getElementById("cameraSelect");

  function classify(text){
    const t = (text || "").trim();

    if (t.startsWith("RZ:")) return { kind:"RESP_Z", v: t.slice(3) };
    if (t.startsWith("R:"))  return { kind:"RESP",   v: t.slice(2) };
    if (t.startsWith("HZ:")) return { kind:"HELLO_Z", v: t.slice(3) };
    if (t.startsWith("H:"))  return { kind:"HELLO",  v: t.slice(2) };

    const rxHelloZ  = /(?:^|[#&])HZ=([^&]+)/;
    const rxHello   = /(?:^|[#&])HELLO=([^&]+)/;
    const rxResp    = /(?:^|[#&])RESP=([A-Za-z0-9\-_]+)/;
    const rxComb    = /(?:^|[#&])COMB=([A-Za-z0-9\-_]+)/;
    const rxReceipt = /(?:^|[#&])receipt=([A-Za-z0-9\-_]+)/;

    let m;
    const sources = [t];
    try { sources.push(new URL(t).hash || ""); } catch {}

    for (const s of sources) {
      m = s.match(rxHelloZ);  if (m) return { kind:"HELLO_Z", v:m[1] };
      m = s.match(rxHello);   if (m) return { kind:"HELLO",   v:m[1] };
      m = s.match(rxComb);    if (m) return { kind:"COMB",    v:m[1] };
      m = s.match(rxResp);    if (m) return { kind:"RESP",    v:m[1] };
      m = s.match(rxReceipt); if (m) return { kind:"RECEIPT", v:m[1] };
    }

    return { kind:"UNKNOWN", v:null };
  }

  function getStoredPreferredCameraId(){
    try{
      const v = localStorage.getItem(KEY_PREF_CAM);
      return v && v.trim() ? v.trim() : null;
    }catch{ return null; }
  }
  function setStoredPreferredCameraId(id){
    try{ localStorage.setItem(KEY_PREF_CAM, id || ""); }catch{}
  }

  function scoreRearLabel(label){
    const s = (label || "").toLowerCase();
    let score = 0;
    if (s.includes("back")) score += 80;
    if (s.includes("rear")) score += 80;
    if (s.includes("environment")) score += 80;
    if (s.includes("front")) score -= 120;
    if (s.includes("selfie")) score -= 120;
    return score;
  }

  async function listCamerasAndSelectDefault(){
    const all = await navigator.mediaDevices.enumerateDevices();
    const devices = all.filter(d => d.kind === "videoinput");

    cameraSelect.innerHTML = "";
    for (const d of devices){
      const opt = document.createElement("option");
      opt.value = d.deviceId;
      opt.textContent = d.label || d.deviceId;
      cameraSelect.appendChild(opt);
    }
    if (!devices.length) return;

    const stored = getStoredPreferredCameraId();
    if (stored && devices.some(d => d.deviceId === stored)){
      cameraSelect.value = stored;
      return;
    }

    const ranked = devices
      .map((d, idx) => ({ id: d.deviceId, label: d.label || "", idx, score: scoreRearLabel(d.label || "") }))
      .sort((a,b) => (b.score !== a.score ? b.score - a.score : b.idx - a.idx));

    const best = ranked[0];
    const chosenId = (best && best.score > 0) ? best.id : devices[devices.length - 1].deviceId;
    cameraSelect.value = chosenId;
    setStoredPreferredCameraId(chosenId);
  }

  let html5QrCode = null;

  function storeCombinedReceipt(combinedObj){
    try{
      if (combinedObj && combinedObj.a) localStorage.setItem(KEY_SELF, JSON.stringify(combinedObj.a));
      if (combinedObj && combinedObj.b) localStorage.setItem(KEY_GUEST, JSON.stringify(combinedObj.b));
    }catch{}
    try{
      const raw = localStorage.getItem(KEY_RECEIPTS);
      const list = raw ? JSON.parse(raw) : [];
      const entry = { ts: Date.now(), combined: combinedObj };
      list.unshift(entry);
      localStorage.setItem(KEY_RECEIPTS, JSON.stringify(list.slice(0, 200)));
    }catch{}
  }

  async function ensureSelfResponseForHello(){
    if (window.__irlid_last_self_response && window.__irlid_last_self_response.type === "response") return;
    const saved = loadSavedSelfResp();
    if (saved && saved.type === "response") {
      window.__irlid_last_self_response = saved;
      return;
    }
    if (!hello) throw new Error("HELLO missing. Scan a HELLO first.");
    setStatus("Creating self receipt (location + time)\u2026");
    const selfResp = await makeReturnForHelloAsync(hello);
    window.__irlid_last_self_response = selfResp;
    saveSelfResp(selfResp);
  }

  async function handleScannedResponseB64(respB64, isCompressed){
    if (!hello) throw new Error("No HELLO loaded. Scan a HELLO first.");
    await ensureSelfResponseForHello();

    const otherRespObj = isCompressed
      ? await irlidDecompressFromB64url(respB64)
      : irlidDecodeB64urlJson(respB64);

    const out = await processScannedResponse(otherRespObj, {
      hello,
      tsTolS: IRLID_TS_TOL_S,
      distTolM: IRLID_DIST_TOL_M
    });

    const combEncoded = irlidEncodeJsonToB64url(out.combined);
    lastCombinedUrl = "receipt.html#COMB=" + combEncoded;
    storeCombinedReceipt(out.combined);

    if (window.IRLBackend && window.IRLBackend.hasSession()) {
      try {
        const upRes = await window.IRLBackend.uploadReceipt(out.combined);
        if (upRes.ok && upRes.data && upRes.data.receipt_hash) {
          lastCombinedUrl = "receipt.html#receipt=" + upRes.data.receipt_hash;
          console.log("Receipt uploaded:", upRes.data.receipt_hash, upRes.data.duplicate ? "(duplicate)" : "");
        } else {
          console.warn("Receipt upload failed:", upRes.error || "unknown");
        }
      } catch(e) {
        console.warn("Receipt upload error:", e);
      }
    }

    showReceiptBtn.style.display = "";
    receiptFooter.style.display = "";
    setStatus("Verified \u2714 Combined receipt ready.");
  }

  async function stopScanner(){
    stopBtn.style.display = "none";
    scanBtn.style.display = "";
    if (!html5QrCode) return;
    try { await html5QrCode.stop(); } catch {}
    try { await html5QrCode.clear(); } catch {}
    html5QrCode = null;

    // Return to QR or idle
    if (hello && document.querySelector("#responseQr canvas, #responseQr img")) {
      setViewportState("qr");
    } else {
      setViewportState("idle");
    }
  }

  async function startScanner(){
    await stopScanner();
    setStatus("Starting camera\u2026");

    const camId = cameraSelect.value;
    if (!camId) throw new Error("No camera selected.");
    setStoredPreferredCameraId(camId);

    scanBtn.style.display = "none";
    stopBtn.style.display = "";

    // Switch viewport to scanning state (shows laser + corners)
    setViewportState("scanning");
    setStatus("Scanning", true);

    scannerEl.innerHTML = "";
    html5QrCode = new Html5Qrcode("scanner");

    // Use full viewport — no qrbox restriction for better detection
    const config = {
      fps: 12,
      qrbox: function(vw, vh) {
        const s = Math.min(vw, vh);
        return { width: Math.floor(s * 0.8), height: Math.floor(s * 0.8) };
      },
      disableFlip: false
    };

    await html5QrCode.start(
      camId,
      config,
      async (text) => {
        await stopScanner();
        const c = classify(text);

        if (c.kind === "HELLO" || c.kind === "HELLO_Z") {
          try {
            if (c.kind === "HELLO_Z") {
              hello = await decompressHelloToB64url(c.v);
            } else {
              hello = (c.v || "").trim() || null;
            }
            if (hello) saveHello(hello);
            setStatus("Offer detected. Creating your Accept QR\u2026");
            history.replaceState(null, "", location.pathname);
            initHelloReturnQr();
          } catch(e) {
            setStatus("HELLO decode error: " + e);
            console.error(e);
          }
          return;
        }

        if (c.kind === "COMB") {
          setStatus("Receipt detected. Opening\u2026");
          location.href = "receipt.html#COMB=" + (c.v || "");
          return;
        }

        if (c.kind === "RECEIPT") {
          setStatus("Receipt detected. Opening\u2026");
          location.href = "receipt.html#receipt=" + (c.v || "");
          return;
        }

        if (c.kind === "RESP" || c.kind === "RESP_Z") {
          if (hello) {
            try{
              setStatus("Accept detected. Verifying\u2026");
              await handleScannedResponseB64(c.v || "", c.kind === "RESP_Z");
              if (lastCombinedUrl) location.href = lastCombinedUrl;
              return;
            }catch(e){
              setStatus("Verify failed: " + e);
              console.error(e);
              return;
            }
          }

          try {
            let respB64 = c.v;
            if (c.kind === "RESP_Z") {
              const obj = await irlidDecompressFromB64url(c.v);
              respB64 = irlidEncodeJsonToB64url(obj);
            }
            location.href = "receipt.html#RESP=" + respB64;
          } catch(e) {
            setStatus("Decode error: " + e);
          }
          return;
        }

        setStatus("QR detected but not recognized as IRLid.");
      },
      () => {}
    );
  }

  // ---- Event handlers ----
  scanBtn.addEventListener("click", async () => {
    try{
      await listCamerasAndSelectDefault();
      await startScanner();
    }catch(e){
      setStatus("Camera error: " + e);
      console.error(e);
    }
  });

  stopBtn.addEventListener("click", async () => {
    try{ await stopScanner(); }catch(e){ console.error(e); }
    setStatus(hello ? "Stopped \u2014 your Accept QR is shown." : "Stopped.");
  });

  function openReceipt() {
    if (lastCombinedUrl) location.href = lastCombinedUrl;
  }
  showReceiptBtn.addEventListener("click", openReceipt);
  showReceiptBtn2.addEventListener("click", openReceipt);

  if (clearLocalBtn) {
    clearLocalBtn.addEventListener("click", () => {
      try{
        const keys = [KEY_LAST_HELLO_B64, KEY_LAST_SELF_RESP, KEY_SELF, KEY_GUEST,
                      KEY_RECEIPTS, "irlid_receipt_last", KEY_PREF_CAM];
        for (const k of keys) localStorage.removeItem(k);
      }catch{}
      hello = null;
      lastCombinedUrl = null;
      try{ delete window.__irlid_last_self_response; }catch{}
      location.hash = "";
      setViewportState("idle");
      showReceiptBtn.style.display = "none";
      receiptFooter.style.display = "none";
      setStatus("Cleared local data.");
    });
  }

  cameraSelect.addEventListener("change", async () => {
    setStoredPreferredCameraId(cameraSelect.value);
  });

  (async () => {
    try{ await listCamerasAndSelectDefault(); } catch {}
  })();
</script>
