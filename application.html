<!-- application.html -->
<!DOCTYPE html>
<!-- Deploy 73 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Scan</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    #responseArea { margin-top: 8px; }
    #responseTitle { margin: 10px 0 10px; }
    #responseHint { display: none; }
  </style>
</head>

<body>

<header class="site-header">
  <div class="brand-wrap">
    <a class="brand" href="index.html" aria-label="IRLid Home">
      <img src="logo.png" alt="IRLid Logo" id="logo" onerror="this.style.display='none'">
    </a>
  </div>

  <nav class="site-nav" aria-label="Primary">
    <a class="nav-btn" href="index.html">Home</a>
    <a class="nav-btn" href="application.html">Scan</a>

    <details class="nav-dropdown" id="aboutDropdown">
      <summary class="nav-btn">About ▼</summary>
      <div class="dropdown-menu" role="menu" aria-label="About menu">
        <a href="about.html">About</a>
        <a href="features.html">Features</a>
        <a href="contact.html">Contact</a>
      </div>
    </details>

    <span id="accountSlot"></span>
  </nav>
</header>

<main class="page-main">
  <p id="status" class="small">Ready.</p>

  <div class="controls">
    <button class="btn" id="startBtn">Start Scanner</button>
    <button class="btn secondary" id="stopBtn">Stop</button>
  </div>

  <div id="responseArea">
    <h3 id="responseTitle">Your Accept QR</h3>

    <div class="qr-box" id="responseQr"></div>
    <div id="scanner"></div>

    <div id="debugControls" style="display:none; text-align:center; margin-top:12px;">
      <button class="btn secondary" id="clearLocalBtn" type="button">Clear local data</button>
    </div>

    <p class="small" id="responseHint" style="margin-top:8px;">Show this to the other person to scan.</p>

    <div class="controls" style="margin-top:10px;">
      <button class="btn" id="scanTheirRespBtn">Scan their Accept</button>
      <button class="btn secondary" id="showReceiptBtn" style="display:none;">Open Receipt</button>
    </div>
  </div>

  <div class="small">
    <label for="cameraSelect"><b>Camera:</b></label><br>
    <select id="cameraSelect"></select>
  </div>
</main>

<script src="js/auth.js"></script>
<script src="js/nav.js"></script>

<!-- IMPORTANT: keep these versions consistent across all pages -->
<script src="js/sign.js?v=72"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="js/qr.js?v=71"></script>

<script>
  const IRLID_TS_TOL_S = 90;
  const IRLID_DIST_TOL_M = 12;

  const KEY_PREF_CAM = "irlid_preferred_camera_id";
  const KEY_RECEIPTS = "irlid_receipts";
  const KEY_SELF  = "irlid_resp_self";
  const KEY_GUEST = "irlid_resp_other";
  const KEY_LAST_HELLO_B64 = "irlid_last_hello_b64";
  const KEY_LAST_SELF_RESP = "irlid_last_self_response";

  const statusEl = document.getElementById("status");
  const responseArea = document.getElementById("responseArea");
  const scanTheirRespBtn = document.getElementById("scanTheirRespBtn");
  const showReceiptBtn = document.getElementById("showReceiptBtn");
  const clearLocalBtn = document.getElementById("clearLocalBtn");
  const debugControls = document.getElementById("debugControls");

  const scannerEl = document.getElementById("scanner");
  const responseQrEl = document.getElementById("responseQr");

  let lastCombinedUrl = null;
  let html5QrCode = null;

  function setStatus(msg){
    statusEl.style.whiteSpace = "";
    statusEl.style.color = "";
    statusEl.textContent = msg;
  }

  function setError(msg){
    statusEl.style.whiteSpace = "pre-wrap";
    statusEl.style.color = "#8b0000";
    statusEl.textContent = msg;
  }

  window.addEventListener("error", (e) => {
    setError("JS Error:\n" + (e.error && e.error.stack ? e.error.stack : (e.message || String(e))));
  });
  window.addEventListener("unhandledrejection", (e) => {
    const r = e.reason;
    setError("Promise Error:\n" + (r && r.stack ? r.stack : String(r)));
  });

  function isDebug(){
    try{
      const qs = new URLSearchParams(location.search || "");
      if (qs.get("debug") === "1" || qs.get("debug") === "true") return true;
    }catch{}
    try{
      const v = localStorage.getItem("irlid_debug");
      if (v === "1" || v === "true") return true;
    }catch{}
    try{
      const h = location.hash || "";
      if (/(?:^|[#&])DEBUG=(1|true)(?:&|$)/i.test(h)) return true;
    }catch{}
    return false;
  }

  if (debugControls) debugControls.style.display = isDebug() ? "block" : "none";

  function getHelloFromHash(){
    const h = location.hash || "";
    const m = h.match(/HELLO=([^&]+)/);
    return m ? m[1] : null;
  }

  function getSavedHello(){
    try{
      const v = localStorage.getItem(KEY_LAST_HELLO_B64);
      return v && v.trim() ? v.trim() : null;
    }catch{
      return null;
    }
  }

  function saveHello(b64){
    try{
      if (b64 && b64.trim()) localStorage.setItem(KEY_LAST_HELLO_B64, b64.trim());
    }catch{}
  }

  function loadSavedSelfResp(){
    try{
      const raw = localStorage.getItem(KEY_LAST_SELF_RESP);
      if (!raw) return null;
      return JSON.parse(raw);
    }catch{
      return null;
    }
  }

  function saveSelfResp(resp){
    try{
      localStorage.setItem(KEY_LAST_SELF_RESP, JSON.stringify(resp));
    }catch{}
  }

  function showScannerInPlace(){
    if (responseQrEl) responseQrEl.style.display = "none";
    if (scannerEl) {
      scannerEl.style.display = "block";
      try{ scannerEl.scrollIntoView({ behavior: "smooth", block: "start" }); }catch{}
    }
  }

  function showQrInPlace(){
    if (responseQrEl) responseQrEl.style.display = "";
    if (scannerEl) scannerEl.style.display = "none";
  }

  // Prefer hiding scanner until user starts it
  if (scannerEl) scannerEl.style.display = "none";

  // ------------------------
  // Generate Accept QR (RESP)
  // ------------------------
  let hello = getHelloFromHash() || getSavedHello();

  if (!window.__irlid_last_self_response) {
    const saved = loadSavedSelfResp();
    if (saved && (saved.type === "response" || (saved.v === 3 && saved.pk && saved.pl && saved.s))) {
      window.__irlid_last_self_response = saved;
    }
  }

  async function initHelloReturnQr(){
    if (typeof makeReturnForHelloAsync !== "function") {
      setError("Error: makeReturnForHelloAsync() missing.\nCheck js/sign.js is loading (and versions match).");
      return;
    }
    if (typeof irlidEncodeForQR !== "function") {
      setError("Error: irlidEncodeForQR() missing.\nThis usually means an old cached js/sign.js is still being served.\nBump ?v= in all pages.");
      return;
    }
    if (typeof makeQR !== "function") {
      setError("Error: makeQR() missing.\nCheck js/qr.js is loading.");
      return;
    }

    if (!hello) {
      if (responseQrEl) {
        responseQrEl.innerHTML = "";
        responseQrEl.style.display = "none";
      }
      showReceiptBtn.style.display = "none";
      lastCombinedUrl = null;
      setStatus("Ready. Scan a Signed HELLO (Offer) from Home to begin.");
      return;
    }

    saveHello(hello);

    try{
      setStatus("Getting location & signing…");

      const respObj = await makeReturnForHelloAsync(hello, { tsTolS: IRLID_TS_TOL_S });
      saveSelfResp(respObj);

      const encoded = await irlidEncodeForQR(respObj);
      const url = new URL(location.href);
      url.hash = "RESP=" + encoded;

      await makeQR("responseQr", url.toString(), 360);
      showQrInPlace();

      setStatus("Accept ready. Show this QR to the other person.");
      showReceiptBtn.style.display = "none";
      lastCombinedUrl = null;
    }catch(e){
      setError(
        "Error: " + (e && e.message ? e.message : String(e)) +
        "\n\nIf location is blocked:\n• Enable location permission for this site\n• Reload and try again"
      );
      console.error(e);
    }
  }

  window.addEventListener("hashchange", () => {
    const h = getHelloFromHash();
    if (h) {
      hello = h;
      saveHello(hello);
    } else {
      hello = getSavedHello();
    }
    initHelloReturnQr();
  });

  initHelloReturnQr();

  // ------------------------
  // Camera selection
  // ------------------------
  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");
  const cameraSelect = document.getElementById("cameraSelect");

  function getStoredPreferredCameraId(){
    try{
      const v = localStorage.getItem(KEY_PREF_CAM);
      return v && v.trim() ? v.trim() : null;
    }catch{ return null; }
  }
  function setStoredPreferredCameraId(id){
    try{ localStorage.setItem(KEY_PREF_CAM, id || ""); }catch{}
  }

  function scoreRearLabel(label){
    const s = (label || "").toLowerCase();
    let score = 0;
    if (s.includes("back")) score += 80;
    if (s.includes("rear")) score += 80;
    if (s.includes("environment")) score += 80;
    if (s.includes("front")) score -= 120;
    if (s.includes("selfie")) score -= 120;
    return score;
  }

  async function listCamerasAndSelectDefault(){
    const all = await navigator.mediaDevices.enumerateDevices();
    const devices = all.filter(d => d.kind === "videoinput");

    cameraSelect.innerHTML = "";
    for (const d of devices){
      const opt = document.createElement("option");
      opt.value = d.deviceId;
      opt.textContent = d.label || d.deviceId;
      cameraSelect.appendChild(opt);
    }
    if (!devices.length) return;

    const stored = getStoredPreferredCameraId();
    if (stored && devices.some(d => d.deviceId === stored)){
      cameraSelect.value = stored;
      return;
    }

    const ranked = devices
      .map((d, idx) => ({ id: d.deviceId, label: d.label || "", idx, score: scoreRearLabel(d.label || "") }))
      .sort((a,b) => (b.score !== a.score ? b.score - a.score : b.idx - a.idx));

    const best = ranked[0];
    const chosenId = (best && best.score > 0) ? best.id : devices[devices.length - 1].deviceId;
    cameraSelect.value = chosenId;
    setStoredPreferredCameraId(chosenId);
  }

  // ------------------------
  // Scanner logic
  // ------------------------
  function classify(text){
    const t = (text || "").trim();
    const rxHello = /(?:^|[#&])HELLO=([^&]+)/;
    const rxResp  = /(?:^|[#&])RESP=([A-Za-z0-9\-_]+)/;
    const rxComb  = /(?:^|[#&])COMB=([A-Za-z0-9\-_]+)/;

    let m = t.match(rxHello); if (m) return { kind:"HELLO", v:m[1] };
    m = t.match(rxComb); if (m) return { kind:"COMB", v:m[1] };
    m = t.match(rxResp); if (m) return { kind:"RESP", v:m[1] };

    try{
      const u = new URL(t);
      const h = u.hash || "";
      m = h.match(rxHello); if (m) return { kind:"HELLO", v:m[1] };
      m = h.match(rxComb); if (m) return { kind:"COMB", v:m[1] };
      m = h.match(rxResp); if (m) return { kind:"RESP", v:m[1] };
    }catch{}

    return { kind:"UNKNOWN", v:null };
  }

  function storeCombinedReceipt(combinedObj){
    try{
      if (combinedObj && combinedObj.a) localStorage.setItem(KEY_SELF, JSON.stringify(combinedObj.a));
      if (combinedObj && combinedObj.b) localStorage.setItem(KEY_GUEST, JSON.stringify(combinedObj.b));
    }catch{}

    try{
      const raw = localStorage.getItem(KEY_RECEIPTS);
      const list = raw ? JSON.parse(raw) : [];
      list.unshift({ ts: Date.now(), combined: combinedObj });
      localStorage.setItem(KEY_RECEIPTS, JSON.stringify(list.slice(0, 200)));
    }catch{}
  }

  async function ensureSelfResponseForHello(){
    if (window.__irlid_last_self_response && (window.__irlid_last_self_response.type === "response" || (window.__irlid_last_self_response.v === 3 && window.__irlid_last_self_response.pk))) return;

    const saved = loadSavedSelfResp();
    if (saved && (saved.type === "response" || (saved.v === 3 && saved.pk && saved.pl && saved.s))) {
      window.__irlid_last_self_response = saved;
      return;
    }

    if (!hello) throw new Error("HELLO missing. Scan a HELLO first.");

    setStatus("Creating self Accept (location + time)…");
    const selfResp = await makeReturnForHelloAsync(hello, { tsTolS: IRLID_TS_TOL_S });
    window.__irlid_last_self_response = selfResp;
    saveSelfResp(selfResp);
  }

  async function handleScannedResponseB64(respB64){
    if (!hello) throw new Error("No HELLO loaded. Scan a HELLO first.");
    if (typeof irlidDecodeFromQR !== "function") throw new Error("irlidDecodeFromQR() missing (sign.js mismatch).");
    if (typeof processScannedResponse !== "function") throw new Error("processScannedResponse() missing (sign.js mismatch).");

    await ensureSelfResponseForHello();

    const otherRespObj = await irlidDecodeFromQR(respB64);

    const out = await processScannedResponse(otherRespObj, {
      hello,
      tsTolS: IRLID_TS_TOL_S,
      distTolM: IRLID_DIST_TOL_M
    });

    const combEncoded = await irlidEncodeForQR(out.combined);
    lastCombinedUrl = "receipt.html#COMB=" + combEncoded;

    storeCombinedReceipt(out.combined);

    showReceiptBtn.style.display = "inline-flex";
    setStatus("Verified. Opening combined receipt…");
  }

  async function stopScanner(){
    if (!html5QrCode) { setStatus("Stopped."); return; }
    try { await html5QrCode.stop(); } catch {}
    try { await html5QrCode.clear(); } catch {}
    html5QrCode = null;
    setStatus("Stopped.");
    if (hello) showQrInPlace();
  }

  async function startScanner(){
    await stopScanner();

    if (!cameraSelect.value) {
      await listCamerasAndSelectDefault();
    }
    const camId = cameraSelect.value;
    if (!camId) throw new Error("No camera selected.");
    setStoredPreferredCameraId(camId);

    setStatus("Scanning…");
    if (scannerEl) scannerEl.innerHTML = "";
    html5QrCode = new Html5Qrcode("scanner");

    const config = {
      fps: 12,
      qrbox: { width: 280, height: 280 },
      disableFlip: false
    };

    await html5QrCode.start(
      camId,
      config,
      async (text) => {
        await stopScanner();
        const c = classify(text);

        if (c.kind === "HELLO") {
          const v = (c.v || "").trim();
          hello = v || null;
          if (hello) saveHello(hello);
          setStatus("HELLO detected. Creating your Accept QR…");
          location.hash = "HELLO=" + (v || "");
          return;
        }

        if (c.kind === "COMB") {
          setStatus("Combined receipt detected. Opening…");
          location.href = "receipt.html#COMB=" + (c.v || "");
          return;
        }

        if (c.kind === "RESP") {
          if (hello) {
            try{
              setStatus("Accept detected. Verifying…");
              await handleScannedResponseB64(c.v || "");
              if (lastCombinedUrl) location.href = lastCombinedUrl;
              return;
            }catch(e){
              setError("Response verify failed:\n" + (e && e.message ? e.message : String(e)));
              console.error(e);
              return;
            }
          }
          setStatus("Response detected (no HELLO loaded). Opening single receipt…");
          location.href = "receipt.html#RESP=" + (c.v || "");
          return;
        }

        setStatus("QR detected (unrecognized).");
      },
      () => {}
    );
  }

  // Buttons
  scanTheirRespBtn.addEventListener("click", async () => {
    try{
      if (!hello) {
        setStatus("Scan a HELLO first (Home generates a HELLO QR).");
        return;
      }
      await listCamerasAndSelectDefault();
      showScannerInPlace();
      await startScanner();
    }catch(e){
      setError("Camera error:\n" + (e && e.message ? e.message : String(e)));
      console.error(e);
    }
  });

  showReceiptBtn.addEventListener("click", () => {
    if (lastCombinedUrl) location.href = lastCombinedUrl;
  });

  if (clearLocalBtn) {
    clearLocalBtn.addEventListener("click", () => {
      try{
        [
          KEY_LAST_HELLO_B64,
          KEY_LAST_SELF_RESP,
          KEY_SELF,
          KEY_GUEST,
          KEY_RECEIPTS,
          "irlid_receipt_last",
          KEY_PREF_CAM
        ].forEach(k => localStorage.removeItem(k));
      }catch{}
      hello = null;
      lastCombinedUrl = null;
      try{ delete window.__irlid_last_self_response; }catch{}
      location.hash = "";
      if (responseQrEl) { responseQrEl.innerHTML = ""; responseQrEl.style.display = "none"; }
      if (scannerEl) { scannerEl.innerHTML = ""; scannerEl.style.display = "none"; }
      showReceiptBtn.style.display = "none";
      setStatus("Cleared local data.");
      initHelloReturnQr();
    });
  }

  startBtn.addEventListener("click", async () => {
    try{
      await listCamerasAndSelectDefault();
      showScannerInPlace();
      await startScanner();
    }catch(e){
      setError("Camera error:\n" + (e && e.message ? e.message : String(e)));
      console.error(e);
    }
  });

  stopBtn.addEventListener("click", async () => {
    try{ await stopScanner(); }catch(e){ console.error(e); }
  });

  cameraSelect.addEventListener("change", () => {
    setStoredPreferredCameraId(cameraSelect.value);
  });

  // Populate camera list
  (async () => {
    try { await listCamerasAndSelectDefault(); } catch {}
  })();
</script>

</body>
</html>
