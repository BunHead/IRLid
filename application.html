<!DOCTYPE html>
<!-- Deploy 26 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Scan</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    :root{
      --black:#000;
      --white:#fff;
      --mobile-nav-h:124px;
      --side-pad:12px;
      --top-gap:10px;
    }

    html,body{height:100%;}
    body{margin:0;background:#fff;overflow-x:hidden;}

    header.site-header{width:100%;background:#fff;}
    .brand-wrap{padding:10px 14px 0;}
    .brand{display:inline-flex;text-decoration:none;color:inherit;align-items:center;}

    nav.site-nav{
      width:100%;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:0;
      padding:0;
      margin:0;
      position:sticky;
      top:0;
      z-index:1000;
    }

    #accountSlot{ display: contents; }

    a.nav-btn,summary.nav-btn{
      border:0;
      background:#000;
      color:#fff;
      padding:10px 14px;
      font-weight:700;
      border-radius:0;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      white-space:nowrap;
    }
    a.nav-btn:hover,summary.nav-btn:hover{background:#111;}

    details.nav-dropdown{position:relative;}
    details.nav-dropdown>summary{list-style:none;}
    details.nav-dropdown>summary::-webkit-details-marker{display:none;}

    .dropdown-menu{
      position:absolute;
      top:100%;
      left:0;
      min-width:180px;
      background:#111;
      border:0;
      padding:0;
      margin:0;
      z-index:1200;
    }
    .dropdown-menu a{
      display:block;
      width:100%;
      text-align:left;
      padding:12px 14px;
      color:#fff;
      background:#111;
      border:0;
      text-decoration:none;
      font-weight:700;
      border-top:1px solid rgba(255,255,255,0.06);
      box-sizing:border-box;
    }
    .dropdown-menu a:hover{ background:#000; }

    main.page-main{
      max-width:980px;
      margin:0 auto;
      padding:var(--top-gap) var(--side-pad) 20px;
      box-sizing:border-box;
    }

    .small{text-align:center; margin:8px 0;}

    #responseArea{
      display:none;
      text-align:center;
      margin-top:10px;
      margin-bottom:10px;
    }
    #responseQr canvas, #responseQr img{
      display:block;
      margin:0 auto;
      max-width:100%;
      height:auto;
      image-rendering: pixelated;
    }

    #scanner{
      width:min(92vw,460px);
      height:min(92vw,460px);
      margin:10px auto 8px;
      border:2px dashed #999;
      display:flex;
      align-items:center;
      justify-content:center;
      box-sizing:border-box;
      overflow:hidden;
      background:#f8f8f8;
    }

    .controls{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin:10px 0;
    }

    #debug{
      display:none;
      white-space:pre-wrap;
      font-family:monospace;
      font-size:12px;
      border:1px solid #ddd;
      padding:10px;
      margin-top:12px;
      box-sizing:border-box;
    }

    @media(max-width:720px){
      .brand-wrap{padding:4px var(--side-pad) 0;}
      #logo{max-width:72vw;max-height:90px;width:auto;height:auto;display:block;}

      nav.site-nav{
        position:fixed;
        top:auto;
        bottom:env(safe-area-inset-bottom,0);
        left:0;
        right:0;
        height:var(--mobile-nav-h);
        display:grid;
        grid-template-columns:1fr 1fr;
        grid-template-rows:1fr 1fr;
        z-index:2000;
      }

      a.nav-btn,summary.nav-btn{
        width:100%;
        height:100%;
        padding:0;
        font-size:18px;
      }

      .dropdown-menu{
        position:fixed;
        left:0;
        right:0;
        top:auto;
        bottom:calc(var(--mobile-nav-h) + env(safe-area-inset-bottom,0));
      }

      body{
        padding-bottom:calc(var(--mobile-nav-h) + env(safe-area-inset-bottom,0));
      }
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="brand-wrap">
    <a class="brand" href="index.html" aria-label="IRLid Home">
      <img src="logo.png" alt="IRLid Logo" id="logo">
    </a>
  </div>

  <nav class="site-nav" aria-label="Primary">
    <a class="nav-btn" href="index.html">Home</a>
    <a class="nav-btn" href="application.html">Scan</a>

    <details class="nav-dropdown">
      <summary class="nav-btn">About ▼</summary>
      <div class="dropdown-menu" role="menu" aria-label="About menu">
        <a href="about.html">About</a>
        <a href="features.html">Features</a>
        <a href="contact.html">Contact</a>
      </div>
    </details>

    <span id="accountSlot"></span>
  </nav>
</header>

<main class="page-main">
  <p id="status" class="small">Ready.</p>

  <div class="controls">
    <button class="btn" id="startBtn">Start Scanner</button>
    <button class="btn secondary" id="stopBtn">Stop</button>
  </div>

  <div id="responseArea">
    <h3 id="responseTitle">Your Return QR</h3>
    <div class="qr-box" id="responseQr"></div>
    <p class="small" id="responseHint" style="margin-top:8px;">Show this to the other person to scan.</p>
  </div>

  <div id="scanner"></div>

  <div class="small">
    <label for="cameraSelect"><b>Camera:</b></label><br>
    <select id="cameraSelect"></select>
  </div>

  <div id="debug"></div>
</main>

<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script src="js/sign.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="js/qr.js?v=deploy19"></script>

<script>
  // thresholds (as requested)
  const IRLID_TS_TOL_S = 60;
  const IRLID_DIST_TOL_M = 2;

  // storage keys
  const KEY_SELF  = "irlid_resp_self";
  const KEY_OTHER = "irlid_resp_other";

  const debugMode = new URLSearchParams(location.search).get("debug") === "1";
  const debugEl = document.getElementById("debug");
  if (debugMode) debugEl.style.display = "block";

  function log(...args){
    if (!debugMode) return;
    debugEl.textContent += args.map(a => (typeof a === "string" ? a : JSON.stringify(a, null, 2))).join(" ") + "\n";
  }

  // helpers: b64url JSON decode (supports raw b64url JSON or full URL/hash)
  function b64urlToBytes(str){
    str = (str || "").replace(/-/g, "+").replace(/_/g, "/");
    while (str.length % 4) str += "=";
    const bin = atob(str);
    const out = new Uint8Array(bin.length);
    for (let i=0;i<bin.length;i++) out[i] = bin.charCodeAt(i);
    return out;
  }
  function parseB64urlJson(str){
    const bytes = b64urlToBytes(str);
    const json = new TextDecoder().decode(bytes);
    return JSON.parse(json);
  }

  // HELLO mode
  const hash = location.hash || "";
  const helloMatch = hash.match(/HELLO=([^&]+)/);
  const hello = helloMatch ? helloMatch[1] : null;

  const statusEl = document.getElementById("status");
  const responseArea = document.getElementById("responseArea");
  const responseQrElId = "responseQr";
  const responseTitle = document.getElementById("responseTitle");
  const responseHint = document.getElementById("responseHint");

  // Always generate a Return QR immediately in HELLO mode (Person B)
  if (hello) {
    try{
      responseArea.style.display = "block";
      responseTitle.textContent = "Your Return QR";
      responseHint.textContent = "Show this to the other person to scan.";

      // application.html existing behavior should create response object via qr.js
      if (typeof makeReturnForHello !== "function") {
        throw new Error("makeReturnForHello() missing (js/qr.js not loaded)");
      }
      const returnObj = makeReturnForHello(hello);
      const encoded = btoa(JSON.stringify(returnObj)).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/g,"");
      const url = new URL(location.href);
      url.hash = "RESP=" + encoded;

      makeQR(responseQrElId, url.toString(), 360);
      statusEl.textContent = "Ready (HELLO mode).";
    }catch(e){
      statusEl.textContent = "Error: " + e;
      log(e);
    }
  }

  // scanner
  let html5QrCode = null;
  const scannerElId = "scanner";
  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");
  const cameraSelect = document.getElementById("cameraSelect");

  function setStatus(msg){ statusEl.textContent = msg; }

  async function listCameras(){
    const devices = await Html5Qrcode.getCameras();
    cameraSelect.innerHTML = "";
    for (const d of devices){
      const opt = document.createElement("option");
      opt.value = d.id;
      opt.textContent = d.label || d.id;
      cameraSelect.appendChild(opt);
    }
    return devices;
  }

  function extractRespFromText(text){
    if (!text) return null;

    // full receipt URL or application URL
    const m1 = text.match(/RESP=([A-Za-z0-9\-_]+)/);
    if (m1) return parseB64urlJson(m1[1]);

    // raw b64url json
    if (/^[A-Za-z0-9\-_]+$/.test(text) && text.length > 40){
      try { return parseB64urlJson(text); } catch {}
    }

    // plain JSON
    if (text.trim().startsWith("{")){
      try { return JSON.parse(text); } catch {}
    }

    return null;
  }

  async function onScanSuccess(decodedText){
    log("scan:", decodedText);

    // In HELLO mode, scanning a response should auto-detect and process
    const resp = extractRespFromText(decodedText);
    if (resp && resp.type === "response"){
      try{
        if (typeof processScannedResponse !== "function"){
          throw new Error("processScannedResponse() missing (js/qr.js not loaded)");
        }
        const out = await processScannedResponse(resp, { tsTolS: IRLID_TS_TOL_S, distTolM: IRLID_DIST_TOL_M });
        log("processed:", out);

        // Store receipts as before
        if (out && out.self) localStorage.setItem(KEY_SELF, JSON.stringify(out.self));
        if (out && out.other) localStorage.setItem(KEY_OTHER, JSON.stringify(out.other));

        // Redirect to receipt page
        location.href = "receipt.html";
      }catch(e){
        setStatus("Error processing QR: " + e);
        log(e);
      }
    } else {
      setStatus("QR detected (not a response).");
    }
  }

  async function startScanner(){
    setStatus("Starting camera…");
    if (!html5QrCode) html5QrCode = new Html5Qrcode(scannerElId);

    const camId = cameraSelect.value;
    await html5QrCode.start(
      { deviceId: { exact: camId } },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      onScanSuccess
    );
    setStatus("Scanning…");
  }

  async function stopScanner(){
    if (!html5QrCode) return;
    try{ await html5QrCode.stop(); }catch{}
    setStatus("Stopped.");
  }

  startBtn.addEventListener("click", async () => {
    try{
      await listCameras();
      await startScanner();
    }catch(e){
      setStatus("Camera error: " + e);
      log(e);
    }
  });

  stopBtn.addEventListener("click", stopScanner);

  // populate cameras early
  (async () => {
    try{
      await listCameras();
    }catch(e){
      log("camera list error", e);
    }
  })();
</script>

</body>
</html>
