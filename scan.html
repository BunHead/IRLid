<!-- scan.html — Pure Scanner DP81 -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IRLid — Scan</title>
<link rel="stylesheet" href="css/style.css">

<style>

.scan-main {
  padding: 0 0 calc(var(--mobile-nav-h) + 22px);
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Camera viewport frame (UNCHANGED SIZE) */

.scan-viewport {
  position: relative;
  width: 100%;
  max-width: 720px;
  min-height: 280px;
  background: #0a0a0a;
  overflow: hidden;
}

/* Mobile frame size stays same */
@media (max-width: 720px) {
  .scan-viewport {
    max-width: 480px;
  }
}

/* Scanner video */

#scanner {
  position: relative;
  width: 100%;
  z-index: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

#scanner video {
  width: 100% !important;
  height: auto !important;
  display: block !important;
}

/* MOBILE: zoom video out ~25% */
@media (max-width: 720px) {
  #scanner video {
    transform: scale(0.75);
    transform-origin: center center;
  }
}

/* override html5-qrcode region shading */

#scanner > div {
  max-width: 100% !important;
}

#qr-shaded-region {
  display: none !important;
}

/* QR overlay canvas */

#trackingCanvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 4;
  pointer-events: none;
  display: none;
}

.scan-viewport.state-scanning #trackingCanvas {
  display: block;
}

/* Controls */

.scan-below {
  width: 100%;
  max-width: 720px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.scan-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 14px 0;
}

.scan-status {
  font-size: 14px;
  color: #888;
  min-height: 22px;
  padding: 0 14px;
}

.scan-status.active {
  color: #e00;
  font-weight: 600;
}

.active-scan {
  background: #e00 !important;
  border-color: #e00 !important;
  color: #fff !important;
}

#debugControls {
  display: none;
  padding: 8px 14px 0;
}

</style>
</head>

<body>

<header class="site-header">
<div class="brand-wrap">
<a class="brand" href="index.html">
<img src="logo.png" alt="IRLid Logo" id="logo">
</a>
</div>

<nav class="site-nav">

<a class="nav-btn" href="index.html">Home</a>
<a class="nav-btn" href="scan.html">Scan</a>

<details class="nav-dropdown">
<summary class="nav-btn">Info ▼</summary>
<div class="dropdown-menu">
<a href="check.html">Check</a>
<a href="about.html">About</a>
<a href="features.html">Features</a>
<a href="contact.html">Contact</a>
</div>
</details>

<span id="accountSlot"></span>

</nav>
</header>

<main class="scan-main">

<div class="scan-viewport state-idle" id="scanViewport">

<canvas id="trackingCanvas"></canvas>

<div id="scanner"></div>

</div>

<div class="scan-below">

<div class="scan-controls">

<button class="btn" id="scanBtn">Scan</button>

<button class="btn active-scan" id="stopBtn" style="display:none;">Stop</button>

<select id="cameraSelect"></select>

</div>

<div class="scan-status" id="status">
Ready — tap Scan to scan any IRLid QR code.
</div>

<div id="debugControls">
<button class="btn secondary" id="clearLocalBtn">Clear local data</button>
</div>

</div>

</main>

<script src="js/auth.js"></script>
<script src="js/backend.js"></script>
<script src="js/nav.js"></script>
<script src="js/sign.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<script src="js/qr.js?v=63"></script>

<script>

const statusEl = document.getElementById("status")
const scanBtn = document.getElementById("scanBtn")
const stopBtn = document.getElementById("stopBtn")
const scannerEl = document.getElementById("scanner")
const cameraSelect = document.getElementById("cameraSelect")

let html5QrCode = null

function setStatus(msg, active){
statusEl.textContent = msg
statusEl.classList.toggle("active",!!active)
}

async function listCameras(){

const cams = await Html5Qrcode.getCameras()

cameraSelect.innerHTML = ""

cams.forEach((c,i)=>{

const opt = document.createElement("option")

opt.value = c.id
opt.textContent = c.label || "Camera " + i

cameraSelect.appendChild(opt)

})

}

async function stopScanner(){

stopBtn.style.display="none"
scanBtn.style.display=""

if(!html5QrCode) return

await html5QrCode.stop()

await html5QrCode.clear()

html5QrCode=null

}

async function startScanner(){

await stopScanner()

scanBtn.style.display="none"
stopBtn.style.display=""

setStatus("Scanning",true)

html5QrCode = new Html5Qrcode("scanner")

await html5QrCode.start(
{ deviceId:{ exact: cameraSelect.value } },
{ fps:15 },
(text)=>{

setStatus("QR detected")

console.log(text)

},
()=>{}
)

}

scanBtn.onclick=async()=>{
await listCameras()
await startScanner()
}

stopBtn.onclick=stopScanner

listCameras()

</script>

</body>
</html>
