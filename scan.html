<!-- scan.html — Pure Scanner DP80 -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Scan</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .scan-main {
      padding: 0 0 calc(var(--mobile-nav-h) + 22px);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Viewport: camera area — responsive to actual video feed */
    .scan-viewport {
      position: relative;
      width: 100%;
      max-width: 720px;
      min-height: 280px;
      background: #0a0a0a;
      overflow: hidden;
    }
    /* Mobile: smaller viewport that fits a phone screen */
    @media (max-width: 720px) {
      .scan-viewport {
        width: calc(100vw - 24px);
        max-width: calc(100vw - 24px);
      }
    }
    /* When scanning, let the video dictate the height */
    .scan-viewport.state-scanning {
      aspect-ratio: auto;
    }
    /* When idle, keep a reasonable placeholder shape */
    .scan-viewport.state-idle {
      aspect-ratio: 4 / 3;
    }

    /* Idle state: ghost QR finder patterns */
    .scan-finders {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }
    .scan-viewport.state-scanning .scan-finders { display: none; }

    .finder {
      position: absolute;
      width: 72px;
      height: 72px;
    }
    .finder.tl { top: 10%; left: 10%; }
    .finder.tr { top: 10%; right: 10%; }
    .finder.bl { bottom: 10%; left: 10%; }

    .finder .f-outer {
      position: absolute; inset: 0;
      border: 3px solid rgba(255,255,255,.18);
    }
    .finder .f-inner {
      position: absolute; inset: 18%; 
      border: 2px solid rgba(255,255,255,.12);
    }
    .finder .f-core {
      position: absolute; inset: 30%;
      background: rgba(255,255,255,.10);
    }

    .idle-label {
      position: absolute;
      bottom: 18%;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,.45);
      font: 600 14px/1.3 system-ui, sans-serif;
      text-transform: uppercase;
      letter-spacing: .08em;
      z-index: 2;
    }
    .scan-viewport.state-scanning .idle-label { display: none; }

    /* Scanner video (html5-qrcode renders here) */
    #scanner { position: relative; width: 100%; z-index: 1; }
    #scanner video { width: 100% !important; height: auto !important; display: block !important; }
    /* Override html5-qrcode's internal scan region shading */
    #scanner > div { max-width: 100% !important; }
    #qr-shaded-region { display: none !important; }

    /* QR tracking overlay canvas — sits on top of video */
    #trackingCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 4;
      pointer-events: none;
      display: none;
    }
    .scan-viewport.state-scanning #trackingCanvas { display: block; }

    /* Dim overlay with clear centre cutout (scanning state) */
    .scan-dim {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      display: none;
    }
    .scan-viewport.state-scanning .scan-dim { display: block; }

    /* Controls below the viewport */
    .scan-below {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .scan-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0;
    }

    .scan-status {
      font-size: 14px;
      color: #888;
      min-height: 22px;
      padding: 0 14px;
    }
    .scan-status.active { color: #e00; font-weight: 600; }

    .active-scan {
      background: #e00 !important;
      border-color: #e00 !important;
      color: #fff !important;
    }

    #debugControls { display: none; padding: 8px 14px 0; }
  </style>
</head>

<body>

<header class="site-header">
  <div class="brand-wrap">
    <a class="brand" href="index.html" aria-label="IRLid Home">
      <img src="logo.png" alt="IRLid Logo" id="logo" onerror="this.style.display='none'">
    </a>
  </div>
  <nav class="site-nav" aria-label="Primary">
    <a class="nav-btn" href="index.html">Home</a>
    <a class="nav-btn" href="scan.html">Scan</a>
    <details class="nav-dropdown" id="aboutDropdown">
      <summary class="nav-btn">Info ▼</summary>
      <div class="dropdown-menu" role="menu" aria-label="Info menu">
        <a href="check.html">Check</a>
        <a href="about.html">About</a>
        <a href="features.html">Features</a>
        <a href="contact.html">Contact</a>
      </div>
    </details>
    <span id="accountSlot"></span>
  </nav>
</header>

<main class="scan-main">
  <div class="scan-viewport state-idle" id="scanViewport">
    <!-- Idle state: ghost finder patterns -->
    <div class="scan-finders">
      <div class="finder tl"><div class="f-outer"></div><div class="f-inner"></div><div class="f-core"></div></div>
      <div class="finder tr"><div class="f-outer"></div><div class="f-inner"></div><div class="f-core"></div></div>
      <div class="finder bl"><div class="f-outer"></div><div class="f-inner"></div><div class="f-core"></div></div>
    </div>
    <div class="idle-label">Point at any IRLid QR</div>

    <!-- Dim overlay (scanning state) -->
    <div class="scan-dim" id="scanDim"></div>

    <!-- Real-time QR tracking overlay -->
    <canvas id="trackingCanvas"></canvas>

    <!-- html5-qrcode renders the video here -->
    <div id="scanner"></div>
  </div>

  <div class="scan-below">
    <div class="scan-controls">
      <button class="btn" id="scanBtn">Scan</button>
      <button class="btn active-scan" id="stopBtn" style="display:none;">Stop</button>
      <select id="cameraSelect" aria-label="Camera"></select>
    </div>
    <div class="scan-status" id="status">Ready — tap Scan to scan any IRLid QR code.</div>
    <div id="debugControls">
      <button class="btn secondary" id="clearLocalBtn" type="button">Clear local data</button>
    </div>
  </div>
</main>

<script src="js/auth.js"></script>
<script src="js/backend.js"></script>
<script src="js/nav.js"></script>
<script src="js/sign.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="js/qr.js?v=63"></script>

<script>
  const IRLID_TS_TOL_S = 90;
  const IRLID_DIST_TOL_M = 12;
  const KEY_PREF_CAM = "irlid_preferred_camera_id";

  // ========== Debug panel ==========
  function isDebugMode() {
    try {
      if (new URLSearchParams(location.search).get("debug") === "1") return true;
      if (localStorage.getItem("irlid_debug") === "1") return true;
    } catch(e){}
    return false;
  }
  const debugPanel = document.createElement("div");
  debugPanel.id = "debugPanel";
  debugPanel.style.cssText = "position:fixed;top:50px;left:0;right:0;max-height:250px;overflow-y:auto;background:rgba(0,0,0,0.92);color:#0f0;font:13px monospace;padding:10px;z-index:9999;display:none;";
  document.body.appendChild(debugPanel);
  const debugToggle = document.createElement("button");
  debugToggle.textContent = "DBG";
  debugToggle.style.cssText = "position:fixed;top:50px;right:8px;z-index:10000;background:#222;color:#0f0;border:2px solid #0f0;padding:6px 12px;font:bold 14px monospace;border-radius:4px;display:none;";
  debugToggle.onclick = () => { debugPanel.style.display = debugPanel.style.display === "none" ? "block" : "none"; };
  document.body.appendChild(debugToggle);
  if (isDebugMode()) debugToggle.style.display = "block";
  function dbg(msg) {
    console.log("[IRLid]", msg);
    const line = document.createElement("div");
    line.textContent = new Date().toLocaleTimeString() + " " + msg;
    debugPanel.appendChild(line);
    debugPanel.scrollTop = debugPanel.scrollHeight;
  }

  // ========== DOM refs ==========
  const statusEl      = document.getElementById("status");
  const scanViewport  = document.getElementById("scanViewport");
  const scanBtn       = document.getElementById("scanBtn");
  const stopBtn       = document.getElementById("stopBtn");
  const scannerEl     = document.getElementById("scanner");
  const clearLocalBtn = document.getElementById("clearLocalBtn");
  const cameraSelect  = document.getElementById("cameraSelect");
  const trackingCanvas = document.getElementById("trackingCanvas");
  const trackingCtx   = trackingCanvas.getContext("2d");

  let html5QrCode = null;
  let trackingRAF = null;
  let lastQrCorners = null;       // smoothed corners {tl, tr, br, bl}
  let lastQrTime = 0;             // when we last saw a QR
  let qrDetectedCount = 0;        // consecutive frames with QR

  function setStatus(msg, active) {
    statusEl.textContent = msg;
    statusEl.classList.toggle("active", !!active);
  }

  function setViewportState(s) {
    scanViewport.className = "scan-viewport state-" + s;
  }

  // ========== QR Classify ==========
  function classify(text){
    const t = (text || "").trim();
    if (t.startsWith("RZ:")) return { kind:"RESP_Z", v: t.slice(3) };
    if (t.startsWith("R:"))  return { kind:"RESP",   v: t.slice(2) };
    if (t.startsWith("HZ:")) return { kind:"HELLO_Z", v: t.slice(3) };
    if (t.startsWith("H:"))  return { kind:"HELLO",  v: t.slice(2) };

    const rxHelloZ  = /(?:^|[#&])HZ=([^&]+)/;
    const rxHello   = /(?:^|[#&])HELLO=([^&]+)/;
    const rxResp    = /(?:^|[#&])RESP=([A-Za-z0-9\-_]+)/;
    const rxComb    = /(?:^|[#&])COMB=([A-Za-z0-9\-_]+)/;
    const rxReceipt = /(?:^|[#&])receipt=([A-Za-z0-9\-_]+)/;

    let m;
    const sources = [t];
    try { sources.push(new URL(t).hash || ""); } catch {}

    for (const s of sources) {
      m = s.match(rxHelloZ);  if (m) return { kind:"HELLO_Z", v:m[1] };
      m = s.match(rxHello);   if (m) return { kind:"HELLO",   v:m[1] };
      m = s.match(rxComb);    if (m) return { kind:"COMB",    v:m[1] };
      m = s.match(rxResp);    if (m) return { kind:"RESP",    v:m[1] };
      m = s.match(rxReceipt); if (m) return { kind:"RECEIPT", v:m[1] };
    }
    return { kind:"UNKNOWN", v:null };
  }

  // ========== Camera selection ==========
  function getStoredPreferredCameraId(){
    try{ const v = localStorage.getItem(KEY_PREF_CAM); return v && v.trim() ? v.trim() : null; }catch{ return null; }
  }
  function setStoredPreferredCameraId(id){
    try{ localStorage.setItem(KEY_PREF_CAM, id || ""); }catch{}
  }

  function scoreRearLabel(label){
    const s = (label || "").toLowerCase();
    let score = 0;
    if (s.includes("back")) score += 80;
    if (s.includes("rear")) score += 80;
    if (s.includes("environment")) score += 60;
    if (/camera\s*0/.test(s)) score += 30;
    if (s.includes("facing back")) score += 100;
    return score;
  }

  async function listCamerasAndSelectDefault(){
    if (!Html5Qrcode || !Html5Qrcode.getCameras) return;
    const cams = await Html5Qrcode.getCameras();
    if (!cams || !cams.length) throw new Error("No cameras found.");

    cameraSelect.innerHTML = "";
    cams.forEach((c, i) => {
      const opt = document.createElement("option");
      opt.value = c.id;
      opt.textContent = c.label || ("Camera " + i);
      cameraSelect.appendChild(opt);
    });

    const pref = getStoredPreferredCameraId();
    if (pref && cams.some(c => c.id === pref)) {
      cameraSelect.value = pref;
    } else {
      let bestIdx = 0, bestScore = -1;
      cams.forEach((c, i) => {
        const sc = scoreRearLabel(c.label);
        if (sc > bestScore) { bestScore = sc; bestIdx = i; }
      });
      cameraSelect.value = cams[bestIdx].id;
    }
  }

  // ========== Real-time QR tracking overlay ==========

  // Smooth interpolation for corner positions
  function lerpPt(a, b, t) {
    return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
  }

  // Draw a corner bracket (like Google Authenticator)
  function drawCornerBracket(ctx, pt, angle, len, color, lineWidth) {
    ctx.save();
    ctx.translate(pt.x, pt.y);
    ctx.rotate(angle);
    ctx.strokeStyle = color;
    ctx.lineWidth = lineWidth;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(len, 0);
    ctx.lineTo(0, 0);
    ctx.lineTo(0, len);
    ctx.stroke();
    ctx.restore();
  }

  // Draw a small filled dot at a point
  function drawDot(ctx, pt, radius, color) {
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, radius, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  }

  function drawTrackingFrame() {
    const video = scannerEl.querySelector("video");
    if (!video || video.readyState < 2) {
      trackingRAF = requestAnimationFrame(drawTrackingFrame);
      return;
    }

    const vw = video.videoWidth;
    const vh = video.videoHeight;
    if (!vw || !vh) {
      trackingRAF = requestAnimationFrame(drawTrackingFrame);
      return;
    }

    // Size canvas to the scanner element (which holds the video)
    const rect = scannerEl.getBoundingClientRect();
    if (!rect.width || !rect.height) {
      trackingRAF = requestAnimationFrame(drawTrackingFrame);
      return;
    }
    const dpr = window.devicePixelRatio || 1;
    const cw = Math.floor(rect.width * dpr);
    const ch = Math.floor(rect.height * dpr);
    if (trackingCanvas.width !== cw || trackingCanvas.height !== ch) {
      trackingCanvas.width = cw;
      trackingCanvas.height = ch;
    }

    // Sample video into an offscreen canvas for jsQR
    // Use video's actual aspect ratio for accurate corner mapping
    const sampleW = 640;
    const sampleH = Math.round(sampleW * (vh / vw));
    if (!drawTrackingFrame._sampleCanvas) {
      drawTrackingFrame._sampleCanvas = document.createElement("canvas");
    }
    const sc = drawTrackingFrame._sampleCanvas;
    if (sc.width !== sampleW || sc.height !== sampleH) {
      sc.width = sampleW;
      sc.height = sampleH;
    }
    const sctx = sc.getContext("2d", { willReadFrequently: true });

    // Boost contrast slightly for washed-out webcams
    sctx.filter = "contrast(1.15) brightness(1.05)";
    sctx.drawImage(video, 0, 0, vw, vh, 0, 0, sampleW, sampleH);
    sctx.filter = "none";
    const imgData = sctx.getImageData(0, 0, sampleW, sampleH);

    // Run jsQR to get QR location
    const qr = (typeof jsQR === "function") ? jsQR(imgData.data, sampleW, sampleH) : null;

    const now = performance.now();

    if (qr && qr.location) {
      // Map jsQR coordinates (in sample space) to canvas coordinates
      const mapPt = (p) => ({
        x: (p.x / sampleW) * cw,
        y: (p.y / sampleH) * ch
      });

      const newCorners = {
        tl: mapPt(qr.location.topLeftCorner),
        tr: mapPt(qr.location.topRightCorner),
        br: mapPt(qr.location.bottomRightCorner),
        bl: mapPt(qr.location.bottomLeftCorner)
      };

      // Smooth: interpolate towards new position
      const smoothing = lastQrCorners ? 0.35 : 1.0;
      if (lastQrCorners) {
        lastQrCorners = {
          tl: lerpPt(lastQrCorners.tl, newCorners.tl, smoothing),
          tr: lerpPt(lastQrCorners.tr, newCorners.tr, smoothing),
          br: lerpPt(lastQrCorners.br, newCorners.br, smoothing),
          bl: lerpPt(lastQrCorners.bl, newCorners.bl, smoothing)
        };
      } else {
        lastQrCorners = newCorners;
      }
      lastQrTime = now;
      qrDetectedCount = Math.min(qrDetectedCount + 1, 30);
    } else {
      // Fade out: after 300ms with no detection, start fading
      if (now - lastQrTime > 500) {
        qrDetectedCount = Math.max(0, qrDetectedCount - 2);
      }
    }

    // Clear and draw
    trackingCtx.clearRect(0, 0, cw, ch);

    if (lastQrCorners && qrDetectedCount > 0) {
      const c = lastQrCorners;
      const alpha = Math.min(1, qrDetectedCount / 6);
      const isLocked = qrDetectedCount > 8;
      const color = isLocked ? `rgba(0, 230, 118, ${alpha})` : `rgba(255, 255, 255, ${alpha * 0.7})`;
      const fillColor = isLocked ? `rgba(0, 230, 118, ${alpha * 0.08})` : `rgba(255, 255, 255, ${alpha * 0.04})`;

      // Draw semi-transparent fill over QR area
      trackingCtx.beginPath();
      trackingCtx.moveTo(c.tl.x, c.tl.y);
      trackingCtx.lineTo(c.tr.x, c.tr.y);
      trackingCtx.lineTo(c.br.x, c.br.y);
      trackingCtx.lineTo(c.bl.x, c.bl.y);
      trackingCtx.closePath();
      trackingCtx.fillStyle = fillColor;
      trackingCtx.fill();

      // Draw connecting lines (thin)
      trackingCtx.beginPath();
      trackingCtx.moveTo(c.tl.x, c.tl.y);
      trackingCtx.lineTo(c.tr.x, c.tr.y);
      trackingCtx.lineTo(c.br.x, c.br.y);
      trackingCtx.lineTo(c.bl.x, c.bl.y);
      trackingCtx.closePath();
      trackingCtx.strokeStyle = color;
      trackingCtx.lineWidth = 1.5 * dpr;
      trackingCtx.stroke();

      // Corner bracket length scales with QR size
      const dx = c.tr.x - c.tl.x;
      const dy = c.tr.y - c.tl.y;
      const sideLen = Math.sqrt(dx * dx + dy * dy);
      const bracketLen = Math.max(12 * dpr, sideLen * 0.2);
      const lw = (isLocked ? 3.5 : 2.5) * dpr;

      // Calculate angles for each corner from the QR shape
      const angleTL = Math.atan2(c.tr.y - c.tl.y, c.tr.x - c.tl.x);
      const angleTR = Math.atan2(c.bl.y - c.tl.y, c.bl.x - c.tl.x) + Math.PI * 0.5;
      const angleBR = Math.atan2(c.tl.y - c.tr.y, c.tl.x - c.tr.x) + Math.PI;
      const angleBL = Math.atan2(c.tl.y - c.bl.y, c.tl.x - c.bl.x);

      // Draw corner brackets
      drawCornerBracket(trackingCtx, c.tl, angleTL, bracketLen, color, lw);
      drawCornerBracket(trackingCtx, c.tr, angleTR, bracketLen, color, lw);
      drawCornerBracket(trackingCtx, c.br, angleBR, bracketLen, color, lw);
      drawCornerBracket(trackingCtx, c.bl, angleBL, bracketLen, color, lw);

      // Draw corner dots when locked on
      if (isLocked) {
        const dotR = 3 * dpr;
        drawDot(trackingCtx, c.tl, dotR, color);
        drawDot(trackingCtx, c.tr, dotR, color);
        drawDot(trackingCtx, c.br, dotR, color);
        drawDot(trackingCtx, c.bl, dotR, color);
      }
    } else if (qrDetectedCount === 0) {
      // No QR visible: draw subtle scan-line animation
      const period = 3000;
      const t = (now % period) / period;
      const y = t * ch;
      const grad = trackingCtx.createLinearGradient(0, y - 2 * dpr, 0, y + 2 * dpr);
      grad.addColorStop(0, "rgba(0, 230, 118, 0)");
      grad.addColorStop(0.5, "rgba(0, 230, 118, 0.25)");
      grad.addColorStop(1, "rgba(0, 230, 118, 0)");
      trackingCtx.fillStyle = grad;
      trackingCtx.fillRect(0, y - 30 * dpr, cw, 60 * dpr);

      // Subtle centre crosshair
      trackingCtx.strokeStyle = "rgba(255, 255, 255, 0.12)";
      trackingCtx.lineWidth = 1 * dpr;
      const cx = cw / 2, cy = ch / 2;
      const chLen = 20 * dpr;
      trackingCtx.beginPath();
      trackingCtx.moveTo(cx - chLen, cy); trackingCtx.lineTo(cx + chLen, cy);
      trackingCtx.moveTo(cx, cy - chLen); trackingCtx.lineTo(cx, cy + chLen);
      trackingCtx.stroke();
    }

    trackingRAF = requestAnimationFrame(drawTrackingFrame);
  }

  function startTracking() {
    lastQrCorners = null;
    lastQrTime = 0;
    qrDetectedCount = 0;
    if (trackingRAF) cancelAnimationFrame(trackingRAF);
    trackingRAF = requestAnimationFrame(drawTrackingFrame);
  }

  function stopTracking() {
    if (trackingRAF) {
      cancelAnimationFrame(trackingRAF);
      trackingRAF = null;
    }
    trackingCtx.clearRect(0, 0, trackingCanvas.width, trackingCanvas.height);
    lastQrCorners = null;
    qrDetectedCount = 0;
  }

  // ========== Handle scanned Accept QR → create combined receipt ==========
  async function handleScannedAcceptQR(respB64, isCompressed) {
    const helloB64 = localStorage.getItem("irlid_last_hello_b64");
    if (!helloB64) throw new Error("No HELLO found. Show your HELLO QR on the Home page first.");

    dbg("Creating fresh self-response for HELLO...");

    // Clear any stale cached response
    try { delete window.__irlid_last_self_response; } catch(e){}
    try { localStorage.removeItem("irlid_last_self_response"); } catch(e){}

    // Create fresh self-response bound to the saved HELLO
    const freshSelf = await makeReturnForHelloAsync(helloB64);
    window.__irlid_last_self_response = freshSelf;

    dbg("Self pub key x: " + (freshSelf.pub ? freshSelf.pub.x.substring(0,12) : "NONE"));

    // Decode the other party's Accept response
    const otherRespObj = isCompressed
      ? await irlidDecompressFromB64url(respB64)
      : irlidDecodeB64urlJson(respB64);

    dbg("Other pub key x: " + (otherRespObj && otherRespObj.pub ? otherRespObj.pub.x.substring(0,12) : "NONE"));
    dbg("Keys match: " + String(freshSelf.pub && otherRespObj && otherRespObj.pub && freshSelf.pub.x === otherRespObj.pub.x));

    if (freshSelf.pub && otherRespObj && otherRespObj.pub && freshSelf.pub.x === otherRespObj.pub.x) {
      throw new Error("Both sides have the same key. You may have scanned your own QR.");
    }

    // Create combined receipt
    const out = await processScannedResponse(otherRespObj, {
      hello: helloB64,
      tsTolS: IRLID_TS_TOL_S,
      distTolM: IRLID_DIST_TOL_M
    });

    // Upload to server
    let receiptUrl = "receipt.html#COMB=" + irlidEncodeJsonToB64url(out.combined);

    if (window.IRLBackend && window.IRLBackend.hasSession()) {
      try {
        const upRes = await window.IRLBackend.uploadReceipt(out.combined);
        if (upRes.ok && upRes.data && upRes.data.receipt_hash) {
          receiptUrl = "receipt.html#receipt=" + upRes.data.receipt_hash;
          dbg("Receipt uploaded: " + upRes.data.receipt_hash);
        } else {
          dbg("Upload failed: " + (upRes.error || "unknown"));
        }
      } catch(e) {
        dbg("Upload error: " + e);
      }
    }

    // Clear the HELLO — handshake is complete
    try { localStorage.removeItem("irlid_last_hello_b64"); } catch(e){}
    try { localStorage.removeItem("irlid_last_self_response"); } catch(e){}
    try { delete window.__irlid_last_self_response; } catch(e){}

    return receiptUrl;
  }

  // ========== Scanner ==========
  async function stopScanner(){
    stopBtn.style.display = "none";
    scanBtn.style.display = "";
    stopTracking();
    if (!html5QrCode) return;
    try { await html5QrCode.stop(); } catch {}
    try { await html5QrCode.clear(); } catch {}
    html5QrCode = null;
    scanViewport.style.aspectRatio = "";
    setViewportState("idle");
  }

  async function startScanner(){
    await stopScanner();
    setStatus("Starting camera…");

    const camId = cameraSelect.value;
    if (!camId) throw new Error("No camera selected.");
    setStoredPreferredCameraId(camId);

    scanBtn.style.display = "none";
    stopBtn.style.display = "";
    setViewportState("scanning");
    setStatus("Scanning", true);

    scannerEl.innerHTML = "";
    html5QrCode = new Html5Qrcode("scanner");

    const config = {
      fps: 15,
      disableFlip: false,
      experimentalFeatures: {
        useBarCodeDetectorIfSupported: true
      }
    };

    await html5QrCode.start(
      { deviceId: { exact: camId } },
      config,
      async (text) => {
        await stopScanner();
        const c = classify(text);
        dbg("Scanned: " + c.kind);

        // HELLO → redirect to accept.html to show Accept QR
        if (c.kind === "HELLO" || c.kind === "HELLO_Z") {
          setStatus("HELLO detected. Redirecting to Accept page…");
          if (c.kind === "HELLO_Z") {
            location.href = "accept.html#HZ=" + c.v;
          } else {
            location.href = "accept.html#HELLO=" + c.v;
          }
          return;
        }

        // Combined receipt → open receipt page
        if (c.kind === "COMB") {
          setStatus("Receipt detected. Opening…");
          location.href = "receipt.html#COMB=" + (c.v || "");
          return;
        }

        // Server receipt hash → open receipt page
        if (c.kind === "RECEIPT") {
          setStatus("Receipt detected. Opening…");
          location.href = "receipt.html#receipt=" + (c.v || "");
          return;
        }

        // Accept response → create combined receipt
        if (c.kind === "RESP" || c.kind === "RESP_Z") {
          try {
            setStatus("Accept QR detected. Creating combined receipt…");
            const receiptUrl = await handleScannedAcceptQR(c.v || "", c.kind === "RESP_Z");
            dbg("Redirecting to receipt...");
            location.href = receiptUrl;
          } catch(e) {
            setStatus("Error: " + e.message);
            dbg("Error: " + e.message);
            console.error(e);
          }
          return;
        }

        setStatus("QR detected but not recognized as IRLid.");
      },
      () => {}
    );

    // Start tracking overlay after video is ready; also resize viewport to match video
    function waitForVideoAndStart() {
      const video = scannerEl.querySelector("video");
      if (!video || video.readyState < 2 || !video.videoWidth) {
        setTimeout(waitForVideoAndStart, 100);
        return;
      }
      // Set viewport aspect ratio to match actual video feed
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      scanViewport.style.aspectRatio = vw + " / " + vh;
      dbg("Video: " + vw + "x" + vh + " → aspect " + (vw/vh).toFixed(2));
      startTracking();
    }
    setTimeout(waitForVideoAndStart, 200);
  }

  // ========== Button handlers ==========
  scanBtn.addEventListener("click", async () => {
    try {
      await listCamerasAndSelectDefault();
      await startScanner();
    } catch(e) {
      setStatus("Camera error: " + e);
      console.error(e);
    }
  });

  stopBtn.addEventListener("click", async () => {
    try { await stopScanner(); } catch(e) { console.error(e); }
    setStatus("Stopped.");
  });

  if (clearLocalBtn) {
    clearLocalBtn.addEventListener("click", () => {
      try {
        const keys = ["irlid_last_hello_b64", "irlid_last_self_response",
                      "irlid_resp_self", "irlid_resp_other", "irlid_receipts",
                      "irlid_receipt_last", KEY_PREF_CAM];
        for (const k of keys) localStorage.removeItem(k);
      } catch{}
      try { delete window.__irlid_last_self_response; } catch{}
      setViewportState("idle");
      setStatus("Cleared local data.");
    });
  }

  cameraSelect.addEventListener("change", async () => {
    setStoredPreferredCameraId(cameraSelect.value);
    // If currently scanning, restart with the new camera
    if (html5QrCode) {
      try { await startScanner(); } catch(e) {
        setStatus("Camera error: " + e);
        console.error(e);
      }
    }
  });

  // Show debug controls in debug mode
  if (isDebugMode()) {
    const dc = document.getElementById("debugControls");
    if (dc) dc.style.display = "block";
  }

  // Pre-load cameras
  (async () => { try { await listCamerasAndSelectDefault(); } catch {} })();

  // Auto-start scanner if coming from Home page (HELLO is in localStorage)
  (async () => {
    const hasHello = localStorage.getItem("irlid_last_hello_b64");
    if (hasHello) {
      dbg("HELLO found in localStorage — ready to scan Accept QR");
      setStatus("Ready to scan the other person's Accept QR.");
    }
  })();
</script>

</body>
</html>
