<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Authorize Action - IRLid</title>
  <link rel="icon" href="favicon.ico">
  <style>
    :root { color-scheme: dark; --bg:#05070c; --panel:#0d1117; --line:#30363d; --text:#e6edf3; --muted:#8b949e; --green:#3fb950; --red:#f85149; --blue:#58a6ff; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:18px; background:radial-gradient(circle at 50% 0%, #162235 0, var(--bg) 42%); color:var(--text); font-family:system-ui,-apple-system,Segoe UI,sans-serif; }
    main { width:min(440px,100%); background:rgba(13,17,23,.92); border:1px solid rgba(139,148,158,.34); border-radius:8px; box-shadow:0 24px 70px rgba(0,0,0,.42); padding:22px; }
    .brand { display:flex; align-items:center; gap:10px; margin-bottom:18px; color:var(--muted); font-size:13px; font-weight:700; }
    .brand img { width:34px; height:34px; object-fit:contain; border-radius:6px; }
    h1 { margin:0 0 8px; font-size:24px; line-height:1.15; letter-spacing:0; }
    p { margin:0 0 16px; color:var(--muted); font-size:14px; line-height:1.5; }
    .summary { margin:14px 0; padding:14px; border:1px solid rgba(88,166,255,.38); border-radius:8px; background:rgba(56,139,253,.12); font-size:18px; font-weight:800; line-height:1.35; }
    .chip { display:inline-flex; align-items:center; min-height:28px; padding:0 10px; border:1px solid var(--line); border-radius:999px; color:#d2a8ff; background:#161b22; font-size:12px; font-weight:800; }
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px; }
    button { min-height:48px; border-radius:8px; border:1px solid var(--line); font-size:15px; font-weight:800; cursor:pointer; }
    button:disabled { opacity:.6; cursor:wait; }
    .approve { background:var(--green); border-color:var(--green); color:#06130a; }
    .reject { background:#161b22; color:var(--text); }
    .status { min-height:22px; margin-top:16px; color:#d29922; font-size:13px; font-weight:700; text-align:center; }
    .status.ok { color:var(--green); }
    .status.err { color:var(--red); }
    @media (max-width:420px) { main{padding:18px}.actions{grid-template-columns:1fr}.summary{font-size:16px} }
  </style>
</head>
<body>
  <main>
    <div class="brand"><img src="logo.png" alt="IRLid"><span>IRLid admin authorization</span></div>
    <h1>Authorize this action?</h1>
    <p>Review the action below, then approve with the hardware credential enrolled on this phone.</p>
    <div class="summary" id="summary">Loading action...</div>
    <div class="chip" id="chip">Admin action</div>
    <div class="actions">
      <button class="approve" id="approve" type="button" disabled>Approve</button>
      <button class="reject" id="reject" type="button" disabled>Reject</button>
    </div>
    <div class="status" id="status" role="status" aria-live="polite"></div>
  </main>
  <script src="js/sign.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const nonce = (params.get('nonce') || '').trim();
    const workerRaw = (params.get('worker') || '').trim();
    const els = {
      summary: document.getElementById('summary'),
      chip: document.getElementById('chip'),
      approve: document.getElementById('approve'),
      reject: document.getElementById('reject'),
      status: document.getElementById('status')
    };
    let actionPayload = null;

    function setStatus(text, cls) {
      els.status.textContent = text || '';
      els.status.className = 'status' + (cls ? ' ' + cls : '');
    }
    function workerBase() {
      let url;
      try { url = new URL(workerRaw); } catch (_) { throw new Error('Worker URL is invalid.'); }
      const allowed = [
        'irlid-api-org.irlid-bunhead.workers.dev',
        'irlid-api-org-test.irlid-bunhead.workers.dev',
        'localhost',
        '127.0.0.1'
      ];
      if (!allowed.includes(url.hostname)) {
        throw new Error('Worker URL is not allowed.');
      }
      return url.origin.replace(/\/+$/, '');
    }
    async function api(path, options) {
      const res = await fetch(workerBase() + path, Object.assign({
        headers: { 'Content-Type': 'application/json' }
      }, options || {}));
      let data = null;
      try { data = await res.json(); } catch (_) {}
      if (!res.ok) {
        const err = new Error((data && (data.message || data.error)) || 'Request failed.');
        err.data = data;
        throw err;
      }
      return data;
    }
    function actionLabel(type) {
      if (type === 'irlid_invite_v5') return 'Staff Invite';
      if (type === 'irlid_calendar_write_v5') return 'Calendar Change';
      return String(type || 'Admin action').replace(/^irlid_/, '').replace(/_v5$/, '').replace(/_/g, ' ');
    }
    async function loadAction() {
      if (!nonce || !workerRaw) throw new Error('Authorization link is incomplete.');
      const data = await api('/org/action/poll/' + encodeURIComponent(nonce));
      if (data.status === 'expired') throw new Error('This authorization has expired.');
      if (data.status === 'claimed') throw new Error('This authorization has already been used.');
      if (data.status === 'rejected') throw new Error('This authorization was rejected.');
      if (!data.action_payload) throw new Error('Action payload is missing.');
      actionPayload = data.action_payload;
      els.summary.textContent = data.action_summary || actionLabel(data.action_type);
      els.chip.textContent = actionLabel(data.action_type);
      els.approve.disabled = false;
      els.reject.disabled = false;
      setStatus('Ready.');
    }
    async function approve() {
      els.approve.disabled = true;
      els.reject.disabled = true;
      try {
        if (typeof irlidV5Enrolled !== 'function' || !irlidV5Enrolled()) {
          throw new Error('No enrolled IRLid hardware credential found on this phone.');
        }
        const pubJwk = irlidV5GetPublicJwk();
        if (!pubJwk) throw new Error('Could not read the enrolled public key.');
        setStatus('Confirm with fingerprint, Face ID, or device unlock...');
        const hashB64u = await hashPayloadToB64url(actionPayload);
        const sigEnv = await irlidV5SignPayloadHash(b64urlDecode(hashB64u));
        setStatus('Sending authorization...');
        await api('/org/action/claim', {
          method: 'POST',
          body: JSON.stringify({
            nonce,
            signed_envelope: {
              payload: actionPayload,
              pub: pubJwk,
              sig: b64urlEncode(sigEnv.sigRaw),
              webauthn: {
                authData: b64urlEncode(sigEnv.authData),
                clientData: b64urlEncode(sigEnv.clientData)
              }
            }
          })
        });
        setStatus('Authorized. You can close this tab.', 'ok');
      } catch (err) {
        setStatus(err?.data?.message || err?.data?.error || err?.message || 'Could not authorize.', 'err');
        els.approve.disabled = false;
        els.reject.disabled = false;
      }
    }
    async function reject() {
      els.approve.disabled = true;
      els.reject.disabled = true;
      try {
        await api('/org/action/claim', {
          method: 'POST',
          body: JSON.stringify({ nonce, status: 'rejected' })
        });
        setStatus('Rejected. You can close this tab.', 'ok');
      } catch (err) {
        setStatus(err?.data?.message || err?.data?.error || err?.message || 'Could not reject.', 'err');
        els.reject.disabled = false;
      }
    }
    els.approve.addEventListener('click', approve);
    els.reject.addEventListener('click', reject);
    loadAction().catch(err => {
      els.summary.textContent = err?.message || 'Could not load this authorization.';
      setStatus(err?.message || 'Could not load this authorization.', 'err');
    });
  </script>
</body>
</html>
