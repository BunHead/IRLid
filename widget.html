<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRLid Verification Widget</title>
  <meta name="description" content="IRLid embeddable verification widget — drop a single iframe into any site to gate access behind a real-world meeting. No SDK, no account." />
  <meta property="og:title" content="IRLid Verification Widget" />
  <meta property="og:description" content="One iframe. Cryptographic proof two people physically met. Embeddable in any website." />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 10px;
      background-color: transparent;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .input-group {
      display: flex;
      gap: 8px;
    }
    input {
      flex-grow: 1;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      font-family: monospace;
    }
    button {
      padding: 8px 16px;
      background-color: #1a1a1a;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: background 0.2s;
      white-space: nowrap;
    }
    button:hover { background-color: #333; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #result {
      font-size: 13px;
      padding: 10px;
      border-radius: 4px;
      display: none;
      line-height: 1.6;
    }
    .success {
      background-color: #e6ffed;
      border: 1px solid #b7eb8f;
      color: #155724;
    }
    .error {
      background-color: #fff1f0;
      border: 1px solid #ffa39e;
      color: #721c24;
    }
    .loading {
      background-color: #f0f4ff;
      border: 1px solid #aec6f5;
      color: #1a3a6b;
    }
    .powered {
      font-size: 11px;
      color: #aaa;
      text-align: right;
    }
    .powered a { color: #aaa; text-decoration: none; }
    .powered a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="input-group">
    <input type="text" id="hashInput" placeholder="Paste IRLid receipt hash…" autocomplete="off" spellcheck="false" />
    <button id="verifyBtn" onclick="verifyHash()">Verify</button>
  </div>

  <div id="result"></div>

  <div class="powered">Powered by <a href="https://irlid.co.uk" target="_blank">IRLid</a></div>

  <script>
    const WORKER = "https://irlid-api.irlid-bunhead.workers.dev";

    // Configurable: max age of receipt in days (0 = no limit)
    // Parent page can override by posting: { type: "irlid-config", maxAgeDays: 30 }
    let MAX_AGE_DAYS = 365;
    window.addEventListener("message", function(e) {
      if (e.data && e.data.type === "irlid-config" && e.data.maxAgeDays != null) {
        MAX_AGE_DAYS = Number(e.data.maxAgeDays);
      }
    });

    function extractHash(raw) {
      const t = (raw || "").trim();
      // Raw hash
      if (/^[A-Za-z0-9_-]{20,}$/.test(t)) return t;
      // URL with #receipt= or ?receipt=
      let m = t.match(/[#&?]receipt=([A-Za-z0-9_-]+)/);
      if (m) return m[1];
      // URL path /receipts/HASH
      m = t.match(/\/receipts\/([A-Za-z0-9_-]+)/);
      if (m) return m[1];
      return null;
    }

    async function verifyHash() {
      const raw = document.getElementById("hashInput").value;
      const resultDiv = document.getElementById("result");
      const btn = document.getElementById("verifyBtn");
      const hash = extractHash(raw);

      if (!hash) {
        resultDiv.className = "error";
        resultDiv.style.display = "block";
        resultDiv.textContent = "Please enter a valid receipt hash or IRLid URL.";
        return;
      }

      // Loading state
      btn.disabled = true;
      resultDiv.className = "loading";
      resultDiv.style.display = "block";
      resultDiv.textContent = "Checking receipt…";

      try {
        // Step 1: Fetch the receipt from the database
        resultDiv.textContent = "Fetching receipt…";
        const resp = await fetch(WORKER + "/receipts/" + encodeURIComponent(hash));

        if (!resp.ok) {
          resultDiv.className = "error";
          resultDiv.textContent = resp.status === 404
            ? "Receipt not found. Check the hash and try again."
            : "Could not reach the IRLid server. Please try again.";
          btn.disabled = false;
          return;
        }

        const data = await resp.json();
        const combined = data.combined || data;

        // Step 2: Cryptographically verify the receipt server-side
        resultDiv.textContent = "Verifying signatures…";
        const verifyResp = await fetch(WORKER + "/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ combined })
        });

        if (!verifyResp.ok) {
          resultDiv.className = "error";
          resultDiv.textContent = "Verification service unavailable. Please try again.";
          btn.disabled = false;
          return;
        }

        const checks = await verifyResp.json();

        if (!checks.valid) {
          resultDiv.className = "error";
          resultDiv.textContent = "Receipt failed cryptographic verification. Signatures do not check out.";
          btn.disabled = false;
          return;
        }

        // Step 3: Age check
        const payloadA = combined?.a?.payload || combined?.hello?.offer?.payload || {};
        if (payloadA.ts && MAX_AGE_DAYS > 0) {
          const ageMs = Date.now() - (payloadA.ts * 1000);
          const ageDays = ageMs / (1000 * 60 * 60 * 24);
          if (ageDays > MAX_AGE_DAYS) {
            resultDiv.className = "error";
            resultDiv.textContent = `Receipt is ${Math.floor(ageDays)} days old — exceeds the ${MAX_AGE_DAYS}-day limit for this site.`;
            btn.disabled = false;
            return;
          }
        }

        // Step 4: Show real data with score
        const ts = payloadA.ts ? new Date(payloadA.ts * 1000).toLocaleString() : "Unknown";
        const lat = payloadA.lat != null ? payloadA.lat.toFixed(5) : null;
        const lon = payloadA.lon != null ? payloadA.lon.toFixed(5) : null;
        const locationStr = (lat && lon) ? `${lat}°, ${lon}°` : "Location not available";

        // Calculate score from checks
        const checkVals = Object.values(checks).filter(v => typeof v === "boolean");
        const passed = checkVals.filter(Boolean).length;
        const score = Math.round((passed / checkVals.length) * 100);

        resultDiv.className = "success";
        resultDiv.innerHTML =
          `<strong>✓ Cryptographically verified — ${score}%</strong><br>` +
          `<strong>Time:</strong> ${ts}<br>` +
          `<strong>Location:</strong> ${locationStr}<br>` +
          `<a href="https://irlid.co.uk/check.html#receipt=${hash}" target="_blank" style="color:#155724;">Full report →</a>`;

        // Notify parent page with verified data
        window.parent.postMessage({
          type: "irlid-verified",
          hash: hash,
          timestamp: payloadA.ts ? new Date(payloadA.ts * 1000).toISOString() : null,
          lat: payloadA.lat || null,
          lon: payloadA.lon || null
        }, "*");

      } catch (e) {
        resultDiv.className = "error";
        resultDiv.textContent = "Network error. Please check your connection and try again.";
      }

      btn.disabled = false;
    }

    // Allow Enter key to trigger verify
    document.getElementById("hashInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") verifyHash();
    });
  </script>

</body>
</html>
