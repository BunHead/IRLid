<!DOCTYPE html>
<!-- Deploy 45 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Home</title>

  <link rel="stylesheet" href="css/style.css">

  <style>
    :root{
      --black:#000;
      --white:#fff;
      --mobile-nav-h:124px;
      --side-pad:12px;
      --top-gap:10px;
    }

    html, body { height: 100%; }

    .page-main{
      padding: 24px var(--side-pad) calc(var(--mobile-nav-h) + 28px);
      text-align: center;
    }

    .home-wrap{
      max-width: 860px;
      margin: 0 auto;
    }

    .qr-box{
      display:inline-block;
      padding: 16px;
      background: #fff;
    }

    #qrError{
      display:none;
      max-width: 860px;
      margin: 14px auto 0;
      text-align:left;
      white-space: pre-wrap;
      background:#fff4f4;
      border:1px solid #ffd0d0;
      padding:10px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
    }

    @media (min-width: 721px){
      .page-main{ padding-bottom: 40px; }
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="logo-row">
    <a href="index.html" class="logo-link">
      <img src="irlid-logo.png" alt="IRLid" class="logo-img" onerror="this.style.display='none'">
      <span class="logo-text">IRLid</span>
    </a>
  </div>

  <nav class="site-nav" aria-label="Primary">
    <a class="nav-btn" href="index.html">Home</a>
    <a class="nav-btn" href="application.html">Scan</a>

    <details class="nav-dropdown" id="aboutDropdown">
      <summary class="nav-btn">About ▼</summary>
      <div class="dropdown-menu" role="menu" aria-label="About menu">
        <a href="about.html">About</a>
        <a href="features.html">Features</a>
        <a href="contact.html">Contact</a>
      </div>
    </details>

    <span id="accountSlot"></span>
  </nav>
</header>

<main class="page-main">
  <div class="home-wrap">
    <h2>Show this QR to the other person</h2>
    <div class="qr-box" id="helloQr" aria-label="HELLO QR"></div>
    <div id="qrError" role="alert"></div>
  </div>
</main>

<script src="js/auth.js"></script>
<script src="js/nav.js"></script>

<!-- Signing (needed to include initiator pub in HELLO) -->
<script src="js/sign.js"
        onerror="document.getElementById('qrError').style.display='block';document.getElementById('qrError').textContent='Missing js/sign.js';"></script>

<!-- Local QR encoder (no CDN) -->
<script src="js/vendor/qrcode.min.js?v=36e"
        onerror="document.getElementById('qrError').style.display='block';document.getElementById('qrError').textContent='Missing js/vendor/qrcode.min.js';"></script>

<!-- Your QR helpers -->
<script src="js/qr.js?v=deploy45"
        onerror="document.getElementById('qrError').style.display='block';document.getElementById('qrError').textContent='Missing js/qr.js';"></script>

<script>
  (function(){
    "use strict";
    const errEl = document.getElementById("qrError");

    function showErr(e){
      errEl.style.display = "block";
      errEl.textContent = String(e && e.stack ? e.stack : e);
    }
    function clearErr(){
      errEl.style.display = "none";
      errEl.textContent = "";
    }

    function b64urlFromBytes(bytes){
      const b64 = btoa(String.fromCharCode.apply(null, Array.from(bytes)));
      return b64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }
    function newHelloToken(){
      const bytes = new Uint8Array(16);
      crypto.getRandomValues(bytes);
      return b64urlFromBytes(bytes);
    }

    function computeQrSize(){
      const w = window.innerWidth;
      const h = window.innerHeight;
      const pad = 2 * 12;
      const navH = (window.matchMedia && window.matchMedia("(max-width: 720px)").matches) ? 124 : 0;
      const safeB = parseFloat(getComputedStyle(document.body).paddingBottom || "0") || 0;
      const usableH = Math.max(240, h - navH - safeB - 20);
      const usableW = Math.max(240, w - pad);
      const size = Math.floor(Math.min(usableW, usableH));
      return Math.max(260, Math.min(size, 720));
    }

    let currentUrl = null;

    async function render(){
      try{
        clearErr();
        if (typeof window.makeQR !== "function") throw new Error("makeQR() missing (js/qr.js).");

        const url = new URL("application.html", location.href);
        url.hash = "HELLO=" + (typeof window.makeHelloTokenAsync === "function" ? await window.makeHelloTokenAsync() : newHelloToken());
        currentUrl = url.toString();

        window.makeQR("helloQr", currentUrl, computeQrSize());
      }catch(e){
        showErr(e);
      }
    }

    let t = null;
    function schedule(){
      if (!currentUrl) return render().catch(showErr);
      clearTimeout(t);
      t = setTimeout(() => {
        try{
          clearErr();
          window.makeQR("helloQr", currentUrl, computeQrSize());
        }catch(e){ showErr(e); }
      }, 150);
    }
    window.addEventListener("resize", schedule);
    window.addEventListener("orientationchange", schedule);

    render().catch(showErr);
  })();
</script>

</body>
</html>
