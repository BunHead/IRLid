<!DOCTYPE html>
<!-- Deploy 55: HiDPI QR rendering fix (crisp on Retina/Windows scaling) -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Home</title>

  <link rel="stylesheet" href="css/style.css">

  <style>
    .page-main{
      padding: 24px 12px calc(var(--mobile-nav-h) + 28px);
      text-align:center;
    }

    .panel{
      margin: 14px auto 0;
      padding: 14px 16px;
      border: 1px solid #e5e5e5;
      background:#fff;
      max-width: 900px;
    }

    .qr-host{
      margin: 12px auto 0;
      padding: 18px;
      border: 1px solid #e5e5e5;
      background:#fff;
      width: fit-content;
      max-width: 100%;
      overflow-x:auto; /* never scale the canvas; scroll instead */
    }

    .hint{
      margin-top:10px;
      font-size:13px;
      opacity:.85;
    }

    .urlbox{
      margin-top: 12px;
      text-align:left;
    }

    .urlbox label{
      display:block;
      font-size:12px;
      opacity:.8;
      margin-bottom:6px;
    }

    .urlbox input{
      width:100%;
      padding:10px 12px;
      border:1px solid #ddd;
      border-radius:0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:12px;
    }

    #status{
      margin-top:10px;
      font-size:13px;
      text-align:left;
      white-space:pre-wrap;
      background:#f7f7f7;
      padding:10px 12px;
      border:1px solid #ddd;
    }

    .controls{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:12px;
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="brand-wrap">
    <a class="brand" href="index.html" aria-label="IRLid Home">
      <img src="logo.png" alt="IRLid Logo" id="logo"
           onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src='irlid-logo.png';}else{this.style.display='none';}">
    </a>
  </div>

  <nav class="site-nav" aria-label="Primary">
    <a class="nav-btn" href="index.html">Home</a>
    <a class="nav-btn" href="application.html">Scan</a>

    <details class="nav-dropdown" id="aboutDropdown">
      <summary class="nav-btn">About ▼</summary>
      <div class="dropdown-menu" role="menu" aria-label="About menu">
        <a href="about.html">About</a>
        <a href="features.html">Features</a>
        <a href="contact.html">Contact</a>
      </div>
    </details>

    <span id="accountSlot"></span>
  </nav>
</header>

<main class="page-main">
  <div class="panel">
    <h2 id="title">Static Test QR (should open Scan page)</h2>

    <div class="qr-host" id="qrHost" aria-label="QR code"></div>

    <div class="hint">
      If your phone vibrates but shows no link, it’s detecting but not decoding.
      This version renders HiDPI crisp pixels (best for phone scanning).
    </div>

    <div class="urlbox">
      <label for="qrUrl">QR contents</label>
      <input id="qrUrl" readonly>
    </div>

    <div class="controls">
      <button class="btn secondary" id="btnStatic" type="button">Show Static Test</button>
      <button class="btn" id="btnHello" type="button">Show HELLO QR</button>
    </div>

    <div id="status"></div>
  </div>
</main>

<script src="js/auth.js"></script>
<script src="js/nav.js"></script>

<!-- Confirmed working path -->
<script src="js/vendor/qrcode.min.js"></script>

<script>
(function(){
  "use strict";

  const qrHost = document.getElementById("qrHost");
  const qrUrlEl = document.getElementById("qrUrl");
  const statusEl = document.getElementById("status");
  const titleEl = document.getElementById("title");

  const btnStatic = document.getElementById("btnStatic");
  const btnHello = document.getElementById("btnHello");

  function log(msg){
    statusEl.textContent += msg + "\n";
  }

  function baseDir(){
    const path = location.pathname.replace(/[^\/]*$/, "");
    return location.origin + path;
  }

  function b64urlFromBytes(bytes){
    let bin = "";
    for (let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
    const b64 = btoa(bin);
    return b64.replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/g,"");
  }

  function newHelloToken(){
    const bytes = new Uint8Array(16);
    crypto.getRandomValues(bytes);
    return b64urlFromBytes(bytes);
  }

  function isMobile(){
    return window.matchMedia && window.matchMedia("(max-width: 720px)").matches;
  }

  // CSS size (what user sees). Bigger = easier to scan.
  function cssSize(){
    return isMobile() ? 360 : 560;
  }

  // HiDPI actual canvas pixels.
  function deviceSize(){
    const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    return Math.floor(cssSize() * dpr);
  }

  function renderQr(text){
    statusEl.textContent = "";

    if (!window.QRCode || typeof window.QRCode.toCanvas !== "function") {
      log("❌ QRCode.toCanvas not available. Check js/vendor/qrcode.min.js");
      return;
    }

    const cssPx = cssSize();
    const px = deviceSize();

    // Build a fresh canvas each render
    qrHost.innerHTML = "";
    const canvas = document.createElement("canvas");

    // Set high-resolution backing store, then display at CSS size
    canvas.width = px;
    canvas.height = px;
    canvas.style.width = cssPx + "px";
    canvas.style.height = cssPx + "px";
    canvas.style.display = "block";
    canvas.style.margin = "0 auto";
    canvas.style.imageRendering = "pixelated";

    qrHost.appendChild(canvas);

    // Render QR into high-res canvas
    // Margin increased to help scanning from screens.
    window.QRCode.toCanvas(canvas, String(text), {
      width: px,
      margin: 8,
      errorCorrectionLevel: "L"
    }, function(err){
      if (err){
        log("❌ QR render error: " + err);
      } else {
        log("✅ Rendered at CSS " + cssPx + "px, device " + px + "px (dpr=" + (window.devicePixelRatio||1) + ")");
      }
    });
  }

  function showStatic(){
    titleEl.textContent = "Static Test QR (should open Scan page)";
    const url = baseDir() + "application.html";
    qrUrlEl.value = url;
    renderQr(url);
  }

  function showHello(){
    titleEl.textContent = "HELLO QR (should open Scan with HELLO=...)";
    const url = baseDir() + "application.html#HELLO=" + newHelloToken();
    qrUrlEl.value = url;
    renderQr(url);
  }

  btnStatic.addEventListener("click", showStatic);
  btnHello.addEventListener("click", showHello);

  // First render: static
  showStatic();

})();
</script>

</body>
</html>
