<!DOCTYPE html>
<!-- Deploy 51 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Home</title>

  <link rel="stylesheet" href="css/style.css">

  <style>
    :root{
      --side-pad:12px;
      --panel-border:#e5e5e5;
    }

    .page-main{
      padding: 24px var(--side-pad) calc(var(--mobile-nav-h) + 28px);
      text-align:center;
    }

    .home-wrap{
      max-width: 920px;
      margin: 0 auto;
    }

    .panel{
      margin: 14px auto 0;
      padding: 14px 16px;
      border: 1px solid var(--panel-border);
      background: #fff;
      text-align: center;
    }

    .panel h2{
      margin: 0 0 10px 0;
    }

    /* Keep it big, crisp, and never scaled smaller than intended */
    .qr-img{
      width: 420px;
      height: 420px;
      max-width: 92vw;
      max-height: 92vw;
      image-rendering: pixelated;
      border: 1px solid var(--panel-border);
      background:#fff;
      display:block;
      margin: 10px auto 0;
    }

    .hint{
      margin-top:10px;
      font-size: 13px;
      opacity: .85;
    }

    .hint a{
      color:#111;
      text-decoration:underline;
      word-break: break-all;
    }

    .urlbox{
      margin: 12px auto 0;
      max-width: 920px;
      text-align:left;
    }
    .urlbox label{
      display:block;
      font-size:12px;
      opacity:.8;
      margin-bottom:6px;
    }
    .urlbox input{
      width:100%;
      padding:10px 12px;
      font-size:12px;
      border:1px solid #ddd;
      border-radius:0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    #qrError{
      display:none;
      max-width: 920px;
      margin: 14px auto 0;
      text-align:left;
      white-space: pre-wrap;
      background:#fff4f4;
      border:1px solid #ffd0d0;
      padding:10px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="logo-row">
    <a href="index.html" class="logo-link" aria-label="IRLid Home">
      <img
        src="irlid-logo.png"
        alt="IRLid"
        class="logo-img"
        onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src='logo.png';}else{this.style.display='none';}"
      >
      <span class="logo-text">IRLid</span>
    </a>
  </div>

  <!-- NAVIGATION (must match across pages) -->
  <nav class="site-nav" aria-label="Primary">
    <a class="nav-btn" href="index.html">Home</a>
    <a class="nav-btn" href="application.html">Scan</a>

    <details class="nav-dropdown" id="aboutDropdown">
      <summary class="nav-btn">About ▼</summary>
      <div class="dropdown-menu" role="menu" aria-label="About menu">
        <a href="about.html">About</a>
        <a href="features.html">Features</a>
        <a href="contact.html">Contact</a>
      </div>
    </details>

    <span id="accountSlot"></span>
  </nav>
</header>

<main class="page-main">
  <div class="home-wrap">

        <label for="staticUrl">Encoded URL</label>
        <input id="staticUrl" type="text" readonly value="https://bunhead.github.io/IRLid/application.html">
      </div>

      <div class="hint" style="margin-top:12px;">

    <div id="qrError" role="alert"></div>

  </div>
</main>

<script src="js/auth.js"></script>
<script src="js/nav.js"></script>

</body>
</html>
