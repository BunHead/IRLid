<!DOCTYPE html>
<!-- Deploy 47 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Home</title>

  <link rel="stylesheet" href="css/style.css">

  <style>
    :root{
      --side-pad:12px;
      --panel-border:#e5e5e5;
    }

    .page-main{
      padding: 24px var(--side-pad) calc(var(--mobile-nav-h) + 28px);
      text-align:center;
    }

    .home-wrap{
      max-width: 920px;
      margin: 0 auto;
    }

    .qr-box{
      display:inline-block;
      padding: 16px;
      background: #fff;
      border: 1px solid var(--panel-border);
    }

    .hint{
      margin-top:10px;
      font-size: 13px;
      opacity: .85;
    }

    .hint a{
      color:#111;
      text-decoration:underline;
    }

    #qrError{
      display:none;
      max-width: 920px;
      margin: 14px auto 0;
      text-align:left;
      white-space: pre-wrap;
      background:#fff4f4;
      border:1px solid #ffd0d0;
      padding:10px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="logo-row">
    <a href="index.html" class="logo-link" aria-label="IRLid Home">
      <img
        src="irlid-logo.png"
        alt="IRLid"
        class="logo-img"
        onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src='logo.png';}else{this.style.display='none';}"
      >
      <span class="logo-text">IRLid</span>
    </a>
  </div>

  <!-- NAVIGATION (must match across pages) -->
  <nav class="site-nav" aria-label="Primary">
    <a class="nav-btn" href="index.html">Home</a>
    <a class="nav-btn" href="application.html">Scan</a>

    <details class="nav-dropdown" id="aboutDropdown">
      <summary class="nav-btn">About ▼</summary>
      <div class="dropdown-menu" role="menu" aria-label="About menu">
        <a href="about.html">About</a>
        <a href="features.html">Features</a>
        <a href="contact.html">Contact</a>
      </div>
    </details>

    <span id="accountSlot"></span>
  </nav>
</header>

<main class="page-main">
  <div class="home-wrap">
    <h2>Show this QR to the other person</h2>

    <div class="qr-box" id="helloQr" aria-label="HELLO QR"></div>

    <div class="hint">
      If scanning fails, tap: <a id="helloLink" href="application.html">Open handshake link</a>
    </div>

    <div id="qrError" role="alert"></div>
  </div>
</main>

<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script src="js/sign.js"></script>

<!-- ✅ Local QR encoder (repo root). This is the file that exposes window.QRCode.toCanvas -->
<script src="qrcode.min.js"></script>

<!-- Shared QR helpers -->
<script src="js/qr.js?v=45"></script>

<script>
(function(){
  "use strict";

  const qrTarget = document.getElementById("helloQr");
  const linkEl = document.getElementById("helloLink");
  const errEl = document.getElementById("qrError");

  function showErr(e){
    errEl.style.display = "block";
    errEl.textContent = String(e && e.stack ? e.stack : e);
  }
  function clearErr(){
    errEl.style.display = "none";
    errEl.textContent = "";
  }

  function b64urlFromBytes(bytes){
    let bin = "";
    for (let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
    const b64 = btoa(bin);
    return b64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
  }

  function newHelloToken(){
    const bytes = new Uint8Array(16);
    crypto.getRandomValues(bytes);
    return b64urlFromBytes(bytes);
  }

  function computeQrSize(){
    const w = window.innerWidth || 360;
    const h = window.innerHeight || 640;
    const pad = 24;

    const isMobile = window.matchMedia && window.matchMedia("(max-width: 720px)").matches;
    const navH = isMobile ? 124 : 0;

    const usable = Math.min(w - pad, h - navH - pad);
    return Math.max(260, Math.min(Math.floor(usable), 720));
  }

  function loadQrCdnIfNeeded(){
    return new Promise((resolve, reject) => {
      if (window.QRCode && window.QRCode.toCanvas) return resolve(true);

      const s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js";
      s.onload = () => resolve(true);
      s.onerror = () => reject(new Error("Failed to load QRCode library (local and CDN)."));
      document.head.appendChild(s);
    });
  }

  let currentUrl = null;

  async function render(){
    try{
      clearErr();

      // Ensure QR library exists (local root file OR CDN fallback)
      await loadQrCdnIfNeeded();

      if (typeof window.makeQR !== "function") {
        throw new Error("makeQR() missing. Ensure js/qr.js is loading.");
      }

      const url = new URL("application.html", location.href);
      url.hash = "HELLO=" + newHelloToken();
      currentUrl = url.toString();

      linkEl.href = currentUrl;

      window.makeQR(qrTarget, currentUrl, computeQrSize());
    }catch(e){
      showErr(e);
    }
  }

  let t = null;
  function schedule(){
    if (!currentUrl) return;
    clearTimeout(t);
    t = setTimeout(() => {
      try{
        clearErr();
        window.makeQR(qrTarget, currentUrl, computeQrSize());
      }catch(e){ showErr(e); }
    }, 150);
  }

  window.addEventListener("resize", schedule);
  window.addEventListener("orientationchange", schedule);

  render();
})();
</script>

</body>
</html>
