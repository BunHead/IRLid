<!DOCTYPE html>
<!-- Deploy 52: Home QR Test (local qrcode.min.js) -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Home</title>

  <link rel="stylesheet" href="css/style.css">

  <style>
    :root{
      --side-pad:12px;
      --panel-border:#e5e5e5;
    }

    .page-main{
      padding: 24px var(--side-pad) calc(var(--mobile-nav-h) + 28px);
      text-align:center;
    }

    .home-wrap{
      max-width: 920px;
      margin: 0 auto;
    }

    .panel{
      margin: 14px auto 0;
      padding: 14px 16px;
      border: 1px solid var(--panel-border);
      background:#fff;
      text-align:center;
    }

    .qr-host{
      display:block;
      margin: 12px auto 0;
      padding: 16px;
      border: 1px solid var(--panel-border);
      background:#fff;
      width: fit-content;
      max-width: 100%;
      overflow-x: auto; /* never scale the canvas; scroll instead */
    }

    .hint{
      margin-top:10px;
      font-size: 13px;
      opacity: .85;
    }

    .urlbox{
      margin: 12px auto 0;
      max-width: 920px;
      text-align:left;
    }
    .urlbox label{
      display:block;
      font-size:12px;
      opacity:.8;
      margin-bottom:6px;
    }
    .urlbox input{
      width:100%;
      padding:10px 12px;
      font-size:12px;
      border:1px solid #ddd;
      border-radius:0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .controls{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:12px;
    }

    #qrError{
      display:none;
      max-width: 920px;
      margin: 14px auto 0;
      text-align:left;
      white-space: pre-wrap;
      background:#fff4f4;
      border:1px solid #ffd0d0;
      padding:10px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="brand-wrap">
    <a class="brand" href="index.html" aria-label="IRLid Home">
      <img src="logo.png" alt="IRLid Logo" id="logo"
           onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src='irlid-logo.png';}else{this.style.display='none';}">
    </a>
  </div>

  <!-- NAVIGATION (IDENTICAL structure) -->
  <nav class="site-nav" aria-label="Primary">
    <a class="nav-btn" href="index.html">Home</a>
    <a class="nav-btn" href="application.html">Scan</a>

    <details class="nav-dropdown" id="aboutDropdown">
      <summary class="nav-btn">About ▼</summary>
      <div class="dropdown-menu" role="menu" aria-label="About menu">
        <a href="about.html">About</a>
        <a href="features.html">Features</a>
        <a href="contact.html">Contact</a>
      </div>
    </details>

    <span id="accountSlot"></span>
  </nav>
</header>

<main class="page-main">
  <div class="home-wrap">
    <div class="panel">
      <h2 id="modeTitle">Static Test QR (opens Scan page)</h2>

      <div class="qr-host" id="qrHost" aria-label="QR"></div>

      <div class="hint">
        If your phone vibrates but shows no link, it’s not decoding — increase brightness and try the native camera app.
      </div>

      <div class="urlbox">
        <label for="qrUrl">QR contents</label>
        <input id="qrUrl" type="text" readonly value="">
      </div>

      <div class="controls">
        <button class="btn secondary" id="staticBtn" type="button">Show Static Test QR</button>
        <button class="btn" id="helloBtn" type="button">Show HELLO QR</button>
      </div>

      <div class="hint" style="margin-top:12px;">
        Tap directly: <a id="directLink" href="application.html">Open Scan</a>
      </div>
    </div>

    <div id="qrError" role="alert"></div>
  </div>
</main>

<script src="js/auth.js"></script>
<script src="js/nav.js"></script>

<!-- ✅ Local QR encoder that exposes window.QRCode.toCanvas -->
<script src="qrcode.min.js?v=36e"></script>

<script>
(function(){
  "use strict";

  const qrHost = document.getElementById("qrHost");
  const urlEl = document.getElementById("qrUrl");
  const titleEl = document.getElementById("modeTitle");
  const errEl = document.getElementById("qrError");
  const directLink = document.getElementById("directLink");

  const staticBtn = document.getElementById("staticBtn");
  const helloBtn = document.getElementById("helloBtn");

  function showErr(e){
    errEl.style.display = "block";
    errEl.textContent = String(e && e.stack ? e.stack : e);
  }
  function clearErr(){
    errEl.style.display = "none";
    errEl.textContent = "";
  }

  function b64urlFromBytes(bytes){
    let bin = "";
    for (let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
    const b64 = btoa(bin);
    return b64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
  }

  function newHelloToken(){
    const bytes = new Uint8Array(16);
    crypto.getRandomValues(bytes);
    return b64urlFromBytes(bytes);
  }

  function baseDir(){
    // directory of current page
    const path = location.pathname.replace(/[^\/]*$/, "");
    return location.origin + path;
  }

  function isMobile(){
    return window.matchMedia && window.matchMedia("(max-width: 720px)").matches;
  }

  function qrPx(){
    return isMobile() ? 360 : 520;
  }

  function renderQR(text){
    clearErr();

    if (!window.QRCode || typeof window.QRCode.toCanvas !== "function") {
      throw new Error("Local QR encoder not loaded. Expected window.QRCode.toCanvas from /qrcode.min.js");
    }

    qrHost.innerHTML = "";
    const canvas = document.createElement("canvas");
    const px = qrPx();

    // Lock canvas size; never CSS-scale it.
    canvas.width = px;
    canvas.height = px;
    canvas.style.width = px + "px";
    canvas.style.height = px + "px";
    canvas.style.display = "block";
    canvas.style.margin = "0 auto";
    canvas.style.imageRendering = "pixelated";

    qrHost.appendChild(canvas);

    // Render with LOW error correction (L) and generous margin for scanning
    window.QRCode.toCanvas(canvas, String(text), {
      width: px,
      margin: 4,
      errorCorrectionLevel: "L"
    }, function(err){
      if (err) throw err;
    });
  }

  function showStatic(){
    titleEl.textContent = "Static Test QR (opens Scan page)";
    const url = baseDir() + "application.html";
    urlEl.value = url;
    directLink.href = url;
    renderQR(url);
  }

  function showHello(){
    titleEl.textContent = "HELLO QR (opens Scan with HELLO=...)";
    const url = baseDir() + "application.html#HELLO=" + newHelloToken();
    urlEl.value = url;
    directLink.href = url;
    renderQR(url);
  }

  staticBtn.addEventListener("click", () => {
    try { showStatic(); } catch(e){ showErr(e); }
  });

  helloBtn.addEventListener("click", () => {
    try { showHello(); } catch(e){ showErr(e); }
  });

  // Initial: static test (simplest)
  try { showStatic(); } catch(e){ showErr(e); }

})();
</script>

</body>
</html>
