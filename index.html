<!DOCTYPE html>
<!-- Deploy 57: Home restored, vendor QR fixed -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Home</title>

  <link rel="stylesheet" href="css/style.css">

  <style>
    :root{
      --side-pad:12px;
      --panel-border:#e5e5e5;
    }

    .page-main{
      padding: 24px var(--side-pad) calc(var(--mobile-nav-h) + 28px);
      text-align:center;
    }

    .home-wrap{
      max-width: 920px;
      margin: 0 auto;
    }

    .qr-panel{
      margin: 14px auto 0;
      padding: 14px 16px;
      border: 1px solid var(--panel-border);
      background:#fff;
    }

    .qr-host{
      display:block;
      margin: 12px auto 0;
      padding: 18px;
      border: 1px solid var(--panel-border);
      background:#fff;
      width: fit-content;
      max-width: 100%;
      overflow-x:auto; /* never scale; scroll instead */
    }

    .hint{
      margin-top:10px;
      font-size:13px;
      opacity:.85;
    }

    .hint a{
      color:#111;
      text-decoration:underline;
      word-break: break-all;
    }

    .urlbox{
      margin: 12px auto 0;
      max-width: 920px;
      text-align:left;
    }
    .urlbox label{
      display:block;
      font-size:12px;
      opacity:.8;
      margin-bottom:6px;
    }
    .urlbox input{
      width:100%;
      padding:10px 12px;
      font-size:12px;
      border:1px solid #ddd;
      border-radius:0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    #err{
      display:none;
      max-width: 920px;
      margin: 14px auto 0;
      text-align:left;
      white-space: pre-wrap;
      background:#fff4f4;
      border:1px solid #ffd0d0;
      padding:10px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="brand-wrap">
    <a class="brand" href="index.html" aria-label="IRLid Home">
      <img src="logo.png" alt="IRLid Logo" id="logo"
           onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src='irlid-logo.png';}else{this.style.display='none';}">
    </a>
  </div>

  <!-- NAVIGATION (match across pages) -->
  <nav class="site-nav" aria-label="Primary">
    <a class="nav-btn" href="index.html">Home</a>
    <a class="nav-btn" href="application.html">Scan</a>

    <details class="nav-dropdown" id="aboutDropdown">
      <summary class="nav-btn">About ▼</summary>
      <div class="dropdown-menu" role="menu" aria-label="About menu">
        <a href="about.html">About</a>
        <a href="features.html">Features</a>
        <a href="contact.html">Contact</a>
      </div>
    </details>

    <span id="accountSlot"></span>
  </nav>
</header>

<main class="page-main">
  <div class="home-wrap">
    <div class="qr-panel">
      <h2>Show this QR to the other person</h2>

      <div class="qr-host" id="helloQr" aria-label="HELLO QR"></div>

      <div class="hint">
        If scanning fails, tap: <a id="helloLink" href="application.html">Open handshake link</a>
      </div>

      <div class="urlbox">
        <label for="helloUrl">QR contents</label>
        <input id="helloUrl" type="text" readonly value="">
      </div>

      <div id="err" role="alert"></div>
    </div>
  </div>
</main>

<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script src="js/sign.js"></script>

<!-- ✅ Fixed vendor QR encoder -->
<script src="js/vendor/qrcode.min.js?v=56"></script>

<!-- Your app’s QR helpers (expects window.QRCode.toCanvas) -->
<script src="js/qr.js?v=56"></script>

<script>
(function(){
  "use strict";

  const qrEl = document.getElementById("helloQr");
  const linkEl = document.getElementById("helloLink");
  const urlEl  = document.getElementById("helloUrl");
  const errEl  = document.getElementById("err");

  function showErr(e){
    errEl.style.display = "block";
    errEl.textContent = String(e && e.stack ? e.stack : e);
  }
  function clearErr(){
    errEl.style.display = "none";
    errEl.textContent = "";
  }

  function b64urlFromBytes(bytes){
    let bin = "";
    for (let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
    const b64 = btoa(bin);
    return b64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
  }

  function newHelloToken(){
    const bytes = new Uint8Array(16);
    crypto.getRandomValues(bytes);
    return b64urlFromBytes(bytes);
  }

  function baseDir(){
    const path = location.pathname.replace(/[^\/]*$/, "");
    return location.origin + path;
  }

  function isMobile(){
    return window.matchMedia && window.matchMedia("(max-width: 720px)").matches;
  }

  function qrSize(){
    // Large enough for scanning from another phone
    return isMobile() ? 420 : 760;
  }

  function render(){
    try{
      clearErr();

      if (!window.QRCode || typeof window.QRCode.toCanvas !== "function") {
        throw new Error("QR encoder missing: window.QRCode.toCanvas not found.");
      }
      if (typeof window.makeQR !== "function") {
        throw new Error("makeQR() missing. js/qr.js did not load.");
      }

      const url = baseDir() + "application.html#HELLO=" + newHelloToken();
      linkEl.href = url;
      urlEl.value = url;

      // Use your makeQR which already sets EC=L and margin improvements per your notes
      window.makeQR(qrEl, url, qrSize());
    }catch(e){
      showErr(e);
    }
  }

  render();
})();
</script>

</body>
</html>
