<!DOCTYPE html>
<!-- Deploy 53: Local QR Loader Diagnostic -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Home</title>

  <link rel="stylesheet" href="css/style.css">

  <style>
    .page-main{
      padding: 24px 12px calc(var(--mobile-nav-h) + 28px);
      text-align:center;
    }

    .panel{
      margin: 14px auto 0;
      padding: 14px 16px;
      border: 1px solid #e5e5e5;
      background:#fff;
      max-width: 900px;
    }

    .qr-host{
      margin: 12px auto 0;
      padding: 16px;
      border: 1px solid #e5e5e5;
      background:#fff;
      width: fit-content;
      overflow-x:auto;
    }

    .urlbox{
      margin-top: 12px;
      text-align:left;
    }

    .urlbox input{
      width:100%;
      padding:10px;
      border:1px solid #ddd;
      font-family: monospace;
    }

    #status{
      margin-top:10px;
      font-size:13px;
      text-align:left;
      white-space:pre-wrap;
      background:#f7f7f7;
      padding:10px;
      border:1px solid #ddd;
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="brand-wrap">
    <a class="brand" href="index.html">
      <img src="logo.png" alt="IRLid Logo" id="logo">
    </a>
  </div>

  <nav class="site-nav">
    <a class="nav-btn" href="index.html">Home</a>
    <a class="nav-btn" href="application.html">Scan</a>

    <details class="nav-dropdown">
      <summary class="nav-btn">About ▼</summary>
      <div class="dropdown-menu">
        <a href="about.html">About</a>
        <a href="features.html">Features</a>
        <a href="contact.html">Contact</a>
      </div>
    </details>

    <span id="accountSlot"></span>
  </nav>
</header>

<main class="page-main">
  <div class="panel">
    <h2>QR Library Diagnostic</h2>

    <div class="qr-host" id="qrHost"></div>

    <div class="urlbox">
      <input id="qrUrl" readonly>
    </div>

    <div id="status"></div>
  </div>
</main>

<script src="js/auth.js"></script>
<script src="js/nav.js"></script>

<script>
(async function(){
  const status = document.getElementById("status");
  const qrHost = document.getElementById("qrHost");
  const qrUrl = document.getElementById("qrUrl");

  function log(msg){
    status.textContent += msg + "\n";
  }

  async function loadScript(path){
    return new Promise((resolve, reject)=>{
      const s = document.createElement("script");
      s.src = path;
      s.onload = ()=>resolve(path);
      s.onerror = ()=>reject(path);
      document.head.appendChild(s);
    });
  }

  const candidates = [
    "qrcode.min.js",
    "./qrcode.min.js",
    "js/qrcode.min.js"
  ];

  let loadedFrom = null;

  for (const path of candidates){
    try{
      log("Trying: " + path);
      await loadScript(path);
      if (window.QRCode && window.QRCode.toCanvas){
        loadedFrom = path;
        log("SUCCESS: Loaded QR library from " + path);
        break;
      } else {
        log("Loaded script but window.QRCode not found.");
      }
    } catch(e){
      log("Failed to load: " + path);
    }
  }

  if (!loadedFrom){
    log("\n❌ Could not find local qrcode.min.js.");
    log("Check exact filename and folder in your repo.");
    return;
  }

  const base = location.origin + location.pathname.replace(/[^\/]*$/, "");
  const url = base + "application.html";

  qrUrl.value = url;

  const canvas = document.createElement("canvas");
  const size = 420;
  canvas.width = size;
  canvas.height = size;
  canvas.style.width = size + "px";
  canvas.style.height = size + "px";
  qrHost.appendChild(canvas);

  window.QRCode.toCanvas(canvas, url, {
    width: size,
    margin: 4,
    errorCorrectionLevel: "L"
  }, function(err){
    if (err){
      log("QR render error: " + err);
    } else {
      log("QR rendered successfully.");
    }
  });

})();
</script>

</body>
</html>
