<!DOCTYPE html>
<!-- Deploy 50 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Home</title>

  <link rel="stylesheet" href="css/style.css">

  <style>
    :root{
      --side-pad:12px;
      --panel-border:#e5e5e5;
    }

    .page-main{
      padding: 24px var(--side-pad) calc(var(--mobile-nav-h) + 28px);
      text-align:center;
    }

    .home-wrap{
      max-width: 920px;
      margin: 0 auto;
    }

    .qr-box{
      display:block;
      margin: 10px auto 0;
      padding: 16px;
      background: #fff;
      border: 1px solid var(--panel-border);
      width: fit-content;
      max-width: 100%;
    }

    .hint{
      margin-top:12px;
      font-size: 13px;
      opacity: .85;
    }

    .hint a{
      color:#111;
      text-decoration:underline;
    }

    .urlbox{
      margin: 12px auto 0;
      max-width: 920px;
      text-align:left;
    }
    .urlbox label{
      display:block;
      font-size:12px;
      opacity:.8;
      margin-bottom:6px;
    }
    .urlbox input{
      width:100%;
      padding:10px 12px;
      font-size:12px;
      border:1px solid #ddd;
      border-radius:0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    #qrError{
      display:none;
      max-width: 920px;
      margin: 14px auto 0;
      text-align:left;
      white-space: pre-wrap;
      background:#fff4f4;
      border:1px solid #ffd0d0;
      padding:10px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="logo-row">
    <a href="index.html" class="logo-link" aria-label="IRLid Home">
      <img
        src="irlid-logo.png"
        alt="IRLid"
        class="logo-img"
        onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src='logo.png';}else{this.style.display='none';}"
      >
      <span class="logo-text">IRLid</span>
    </a>
  </div>

  <!-- NAVIGATION (must match across pages) -->
  <nav class="site-nav" aria-label="Primary">
    <a class="nav-btn" href="index.html">Home</a>
    <a class="nav-btn" href="application.html">Scan</a>

    <details class="nav-dropdown" id="aboutDropdown">
      <summary class="nav-btn">About ▼</summary>
      <div class="dropdown-menu" role="menu" aria-label="About menu">
        <a href="about.html">About</a>
        <a href="features.html">Features</a>
        <a href="contact.html">Contact</a>
      </div>
    </details>

    <span id="accountSlot"></span>
  </nav>
</header>

<main class="page-main">
  <div class="home-wrap">
    <h2>Show this QR to the other person</h2>

    <div class="qr-box" id="helloQr" aria-label="HELLO QR"></div>

    <div class="hint">
      If scanning fails, tap: <a id="helloLink" href="application.html">Open handshake link</a>
    </div>

    <div class="urlbox">
      <label for="helloUrl">QR contents (should start with https://)</label>
      <input id="helloUrl" type="text" readonly value="">
    </div>

    <div id="qrError" role="alert"></div>
  </div>
</main>

<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script src="js/sign.js"></script>
<script src="js/qr.js?v=46"></script>

<script>
(function(){
  "use strict";

  const qrTarget = document.getElementById("helloQr");
  const linkEl = document.getElementById("helloLink");
  const urlEl = document.getElementById("helloUrl");
  const errEl = document.getElementById("qrError");

  function showErr(e){
    errEl.style.display = "block";
    errEl.textContent = String(e && e.stack ? e.stack : e);
  }
  function clearErr(){
    errEl.style.display = "none";
    errEl.textContent = "";
  }

  function b64urlFromBytes(bytes){
    let bin = "";
    for (let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
    const b64 = btoa(bin);
    return b64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
  }

  function newHelloToken(){
    const bytes = new Uint8Array(16);
    crypto.getRandomValues(bytes);
    return b64urlFromBytes(bytes);
  }

  function loadScript(url){
    return new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = url;
      s.async = true;
      s.onload = () => resolve(url);
      s.onerror = () => reject(new Error("Script load failed: " + url));
      document.head.appendChild(s);
    });
  }

  async function ensureQrLibrary(){
    if (window.QRCode && typeof window.QRCode.toCanvas === "function") return;

    const candidates = [
      "qrcode.min.js",
      "js/qrcode.min.js",
      "js/vendor/qrcode.min.js",
      "assets/qrcode.min.js",
      "https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js",
      "https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js",
      "https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"
    ];

    const failures = [];
    for (const u of candidates){
      try{
        await loadScript(u);
        if (window.QRCode && typeof window.QRCode.toCanvas === "function") return;
      }catch(e){
        failures.push(String(e.message || e));
      }
    }
    throw new Error("Failed to load QRCode library.\n" + failures.join("\n"));
  }

  function baseDir(){
    // directory of current page, guaranteed (no “view-source:” surprises)
    const path = location.pathname.replace(/[^\/]*$/, "");
    return location.origin + path;
  }

  function qrSize(){
    const mobile = window.matchMedia && window.matchMedia("(max-width: 720px)").matches;
    return mobile ? 360 : 520;
  }

  let currentUrl = null;

  async function render(){
    try{
      clearErr();
      await ensureQrLibrary();

      if (typeof window.makeQR !== "function") {
        throw new Error("makeQR() missing. js/qr.js failed to load.");
      }

      const url = baseDir() + "application.html#HELLO=" + newHelloToken();
      currentUrl = url;

      linkEl.href = url;
      urlEl.value = url;

      window.makeQR(qrTarget, url, qrSize());
    }catch(e){
      showErr(e);
    }
  }

  render();
})();
</script>

</body>
</html>
