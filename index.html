<!DOCTYPE html>
<html lang="en">
<!-- Deploy 36 -->
<head>
  <meta charset="utf-8" />
  <title>IRLid</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Global CSS -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Page-specific CSS -->
  <style>
    main {
      padding: 1rem;
      text-align: center;
    }

    #helloQR {
      margin-top: 1.5rem;
      display: flex;
      justify-content: center;
    }

    #helloText {
      margin-top: 1rem;
      font-family: monospace;
      word-break: break-all;
      font-size: 0.85rem;
      color: #333;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="logo">
      IRLid
    </div>
  </header>

  <!-- Desktop Nav -->
  <nav class="site-nav desktop-nav">
    <a href="index.html">Home</a>
    <a href="scan.html">Scan</a>
    <div class="dropdown">
      <button class="dropbtn">About</button>
      <div class="dropdown-content">
        <a href="about.html">What is IRLid?</a>
        <a href="protocol.html">Protocol</a>
      </div>
    </div>
    <a href="login.html">Login / Name</a>
  </nav>

  <!-- Mobile Nav -->
  <nav class="mobile-nav">
    <a href="index.html">Home</a>
    <a href="scan.html">Scan</a>
    <div class="dropdown">
      <button class="dropbtn">About</button>
      <div class="dropdown-content">
        <a href="about.html">About</a>
        <a href="protocol.html">Protocol</a>
      </div>
    </div>
    <a href="login.html">Login</a>
  </nav>

  <!-- Main -->
  <main>
    <h1>HELLO</h1>
    <p>Show this QR to someone nearby to prove you're real.</p>

    <div id="helloQR"></div>
    <div id="helloText"></div>
  </main>

  <!-- ===================================================== -->
  <!-- SCRIPT LOAD ORDER IS THE FIX — DO NOT ASYNC / DEFER -->
  <!-- ===================================================== -->

  <!-- QR code rendering library -->
  <script src="js/qrcode.min.js"></script>

  <!-- IRLid QR helpers (defines makeQR) -->
  <script src="js/qr.js"></script>

  <!-- Home render logic -->
  <script>
    (function () {
      if (typeof makeQR !== "function") {
        console.error("makeQR() not available — qr.js failed to load");
        return;
      }

      const helloPayload = "HELLO=" + crypto.randomUUID();

      const qrContainer = document.getElementById("helloQR");
      const textContainer = document.getElementById("helloText");

      makeQR(qrContainer, location.origin + "/application.html#" + helloPayload);

      textContainer.textContent = helloPayload;
    })();
  </script>

</body>
</html>
