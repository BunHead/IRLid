<!DOCTYPE html>
<!-- Deploy 26 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Proof of Personhood</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    :root{
      --black:#000;
      --white:#fff;

      --mobile-nav-h: 124px;
      --side-pad: 12px;
      --qr-top-gap: 8px;
    }

    html, body { height: 100%; }
    body{
      margin: 0;
      background: #fff;
      overflow-x: hidden;
    }

    header.site-header{ width:100%; background:#fff; }
    .brand-wrap{ width:100%; padding:10px 14px 0 14px; }
    .brand{ display:inline-flex; align-items:center; text-decoration:none; color:inherit; }

    nav.site-nav{
      width: 100%;
      background: var(--black);
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:0;
      padding:0;
      margin:0;
      position: sticky;
      top:0;
      z-index:1000;
    }

    #accountSlot{ display: contents; }

    a.nav-btn, summary.nav-btn{
      appearance:none;
      -webkit-appearance:none;
      border: 0;
      background: var(--black);
      color: var(--white);
      text-decoration:none;
      font: inherit;
      font-weight: 700;
      border-radius: 0;
      margin: 0;
      padding: 10px 12px;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      white-space: nowrap;
    }

    a.nav-btn:hover, summary.nav-btn:hover{ background:#111; }
    a.nav-btn:active, summary.nav-btn:active{ background:#222; }
    a.nav-btn:focus, summary.nav-btn:focus{ outline: 2px solid #555; outline-offset: -2px; }

    details.nav-dropdown{ position: relative; }
    details.nav-dropdown > summary{ list-style:none; }
    details.nav-dropdown > summary::-webkit-details-marker{ display:none; }

    .dropdown-menu{
      position:absolute;
      top:100%;
      left:0;
      min-width:180px;
      background:#111;
      border:0;
      padding:0;
      margin:0;
      z-index:1200;
    }
    .dropdown-menu a{
      display:block;
      width:100%;
      text-align:left;
      padding:12px 14px;
      color:#fff;
      background:#111;
      border:0;
      text-decoration:none;
      font-weight:700;
      border-top:1px solid rgba(255,255,255,0.06);
      box-sizing:border-box;
    }
    .dropdown-menu a:hover{ background:#000; }

    main.home-main{
      width: 100%;
      box-sizing: border-box;
      padding: var(--qr-top-gap) var(--side-pad) 0 var(--side-pad);
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .qr-box{
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      box-sizing: border-box;
    }
    .qr-box canvas, .qr-box img{
      display: block;
      margin: 0 auto;
      max-width: 100%;
      height: auto;
      image-rendering: pixelated;
    }

    #qrError{
      display:none;
      margin: 8px var(--side-pad) 0 var(--side-pad);
      padding: 10px;
      border: 1px solid #f3c0c0;
      background: #fff3f3;
      color: #600;
      font-family: ui-monospace, monospace;
      white-space: pre-wrap;
      box-sizing: border-box;
    }

    @media (max-width: 720px){
      :root{ --qr-top-gap: 2px; }

      .brand-wrap{
        padding: 4px var(--side-pad) 0 var(--side-pad);
      }
      #logo{
        max-width: 72vw;
        max-height: 90px;
        width: auto;
        height: auto;
        display: block;
      }

      nav.site-nav{
        position: fixed;
        top: auto; /* IMPORTANT */
        bottom: env(safe-area-inset-bottom, 0px);
        left: 0;
        right: 0;
        height: var(--mobile-nav-h);

        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 0;
        margin: 0;
        padding: 0;
        background: var(--black);
        z-index: 2000;
      }

      a.nav-btn, summary.nav-btn{
        width: 100%;
        height: 100%;
        padding: 0;
        border-radius: 0;
        font-size: 18px;
      }

      .dropdown-menu{
        position: fixed;
        left: 0;
        right: 0;
        top: auto;
        bottom: calc(var(--mobile-nav-h) + env(safe-area-inset-bottom, 0px));
        border-radius: 0;
      }

      body{
        padding-bottom: calc(var(--mobile-nav-h) + env(safe-area-inset-bottom, 0px));
      }

      main.home-main{
        min-height: calc(100vh - (var(--mobile-nav-h) + env(safe-area-inset-bottom, 0px)));
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="brand-wrap">
      <a class="brand" href="index.html" aria-label="IRLid Home">
        <img src="logo.png" alt="IRLid Logo" id="logo">
      </a>
    </div>

    <nav class="site-nav" aria-label="Primary">
      <a class="nav-btn" href="index.html">Home</a>
      <a class="nav-btn" href="application.html">Scan</a>

      <details class="nav-dropdown" id="aboutDropdown">
        <summary class="nav-btn">About ▼</summary>
        <div class="dropdown-menu" role="menu" aria-label="About menu">
          <a href="about.html">About</a>
          <a href="features.html">Features</a>
          <a href="contact.html">Contact</a>
        </div>
      </details>

      <span id="accountSlot"></span>
    </nav>
  </header>

  <main class="home-main">
    <div class="qr-box" id="helloQr"></div>
  </main>

  <div id="qrError"></div>

  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/sign.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="js/qr.js?v=deploy19"></script>

  <script>
    // --- QR-first home: create a HELLO link and render as QR, auto-size to viewport ---
    const qrElId = "helloQr";
    const errEl = document.getElementById("qrError");

    function showErr(e){
      errEl.style.display = "block";
      errEl.textContent = String(e && e.stack ? e.stack : e);
    }

    function b64url(bytes){
      let bin = "";
      for (let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
      return btoa(bin).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/g,"");
    }

    function makeHello(){
      // payload content is handled by application.html; keep as existing behavior.
      const hello = b64url(crypto.getRandomValues(new Uint8Array(24)));
      const url = new URL("application.html", location.href);
      url.hash = "HELLO=" + hello;
      return url.toString();
    }

    function vp(){
      return (window.visualViewport && window.visualViewport.width && window.visualViewport.height)
        ? { w: window.visualViewport.width, h: window.visualViewport.height }
        : { w: window.innerWidth, h: window.innerHeight };
    }

    function computeQrSize(){
      const { w, h } = vp();

      // Account for padding + fixed bottom nav on mobile
      const pad = 2 * 12;
      const navH = (window.matchMedia && window.matchMedia("(max-width: 720px)").matches) ? 124 : 0;
      const safeB = parseFloat(getComputedStyle(document.body).paddingBottom || "0") || 0;

      const usableH = Math.max(200, h - navH - safeB - 20);
      const usableW = Math.max(200, w - pad);

      const size = Math.floor(Math.min(usableW, usableH));
      return Math.max(220, Math.min(size, 720));
    }

    let currentUrl = makeHello();

    function render(){
      try{
        errEl.style.display = "none";
        const size = computeQrSize();
        if (typeof makeQR !== "function") throw new Error("makeQR() missing (js/qr.js not loaded)");
        makeQR(qrElId, currentUrl, size);
      }catch(e){
        showErr(e);
      }
    }

    render();

    // Resize/orientation: use visualViewport when available
    let rAF = null;
    function scheduleRender(){
      if (rAF) cancelAnimationFrame(rAF);
      rAF = requestAnimationFrame(render);
    }
    window.addEventListener("resize", scheduleRender);
    window.addEventListener("orientationchange", scheduleRender);
    if (window.visualViewport){
      window.visualViewport.addEventListener("resize", scheduleRender);
      window.visualViewport.addEventListener("scroll", scheduleRender);
    }
  </script>
</body>
</html>
