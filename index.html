<!DOCTYPE html>
<!-- Deploy 54: Local QR Loader Diagnostic (fixed candidates array) -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Home</title>

  <link rel="stylesheet" href="css/style.css">

  <style>
    .page-main{
      padding: 24px 12px calc(var(--mobile-nav-h) + 28px);
      text-align:center;
    }

    .panel{
      margin: 14px auto 0;
      padding: 14px 16px;
      border: 1px solid #e5e5e5;
      background:#fff;
      max-width: 900px;
    }

    .qr-host{
      margin: 12px auto 0;
      padding: 16px;
      border: 1px solid #e5e5e5;
      background:#fff;
      width: fit-content;
      overflow-x:auto;
    }

    .urlbox{
      margin-top: 12px;
      text-align:left;
    }

    .urlbox input{
      width:100%;
      padding:10px;
      border:1px solid #ddd;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:12px;
      border-radius:0;
    }

    #status{
      margin-top:10px;
      font-size:13px;
      text-align:left;
      white-space:pre-wrap;
      background:#f7f7f7;
      padding:10px;
      border:1px solid #ddd;
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="brand-wrap">
    <a class="brand" href="index.html" aria-label="IRLid Home">
      <img src="logo.png" alt="IRLid Logo" id="logo"
           onerror="if(!this.dataset.fallback){this.dataset.fallback='1';this.src='irlid-logo.png';}else{this.style.display='none';}">
    </a>
  </div>

  <nav class="site-nav" aria-label="Primary">
    <a class="nav-btn" href="index.html">Home</a>
    <a class="nav-btn" href="application.html">Scan</a>

    <details class="nav-dropdown" id="aboutDropdown">
      <summary class="nav-btn">About ▼</summary>
      <div class="dropdown-menu" role="menu" aria-label="About menu">
        <a href="about.html">About</a>
        <a href="features.html">Features</a>
        <a href="contact.html">Contact</a>
      </div>
    </details>

    <span id="accountSlot"></span>
  </nav>
</header>

<main class="page-main">
  <div class="panel">
    <h2>QR Library Diagnostic</h2>

    <div class="qr-host" id="qrHost"></div>

    <div class="urlbox">
      <label for="qrUrl">QR contents (should open in browser)</label>
      <input id="qrUrl" readonly>
    </div>

    <div id="status"></div>
  </div>
</main>

<script src="js/auth.js"></script>
<script src="js/nav.js"></script>

<script>
(async function(){
  const status = document.getElementById("status");
  const qrHost = document.getElementById("qrHost");
  const qrUrl = document.getElementById("qrUrl");

  function log(msg){
    status.textContent += msg + "\n";
  }

  async function loadScript(path){
    return new Promise((resolve, reject)=>{
      const s = document.createElement("script");
      s.src = path;
      s.async = true;
      s.onload = ()=>resolve(path);
      s.onerror = ()=>reject(new Error("Failed to load: " + path));
      document.head.appendChild(s);
    });
  }

  const candidates = [
    "js/vendor/qrcode.min.js",
    "./js/vendor/qrcode.min.js",
    "js/qrcode.min.js",
    "./js/qrcode.min.js",
    "qrcode.min.js",
    "./qrcode.min.js"
  ];

  log("Starting QR lib probe…");

  let loadedFrom = null;

  for (const path of candidates){
    try{
      log("Trying: " + path);
      await loadScript(path);

      if (window.QRCode && typeof window.QRCode.toCanvas === "function"){
        loadedFrom = path;
        log("SUCCESS: window.QRCode.toCanvas found from " + path);
        break;
      }

      // Helpful debug if the lib exports differently
      const globals = Object.keys(window).filter(k => k.toLowerCase().includes("qr"));
      log("Loaded, but QRCode.toCanvas not found. Window globals containing 'qr': " + (globals.slice(0, 25).join(", ") || "(none)"));

    }catch(e){
      log(String(e.message || e));
    }
  }

  if (!loadedFrom){
    log("\n❌ Could not find a QR library that exposes window.QRCode.toCanvas.");
    log("If you open /IRLid/js/vendor/qrcode.min.js directly in the browser, it should show JavaScript text.");
    return;
  }

  const base = location.origin + location.pathname.replace(/[^\/]*$/, "");
  const url = base + "application.html";
  qrUrl.value = url;

  const canvas = document.createElement("canvas");
  const size = 420;
  canvas.width = size;
  canvas.height = size;
  canvas.style.width = size + "px";
  canvas.style.height = size + "px";
  canvas.style.display = "block";
  canvas.style.margin = "0 auto";
  canvas.style.imageRendering = "pixelated";
  qrHost.innerHTML = "";
  qrHost.appendChild(canvas);

  try{
    window.QRCode.toCanvas(canvas, url, {
      width: size,
      margin: 4,
      errorCorrectionLevel: "L"
    }, function(err){
      if (err){
        log("QR render error: " + err);
      } else {
        log("✅ QR rendered successfully.");
      }
    });
  }catch(e){
    log("QR render threw: " + e);
  }

})();
</script>

</body>
</html>
