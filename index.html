<!DOCTYPE html>
<!-- Deploy 46 (index fix) -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Home</title>

  <link rel="stylesheet" href="css/style.css">

  <style>
    :root{
      --side-pad:12px;
    }

    .page-main{
      padding: 24px var(--side-pad) calc(var(--mobile-nav-h, 0px) + 28px);
      text-align:center;
    }

    .home-wrap{
      max-width: 900px;
      margin: 0 auto;
    }

    .qr-box{
      display:inline-block;
      padding: 16px;
      background: #fff;
      border: 1px solid #e5e5e5;
    }

    .hint{
      margin-top:10px;
      font-size: 13px;
      opacity: .85;
    }

    .hint a{ color:#111; text-decoration:underline; }

    #qrError{
      display:none;
      max-width: 900px;
      margin: 14px auto 0;
      text-align:left;
      white-space: pre-wrap;
      background:#fff4f4;
      border:1px solid #ffd0d0;
      padding:10px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="logo-row">
    <a href="index.html" class="logo-link" aria-label="IRLid Home">
      <img src="irlid-logo.png" alt="IRLid" class="logo-img" onerror="this.style.display='none'">
      <span class="logo-text">IRLid</span>
    </a>
  </div>

  <!-- NAVIGATION (must match across pages) -->
  <nav class="site-nav" aria-label="Primary">
    <a class="nav-btn" href="index.html">Home</a>
    <a class="nav-btn" href="application.html">Scan</a>

    <details class="nav-dropdown" id="aboutDropdown">
      <summary class="nav-btn">About ▼</summary>
      <div class="dropdown-menu" role="menu" aria-label="About menu">
        <a href="about.html">About</a>
        <a href="features.html">Features</a>
        <a href="contact.html">Contact</a>
      </div>
    </details>

    <span id="accountSlot"></span>
  </nav>
</header>

<main class="page-main">
  <div class="home-wrap">
    <h2>Show this QR to the other person</h2>
    <div class="qr-box" id="helloQr" aria-label="HELLO QR"></div>
    <div class="hint">
      If scanning fails, tap: <a id="helloLink" href="application.html">Open Scan</a>
    </div>
    <div id="qrError" role="alert"></div>
  </div>
</main>

<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script src="js/sign.js"></script>

<!-- IMPORTANT: use the local qrcode library that exists in this repo -->
<script src="js/qrcode.min.js"></script>

<!-- IMPORTANT: no spaces in cache-busters -->
<script src="js/qr.js?v=45"></script>

<script>
(function(){
  "use strict";

  const qrEl = document.getElementById("helloQr");
  const linkEl = document.getElementById("helloLink");
  const errEl = document.getElementById("qrError");

  function showErr(e){
    errEl.style.display = "block";
    errEl.textContent = String(e && e.stack ? e.stack : e);
  }
  function clearErr(){
    errEl.style.display = "none";
    errEl.textContent = "";
  }

  function b64urlFromBytes(bytes){
    let bin = "";
    for (let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
    const b64 = btoa(bin);
    return b64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
  }

  function newHelloToken(){
    const bytes = new Uint8Array(16);
    crypto.getRandomValues(bytes);
    return b64urlFromBytes(bytes);
  }

  function computeQrSize(){
    const w = window.innerWidth || 360;
    const h = window.innerHeight || 640;
    const pad = 24;
    const navH = (window.matchMedia && window.matchMedia("(max-width: 720px)").matches) ? 124 : 0;
    const usable = Math.min(w - pad, h - navH - pad);
    return Math.max(260, Math.min(usable, 720));
  }

  let currentUrl = null;

  async function render(){
    try{
      clearErr();

      if (typeof window.makeQR !== "function") {
        throw new Error("QR renderer unavailable. Ensure js/qrcode.min.js and js/qr.js load correctly.");
      }

      const url = new URL("application.html", location.href);
      url.hash = "HELLO=" + newHelloToken();
      currentUrl = url.toString();

      linkEl.href = currentUrl;

      window.makeQR(qrEl, currentUrl, computeQrSize());
    }catch(e){
      showErr(e);
    }
  }

  let t = null;
  function schedule(){
    if (!currentUrl) return;
    clearTimeout(t);
    t = setTimeout(() => {
      try{
        clearErr();
        window.makeQR(qrEl, currentUrl, computeQrSize());
      }catch(e){ showErr(e); }
    }, 150);
  }

  window.addEventListener("resize", schedule);
  window.addEventListener("orientationchange", schedule);

  render();
})();
</script>

</body>
</html>
