<!-- receipt.html -->
<!DOCTYPE html>
<!-- Deploy 61 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Receipt</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="site-header">
  <div class="brand-wrap">
    <a class="brand" href="index.html" aria-label="IRLid Home">
      <img src="logo.png" alt="IRLid Logo" id="logo" onerror="this.style.display='none'">
    </a>
  </div>

  <nav class="site-nav" aria-label="Primary">
    <a class="nav-btn" href="index.html">Home</a>
    <a class="nav-btn" href="application.html">Scan</a>

    <details class="nav-dropdown" id="aboutDropdown">
      <summary class="nav-btn">About ▼</summary>
      <div class="dropdown-menu" role="menu" aria-label="About menu">
        <a href="about.html">About</a>
        <a href="features.html">Features</a>
        <a href="contact.html">Contact</a>
      </div>
    </details>

    <span id="accountSlot"></span>
  </nav>
</header>

<main class="page-main">
  <div class="receipt-wrap">

    <div class="panel" id="emptyState" style="display:none;">
      No receipts yet. Use <a href="application.html">Scan</a> to exchange return QRs.
    </div>

    <div class="qr-box receipt-qr" id="topQr" aria-label="Receipt QR"></div>

    <div class="panel" id="metaPanel" style="display:none;">
      <h3 id="metaTitle">Receipt</h3>

      <div class="people-grid" id="peopleGrid" style="display:none;">
        <div class="person-panel">
          <div class="person-title">Self</div>
          <div class="person-row" id="aCoords"></div>
          <div class="person-row" id="aTime"></div>
          <div class="person-note" id="aAcc"></div>
        </div>

        <div class="person-panel">
          <div class="person-title">Guest</div>
          <div class="person-row" id="bCoords"></div>
          <div class="person-row" id="bTime"></div>
          <div class="person-note" id="bAcc"></div>
        </div>
      </div>

      <div class="checks" id="checks"></div>

      <div class="btnrow">
        <button class="btn secondary" id="clearBtn">Clear stored receipts</button>
      </div>

      <div class="person-note" style="margin-top:10px;">
        The QR above is a URL. Any QR scanner can open this receipt page.
      </div>
    </div>

    <details class="raw" id="rawWrap" style="display:none;">
      <summary>Show stored JSON</summary>
      <pre id="rawJson"></pre>
    </details>

  </div>
</main>

<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script src="js/sign.js"></script>
<script src="js/qr.js?v=59"></script>

<script>
  const TS_TOL_S = 60;
  const DIST_TOL_M = 2;

  // Back-compat keys (some builds store these)
  const KEY_SELF  = "irlid_resp_self";
  const KEY_GUEST = "irlid_resp_other";
  const KEY_LAST  = "irlid_receipt_last";

  // Primary history key (per project description)
  const KEY_LIST  = "irlid_receipts";

  const emptyState = document.getElementById("emptyState");
  const metaPanel = document.getElementById("metaPanel");
  const metaTitle = document.getElementById("metaTitle");
  const rawWrap = document.getElementById("rawWrap");
  const rawJson = document.getElementById("rawJson");
  const peopleGrid = document.getElementById("peopleGrid");
  const checksEl = document.getElementById("checks");

  const aCoords = document.getElementById("aCoords");
  const aTime   = document.getElementById("aTime");
  const aAcc    = document.getElementById("aAcc");
  const bCoords = document.getElementById("bCoords");
  const bTime   = document.getElementById("bTime");
  const bAcc    = document.getElementById("bAcc");

  const clearBtn = document.getElementById("clearBtn");

  function fmtNum(x){
    return (typeof x === "number") ? x.toFixed(6) : String(x || "");
  }

  function formatTimeNoTs(ts){
    if (typeof ts !== "number") return "";
    const d = new Date(ts);
    if (Number.isNaN(d.getTime())) return "";
    return d.toLocaleString();
  }

  function haversineMeters(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const toRad = (d) => (d * Math.PI) / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a =
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
      Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
  }

  function addCheck(label, ok, detail){
    const div = document.createElement("div");
    div.className = "check";
    const badge = document.createElement("div");
    badge.className = "badge " + (ok ? "pass" : "fail");
    badge.textContent = ok ? "PASS" : "FAIL";
    const txt = document.createElement("div");
    txt.innerHTML = `${label}${detail ? `<div class="person-note">${detail}</div>` : ""}`;
    div.appendChild(badge);
    div.appendChild(txt);
    checksEl.appendChild(div);
  }

  function readJson(key){
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    try { return JSON.parse(raw); } catch { return null; }
  }

  function safeParseAny(raw){
    if (!raw) return null;
    if (typeof raw !== "string") return raw;
    try { return JSON.parse(raw); } catch { return null; }
  }

  function getGps(resp){
    const gps = resp && resp.payload ? resp.payload.gps : null;
    if (!gps) return null;
    if (typeof gps.lat !== "number" || typeof gps.lon !== "number") return null;
    return gps;
  }

  function getTs(resp){
    const ts = resp && resp.payload ? resp.payload.ts : null;
    return (typeof ts === "number") ? ts : null;
  }

  function baseReceiptUrl(){
    return new URL("receipt.html", location.href).href.split("#")[0];
  }

  function b64urlEncode(bytes){
    let bin = "";
    for (let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
    const b64 = btoa(bin);
    return b64.replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/g,"");
  }
  function b64urlDecode(str){
    str = (str || "").replace(/-/g,"+").replace(/_/g,"/");
    while (str.length % 4) str += "=";
    const bin = atob(str);
    const out = new Uint8Array(bin.length);
    for (let i=0;i<bin.length;i++) out[i] = bin.charCodeAt(i);
    return out;
  }

  function makeReceiptUrlForCombined(combinedObj){
    const encoded = b64urlEncode(new TextEncoder().encode(JSON.stringify(combinedObj)));
    return `${baseReceiptUrl()}#COMB=${encoded}`;
  }

  function makeReceiptUrlForResponse(respObj){
    const encoded = b64urlEncode(new TextEncoder().encode(JSON.stringify(respObj)));
    return `${baseReceiptUrl()}#RESP=${encoded}`;
  }

  function parseFromHash(){
    const hash = location.hash || "";
    let m = hash.match(/COMB=([A-Za-z0-9\-_]+)/);
    if (m) {
      try {
        const bytes = b64urlDecode(m[1]);
        return { kind: "comb", obj: JSON.parse(new TextDecoder().decode(bytes)) };
      } catch {}
    }
    m = hash.match(/RESP=([A-Za-z0-9\-_]+)/);
    if (m) {
      try {
        const bytes = b64urlDecode(m[1]);
        return { kind: "resp", obj: JSON.parse(new TextDecoder().decode(bytes)) };
      } catch {}
    }
    return null;
  }

  function combinedObject(selfResp, guestResp){
    return {
      v: 1,
      type: "combined",
      tol: { dist_m: DIST_TOL_M, ts_s: TS_TOL_S },
      a: selfResp,
      b: guestResp
    };
  }

  function makeDualMapsUrl(gA, gB){
    if (gA && gB){
      return `https://www.google.com/maps/dir/${gA.lat},${gA.lon}/${gB.lat},${gB.lon}`;
    }
    const g = gA || gB;
    if (!g) return "#";
    return `https://www.google.com/maps?q=${encodeURIComponent(g.lat + "," + g.lon)}`;
  }

  function setPersonPanel(elCoords, elTime, elAcc, resp, mapsUrl){
    if (!resp) {
      elCoords.textContent = "Location: (missing)";
      elTime.textContent = "Time: (missing)";
      elAcc.textContent = "";
      return;
    }

    const gps = getGps(resp);
    const ts = getTs(resp);

    if (gps) {
      elCoords.innerHTML = `Location: <a class="maplink" href="${mapsUrl}" target="_blank" rel="noopener noreferrer">${fmtNum(gps.lat)}, ${fmtNum(gps.lon)}</a>`;
      elAcc.textContent = (typeof gps.acc === "number") ? `Accuracy: ±${Math.round(gps.acc)} m` : "";
    } else {
      elCoords.textContent = "Location: (not captured)";
      elAcc.textContent = "";
    }

    const t = formatTimeNoTs(ts);
    elTime.textContent = t ? `Time: ${t}` : "Time: (missing)";
  }

  async function validateResponse(resp){
    const results = {
      okStructure: false,
      okHash: false,
      okSig: false,
      computedHash: null
    };

    if (!resp || resp.type !== "response" || !resp.payload || !resp.hash || !resp.sig || !resp.pub) {
      return results;
    }
    results.okStructure = true;

    try {
      const computed = await hashPayloadToB64url(resp.payload);
      results.computedHash = computed;
      results.okHash = (computed === resp.hash);
    } catch {
      results.okHash = false;
    }

    try {
      results.okSig = await verifySig(resp.hash, resp.sig, resp.pub);
    } catch {
      results.okSig = false;
    }

    return results;
  }

  function pickLatestFromReceiptsKey(){
    // Accepts several possible stored shapes for KEY_LIST (keeps backward compatibility):
    // - Array of combined objects: [{type:"combined", ...}, ...]
    // - Array of entries: [{ts, combined}, ...]
    // - Array of entries: [{ts, url}, ...] where url is receipt URL
    // - Array of strings: ["https://.../receipt.html#COMB=...", ...]
    const raw = localStorage.getItem(KEY_LIST);
    if (!raw) return null;

    const parsed = safeParseAny(raw);
    if (!parsed) return null;

    const arr = Array.isArray(parsed) ? parsed : (Array.isArray(parsed.items) ? parsed.items : null);
    if (!arr || !arr.length) return null;

    let best = null;
    let bestScore = -Infinity;

    for (const item of arr) {
      const entry = item;

      // Score by explicit ts, otherwise by payload ts, otherwise keep order bias.
      let score = -Infinity;
      const t0 = (entry && typeof entry.ts === "number") ? entry.ts : null;

      const combined =
        (entry && entry.type === "combined") ? entry :
        (entry && entry.combined && entry.combined.type === "combined") ? entry.combined :
        null;

      const url =
        (typeof entry === "string") ? entry :
        (entry && typeof entry.url === "string") ? entry.url :
        (entry && typeof entry.receiptUrl === "string") ? entry.receiptUrl :
        null;

      if (t0 !== null) score = t0;
      else if (combined) {
        const ta = getTs(combined.a);
        const tb = getTs(combined.b);
        const tt = Math.max(ta || -Infinity, tb || -Infinity);
        if (Number.isFinite(tt)) score = tt;
      } else if (url) {
        // If we only have a URL, we can't derive exact time; bias by later index.
        score = 0;
      } else {
        // Unknown shape, low score
        score = -Infinity;
      }

      // Stable tie-breaker using order (later in array is "newer" in many push-based histories)
      const orderBias = arr.indexOf(item) / 1000000;
      score += orderBias;

      if (score > bestScore) {
        bestScore = score;
        best = { entry, combined, url };
      }
    }

    return best;
  }

  clearBtn.onclick = () => {
    localStorage.removeItem(KEY_SELF);
    localStorage.removeItem(KEY_GUEST);
    localStorage.removeItem(KEY_LAST);
    localStorage.removeItem(KEY_LIST);
    location.href = baseReceiptUrl();
  };

  (async () => {
    if (typeof refreshNav === "function") await refreshNav();

    // Highest priority: explicit receipt in URL hash
    const fromHash = parseFromHash();

    // Some flows store a single receipt in KEY_LAST; keep in sync if visiting via #RESP.
    if (fromHash && fromHash.kind === "resp" && fromHash.obj && fromHash.obj.type === "response") {
      localStorage.setItem(KEY_LAST, JSON.stringify(fromHash.obj));
    }

    // Render: try hash first
    if (fromHash && fromHash.kind === "comb" && fromHash.obj && fromHash.obj.type === "combined") {
      await renderCombined(fromHash.obj, "Receipt (shared)");
      return;
    }
    if (fromHash && fromHash.kind === "resp" && fromHash.obj && fromHash.obj.type === "response") {
      await renderSingle(fromHash.obj, "Receipt (single)");
      return;
    }

    // Next priority: latest entry in irlid_receipts (this is the key you described as authoritative)
    const best = pickLatestFromReceiptsKey();
    if (best) {
      if (best.combined) {
        await renderCombined(best.combined, "Receipt (latest)");
        return;
      }
      if (best.url && typeof best.url === "string") {
        // If history stores the already-built receipt URL, just show it as-is.
        metaPanel.style.display = "block";
        rawWrap.style.display = "block";
        peopleGrid.style.display = "none";
        checksEl.innerHTML = "";
        metaTitle.textContent = "Receipt (latest)";
        rawJson.textContent = JSON.stringify(best.entry, null, 2);

        if (typeof makeQR === "function") makeQR("topQr", best.url, 460);
        addCheck("Loaded latest receipt URL from localStorage[irlid_receipts]", true);
        return;
      }
    }

    // Back-compat: if app stored both responses as KEY_SELF/KEY_GUEST, combine and render
    const selfResp  = readJson(KEY_SELF);
    const guestResp = readJson(KEY_GUEST);
    if (selfResp && guestResp) {
      const combined = combinedObject(selfResp, guestResp);
      await renderCombined(combined, "Receipt (local)");
      return;
    }

    // Back-compat: single receipt blob
    const legacy = readJson(KEY_LAST);
    if (legacy && legacy.type === "response") {
      await renderSingle(legacy, "Receipt (single)");
      return;
    }

    // Nothing found
    emptyState.style.display = "block";
  })();

  async function renderCombined(comb, title){
    metaPanel.style.display = "block";
    rawWrap.style.display = "block";
    checksEl.innerHTML = "";
    peopleGrid.style.display = "grid";
    metaTitle.textContent = title || "Receipt";

    const url = makeReceiptUrlForCombined(comb);
    if (typeof makeQR === "function") makeQR("topQr", url, 460);

    rawJson.textContent = JSON.stringify(comb, null, 2);

    const respA = comb.a || null;
    const respB = comb.b || null;

    const gA = getGps(respA);
    const gB = getGps(respB);
    const mapsUrl = makeDualMapsUrl(gA, gB);

    setPersonPanel(aCoords, aTime, aAcc, respA, mapsUrl);
    setPersonPanel(bCoords, bTime, bAcc, respB, mapsUrl);

    if (respA) {
      const vr = await validateResponse(respA);
      addCheck("Self receipt structure", vr.okStructure);
      addCheck("Self hash matches payload", vr.okHash, vr.okHash ? "" : `computed=${vr.computedHash || "?"}`);
      addCheck("Self signature valid", vr.okSig);
    } else {
      addCheck("Self receipt present", false, "Missing Self response in combined object.");
    }

    if (respB) {
      const vr = await validateResponse(respB);
      addCheck("Guest receipt structure", vr.okStructure);
      addCheck("Guest hash matches payload", vr.okHash, vr.okHash ? "" : `computed=${vr.computedHash || "?"}`);
      addCheck("Guest signature valid", vr.okSig);
    } else {
      addCheck("Guest receipt present", false, "Missing Guest response in combined object.");
    }

    if (respA && respB) {
      const pubsA = (respA.payload && respA.payload.pubs) ? JSON.stringify(respA.payload.pubs) : null;
      const pubsB = (respB.payload && respB.payload.pubs) ? JSON.stringify(respB.payload.pubs) : null;
      const okPubs = (pubsA && pubsB && pubsA === pubsB);
      addCheck("Both receipts refer to the same two public keys (ordered pubs)", okPubs);

      const tsA = getTs(respA);
      const tsB = getTs(respB);
      const okTs = (typeof tsA === "number" && typeof tsB === "number" && Math.abs(tsA - tsB) <= TS_TOL_S);
      addCheck(`Timestamps within ${TS_TOL_S}s`, okTs, (tsA && tsB) ? `Δt=${Math.abs(tsA-tsB)}s` : "missing ts");

      let okDist = false;
      let dist = null;
      if (gA && gB) {
        dist = haversineMeters(gA.lat, gA.lon, gB.lat, gB.lon);
        okDist = dist <= DIST_TOL_M;
      }
      addCheck(`Distance within ${DIST_TOL_M}m`, okDist, dist !== null ? `Δ=${dist.toFixed(2)}m` : "missing gps");
    } else {
      addCheck("Waiting for both parties (need two receipts)", false, "Combined object missing one side.");
    }
  }

  async function renderSingle(resp, title){
    metaPanel.style.display = "block";
    rawWrap.style.display = "block";
    checksEl.innerHTML = "";
    peopleGrid.style.display = "grid";
    metaTitle.textContent = title || "Receipt";

    const url = makeReceiptUrlForResponse(resp);
    if (typeof makeQR === "function") makeQR("topQr", url, 460);

    rawJson.textContent = JSON.stringify(resp, null, 2);

    // single: show on "Self" panel only
    const mapsUrl = makeDualMapsUrl(getGps(resp), null);
    setPersonPanel(aCoords, aTime, aAcc, resp, mapsUrl);
    setPersonPanel(bCoords, bTime, bAcc, null, mapsUrl);

    const vr = await validateResponse(resp);
    addCheck("Receipt structure", vr.okStructure);
    addCheck("Hash matches payload", vr.okHash, vr.okHash ? "" : `computed=${vr.computedHash || "?"}`);
    addCheck("Signature valid", vr.okSig);

    addCheck("Waiting for both parties (need two receipts)", false, "Have one receipt only. Show the URL QR above to the other person.");
  }
</script>

</body>
</html>
