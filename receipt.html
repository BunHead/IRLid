<!DOCTYPE html>
<!-- Deploy 24 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Receipts</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    :root{
      --black:#000;
      --white:#fff;
      --mobile-nav-h: 124px;
      --side-pad: 12px;
      --top-gap: 10px;
    }

    html, body{ height:100%; }
    body{
      margin:0;
      background:#fff;
      overflow-x:hidden;
    }

    header.site-header{ width:100%; background:#fff; }
    .brand-wrap{ width:100%; padding:10px 14px 0 14px; }
    .brand{ display:inline-flex; align-items:center; text-decoration:none; color:inherit; }

    nav.site-nav{
      width:100%;
      background:var(--black);
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:0;
      padding:0;
      margin:0;
      position:sticky;
      top:0;
      z-index:1000;
    }

    a.nav-btn, summary.nav-btn{
      appearance:none; -webkit-appearance:none;
      border:0;
      background:var(--black);
      color:var(--white);
      text-decoration:none;
      font:inherit;
      font-weight:700;
      border-radius:0;
      margin:0;
      padding:10px 14px;
      line-height:1;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
    }

    a.nav-btn:hover, summary.nav-btn:hover{ background:#111; }

    details.nav-dropdown{ position:relative; }
    details.nav-dropdown > summary{ list-style:none; }
    details.nav-dropdown > summary::-webkit-details-marker{ display:none; }

    .dropdown-menu{
      position:absolute;
      top:100%;
      left:0;
      min-width:180px;
      background:#111;
      border:0;
      padding:0;
      margin:0;
      z-index:1200;
    }
    .dropdown-menu a, .dropdown-menu button{
      display:block;
      width:100%;
      text-align:left;
      padding:12px 14px;
      color:#fff;
      background:#111;
      border:0;
      text-decoration:none;
      font-weight:700;
      border-top:1px solid rgba(255,255,255,0.06);
      cursor:pointer;
    }
    .dropdown-menu a:hover, .dropdown-menu button:hover{ background:#000; }

    main.page-main{
      max-width: 980px;
      margin: 0 auto;
      padding: var(--top-gap) var(--side-pad) 22px var(--side-pad);
      box-sizing:border-box;
    }

    .receipt-wrap{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap: 12px;
      padding-top: 6px;
    }

    .qr-box{
      width: min(92vw, 520px);
      max-width: 520px;
      box-sizing:border-box;
    }
    .qr-box canvas, .qr-box img{
      display:block;
      margin:0 auto;
      max-width:100%;
      height:auto;
      image-rendering: pixelated;
    }

    .panel{
      width: min(92vw, 720px);
      max-width: 720px;
      box-sizing:border-box;
      border: 1px solid #ddd;
      padding: 12px;
      background: #fff;
    }

    .panel h3{ margin: 0 0 8px 0; }

    a.maplink{
      color:#000;
      text-decoration: underline;
      font-weight: 800;
    }

    .people-grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .person-panel{
      border: 1px solid #ddd;
      padding: 10px;
      background: #fff;
      box-sizing:border-box;
    }
    .person-title{
      font-weight: 900;
      margin: 0 0 6px 0;
    }
    .person-row{
      margin: 6px 0;
      font-weight: 800;
    }
    .person-note{
      font-size: 12.5px;
      font-weight: 650;
      opacity: 0.88;
      margin-top: 2px;
    }

    .checks{ margin-top: 10px; }
    .check{
      display:flex;
      align-items:flex-start;
      gap:10px;
      margin: 8px 0;
      font-weight: 700;
    }
    .badge{
      min-width: 54px;
      text-align:center;
      border: 1px solid #000;
      padding: 2px 6px;
      font-weight: 900;
    }
    .pass{ background:#eaffea; }
    .fail{ background:#ffecec; }

    details.raw{
      width: min(92vw, 720px);
      max-width: 720px;
      box-sizing:border-box;
      margin-top: 6px;
      border: 1px solid #ddd;
      border-radius: 0;
      padding: 0;
      background: #fff;
    }
    details.raw > summary{
      cursor:pointer;
      padding: 10px 12px;
      font-weight: 800;
      list-style:none;
    }
    details.raw > summary::-webkit-details-marker{ display:none; }

    pre{
      margin:0;
      padding: 10px 12px;
      border-top: 1px solid #ddd;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, monospace;
      font-size: 12px;
      background:#fff;
    }

    .btnrow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
      justify-content:center;
    }

    @media (max-width:720px){
      :root{ --top-gap: 6px; }

      .brand-wrap{ padding:4px var(--side-pad) 0 var(--side-pad); }
      #logo{
        max-width:72vw;
        max-height:90px;
        width:auto; height:auto;
        display:block;
      }

      nav.site-nav{
        position:fixed;
        top:auto;
        bottom: env(safe-area-inset-bottom, 0px);
        left:0; right:0;
        height: var(--mobile-nav-h);
        display:grid;
        grid-template-columns:1fr 1fr;
        grid-template-rows:1fr 1fr;
        gap:0;
        margin:0;
        padding:0;
        background:var(--black);
        z-index:2000;
      }

      a.nav-btn, summary.nav-btn{
        width:100%;
        height:100%;
        padding:0;
        font-size:18px;
      }

      .dropdown-menu{
        position:fixed;
        left:0;
        right:0;
        top:auto;
        bottom:calc(var(--mobile-nav-h) + env(safe-area-inset-bottom,0px));
        border-radius:0;
        min-width:unset;
        z-index:2600;
      }

      body{
        padding-bottom: calc(var(--mobile-nav-h) + env(safe-area-inset-bottom, 0px));
      }

      .people-grid{
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="brand-wrap">
      <a class="brand" href="index.html" aria-label="IRLid Home">
        <img src="logo.png" alt="IRLid Logo" id="logo">
      </a>
    </div>

    <nav class="site-nav" aria-label="Primary">
      <a class="nav-btn" href="index.html">Home</a>
      <a class="nav-btn" href="application.html">Scan</a>

      <details class="nav-dropdown" id="aboutDropdown">
        <summary class="nav-btn">About ▼</summary>
        <div class="dropdown-menu" role="menu" aria-label="About menu">
          <a href="about.html">About</a>
          <a href="features.html">Features</a>
          <a href="contact.html">Contact</a>
        </div>
      </details>

      <span id="accountSlot"></span>
    </nav>
  </header>

  <main class="page-main">
    <div class="receipt-wrap">
      <!-- existing receipt content unchanged -->
    </div>
  </main>

  <script src="js/auth.js"></script>

  <script>
    function closeAllDropdowns(exceptId) {
      document.querySelectorAll("details.nav-dropdown").forEach(d => {
        if (d.id !== exceptId) d.removeAttribute("open");
      });
    }

    function wireDropdownCloseBehavior() {
      document.querySelectorAll("details.nav-dropdown").forEach(d => {
        d.addEventListener("toggle", () => {
          if (d.open) closeAllDropdowns(d.id);
        });
      });
      document.addEventListener("click", (e) => {
        const isInside = e.target.closest && e.target.closest("details.nav-dropdown");
        if (!isInside) closeAllDropdowns("__none__");
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeAllDropdowns("__none__");
      });
    }

    function renderAccountNav(isLoggedIn) {
      const slot = document.getElementById("accountSlot");
      if (!slot) return;

      if (!isLoggedIn) {
        slot.innerHTML = `<a class="nav-btn" href="login.html">Login</a>`;
        return;
      }

      slot.innerHTML = `
        <details class="nav-dropdown" id="accountDropdown">
          <summary class="nav-btn">Name... ▼</summary>
          <div class="dropdown-menu" role="menu" aria-label="Account menu">
            <a href="#" id="acctSettingsLink">Settings</a>
            <a href="receipt.html">Receipts</a>
            <button type="button" id="acctLogoutBtn">Logout</button>
          </div>
        </details>
      `;

      const logoutBtn = document.getElementById("acctLogoutBtn");
      if (logoutBtn) {
        logoutBtn.addEventListener("click", async () => {
          if (window.IRLAuth && typeof window.IRLAuth.logout === "function") {
            await window.IRLAuth.logout();
          }
          renderAccountNav(false);
        });
      }

      const settings = document.getElementById("acctSettingsLink");
      if (settings) {
        settings.addEventListener("click", (e) => {
          e.preventDefault();
          alert("Settings page not added yet.");
        });
      }
    }

    (function initNav(){
      const isLoggedIn = (window.IRLAuth && window.IRLAuth.isLoggedIn)
        ? window.IRLAuth.isLoggedIn()
        : false;
      renderAccountNav(isLoggedIn);
      wireDropdownCloseBehavior();
    })();
  </script>
</body>
</html>
