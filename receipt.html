<!-- receipt.html -->
<!DOCTYPE html>
<!-- Deploy 63 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Receipt</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Receipt page: make final combined fit cleanly on mobile without touching global nav/CSS */
    .receipt-wrap{ max-width: 860px; margin: 0 auto; }
    .receipt-qr{ text-align:center; }
    .receipt-qr canvas, .receipt-qr img{
      max-width: min(92vw, 420px);
      height: auto !important;
      display:block;
      margin: 0 auto;
    }
    .receipt-headerline{
      display:flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
      flex-wrap: wrap;
    }
    .receipt-headerline h3{ margin: 0; }
    .receipt-mini{
      font-size: 12px;
      opacity: .85;
    }
    .receipt-kv{
      display:grid;
      grid-template-columns: 120px 1fr;
      gap: 6px 10px;
      margin-top: 10px;
      font-size: 14px;
    }
    .receipt-kv .k{ opacity:.8; }
    .receipt-kv .v{ word-break: break-word; }
    .receipt-kv a{ color:#111; text-decoration: underline; }
    .receipt-two{
      display:grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    @media (min-width: 760px){
      .receipt-two{ grid-template-columns: 1fr 1fr; }
    }
    .person-panel{
      border: 1px solid #e5e5e5;
      background: #fff;
      padding: 12px 12px;
    }
    .person-title{ font-weight: 700; margin-bottom: 6px; }
    .person-row{ margin: 2px 0; }
    .person-note{ font-size: 12px; opacity: .85; margin-top: 6px; }
    .checks{ margin-top: 10px; }
    .check{
      display:flex;
      gap:10px;
      align-items:flex-start;
      padding:10px 0;
      border-top:1px solid #e5e5e5;
    }
    .check:first-child{ border-top:0; }
    .badge{
      width: 64px;
      text-align:center;
      font-weight:700;
      font-size:12px;
      padding: 6px 0;
      border:1px solid #e5e5e5;
      background:#fff;
      flex: 0 0 auto;
    }
    .badge.pass{ background:#eaffea; border-color:#c8f2c8; }
    .badge.fail{ background:#ffecec; border-color:#ffd0d0; }
    details.raw{ text-align:left; margin-top: 10px; }
    pre{
      white-space: pre-wrap;
      word-break: break-word;
      background: #fff;
      border: 1px solid #e5e5e5;
      padding: 12px 12px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="brand-wrap">
    <a class="brand" href="index.html" aria-label="IRLid Home">
      <img src="logo.png" alt="IRLid Logo" id="logo" onerror="this.style.display='none'">
    </a>
  </div>

  <nav class="site-nav" aria-label="Primary">
    <a class="nav-btn" href="index.html">Home</a>
    <a class="nav-btn" href="application.html">Scan</a>

    <details class="nav-dropdown" id="aboutDropdown">
      <summary class="nav-btn">About ▼</summary>
      <div class="dropdown-menu" role="menu" aria-label="About menu">
        <a href="about.html">About</a>
        <a href="features.html">Features</a>
        <a href="contact.html">Contact</a>
      </div>
    </details>

    <span id="accountSlot"></span>
  </nav>
</header>

<main class="page-main">
  <div class="receipt-wrap">

    <div class="panel" id="emptyState" style="display:none;">
      No receipts yet. Use <a href="application.html">Scan</a> to exchange return QRs.
    </div>

    <div class="qr-box receipt-qr" id="topQr" aria-label="Receipt QR"></div>

    <div class="panel" id="metaPanel" style="display:none;">
      <div class="receipt-headerline">
        <h3 id="metaTitle">Receipt</h3>
        <div class="receipt-mini" id="receiptHint" style="display:none;"></div>
      </div>

      <div class="receipt-kv" id="summaryKv" style="display:none;">
        <div class="k">Time</div><div class="v" id="sumTime"></div>
        <div class="k">Distance</div><div class="v" id="sumDistance"></div>
        <div class="k">Map</div><div class="v" id="sumMap"></div>
      </div>

      <div class="receipt-two" id="peopleGrid" style="display:none;">
        <div class="person-panel">
          <div class="person-title">Self</div>
          <div class="person-row" id="aCoords"></div>
          <div class="person-row" id="aTime"></div>
          <div class="person-note" id="aAcc"></div>
        </div>

        <div class="person-panel">
          <div class="person-title">Guest</div>
          <div class="person-row" id="bCoords"></div>
          <div class="person-row" id="bTime"></div>
          <div class="person-note" id="bAcc"></div>
        </div>
      </div>

      <div class="checks" id="checks"></div>

      <div class="btnrow">
        <button class="btn secondary" id="clearBtn">Clear stored receipts</button>
      </div>

      <div class="person-note" style="margin-top:10px;">
        The QR above is a URL. Any QR scanner can open this receipt page.
      </div>
    </div>

    <details class="raw" id="rawWrap" style="display:none;">
      <summary>Show stored JSON</summary>
      <pre id="rawJson"></pre>
    </details>

  </div>
</main>

<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script src="js/sign.js"></script>
<script src="js/qr.js?v=59"></script>

<script>
  const TS_TOL_S = 90;   // keep aligned with application tolerance (<= 90s)
  const DIST_TOL_M = 12; // keep aligned with application tolerance (<= 12m)

  // Back-compat keys (some builds store these)
  const KEY_SELF  = "irlid_resp_self";
  const KEY_GUEST = "irlid_resp_other";
  const KEY_LAST  = "irlid_receipt_last";

  // Primary history key (per project description)
  const KEY_LIST  = "irlid_receipts";

  const emptyState = document.getElementById("emptyState");
  const metaPanel = document.getElementById("metaPanel");
  const metaTitle = document.getElementById("metaTitle");
  const receiptHint = document.getElementById("receiptHint");

  const summaryKv = document.getElementById("summaryKv");
  const sumTime = document.getElementById("sumTime");
  const sumDistance = document.getElementById("sumDistance");
  const sumMap = document.getElementById("sumMap");

  const rawWrap = document.getElementById("rawWrap");
  const rawJson = document.getElementById("rawJson");
  const peopleGrid = document.getElementById("peopleGrid");
  const checksEl = document.getElementById("checks");

  const aCoords = document.getElementById("aCoords");
  const aTime   = document.getElementById("aTime");
  const aAcc    = document.getElementById("aAcc");
  const bCoords = document.getElementById("bCoords");
  const bTime   = document.getElementById("bTime");
  const bAcc    = document.getElementById("bAcc");

  const clearBtn = document.getElementById("clearBtn");

  function fmtNum(x){
    return (typeof x === "number" && Number.isFinite(x)) ? x.toFixed(6) : String(x || "");
  }

  // Accepts either ms-epoch or sec-epoch and returns ms-epoch (or null)
  function normalizeEpochMs(ts){
    if (ts === null || ts === undefined) return null;
    const n = (typeof ts === "string") ? Number(ts) : ts;
    if (typeof n !== "number" || !Number.isFinite(n)) return null;

    // seconds since epoch is ~1e9; ms is ~1e12
    if (n > 0 && n < 1e12) return Math.round(n * 1000);
    return Math.round(n);
  }

  function formatTimeNoTs(ts){
    const ms = normalizeEpochMs(ts);
    if (ms === null) return "";
    const d = new Date(ms);
    if (Number.isNaN(d.getTime())) return "";
    return d.toLocaleString();
  }

  function haversineMeters(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const toRad = (d) => (d * Math.PI) / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a =
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
      Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
  }

  function addCheck(label, ok, detail){
    const div = document.createElement("div");
    div.className = "check";
    const badge = document.createElement("div");
    badge.className = "badge " + (ok ? "pass" : "fail");
    badge.textContent = ok ? "PASS" : "FAIL";
    const txt = document.createElement("div");
    txt.innerHTML = `${label}${detail ? `<div class="person-note">${detail}</div>` : ""}`;
    div.appendChild(badge);
    div.appendChild(txt);
    checksEl.appendChild(div);
  }

  function readJson(key){
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    try { return JSON.parse(raw); } catch { return null; }
  }

  function safeParseAny(raw){
    if (!raw) return null;
    if (typeof raw !== "string") return raw;
    try { return JSON.parse(raw); } catch { return null; }
  }

  // More tolerant GPS extraction: accept payload.gps, payload.loc, payload.location
  function extractGpsFromPayload(payload){
    if (!payload) return null;

    const candidates = [
      payload.gps,
      payload.loc,
      payload.location
    ];

    for (const c of candidates) {
      if (!c) continue;

      // Accept {lat, lon} or {lat, lng} or arrays [lat, lon]
      if (Array.isArray(c) && c.length >= 2) {
        const lat = Number(c[0]);
        const lon = Number(c[1]);
        if (Number.isFinite(lat) && Number.isFinite(lon)) return { lat, lon, acc: null };
      }

      const lat = Number(c.lat);
      const lon = (c.lon !== undefined) ? Number(c.lon) : Number(c.lng);
      if (Number.isFinite(lat) && Number.isFinite(lon)) {
        const acc = (c.acc !== undefined) ? Number(c.acc) : (c.accuracy !== undefined ? Number(c.accuracy) : null);
        return { lat, lon, acc: Number.isFinite(acc) ? acc : null };
      }
    }

    return null;
  }

  function getGps(resp){
    const payload = resp && resp.payload ? resp.payload : null;
    return extractGpsFromPayload(payload);
  }

  // More tolerant timestamp extraction: accept payload.ts, payload.time, payload.t
  function getTs(resp){
    const payload = resp && resp.payload ? resp.payload : null;
    if (!payload) return null;
    const raw = (payload.ts !== undefined) ? payload.ts :
                (payload.time !== undefined) ? payload.time :
                (payload.t !== undefined) ? payload.t :
                null;
    const ms = normalizeEpochMs(raw);
    return ms; // return ms epoch
  }

  function baseReceiptUrl(){
    return new URL("receipt.html", location.href).href.split("#")[0];
  }

  function b64urlEncode(bytes){
    let bin = "";
    for (let i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
    const b64 = btoa(bin);
    return b64.replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/g,"");
  }
  function b64urlDecode(str){
    str = (str || "").replace(/-/g,"+").replace(/_/g,"/");
    while (str.length % 4) str += "=";
    const bin = atob(str);
    const out = new Uint8Array(bin.length);
    for (let i=0;i<bin.length;i++) out[i] = bin.charCodeAt(i);
    return out;
  }

  function makeReceiptUrlForCombined(combinedObj){
    const encoded = b64urlEncode(new TextEncoder().encode(JSON.stringify(combinedObj)));
    return `${baseReceiptUrl()}#COMB=${encoded}`;
  }

  function makeReceiptUrlForResponse(respObj){
    const encoded = b64urlEncode(new TextEncoder().encode(JSON.stringify(respObj)));
    return `${baseReceiptUrl()}#RESP=${encoded}`;
  }

  function parseFromHash(){
    const hash = location.hash || "";
    let m = hash.match(/COMB=([A-Za-z0-9\-_]+)/);
    if (m) {
      try {
        const bytes = b64urlDecode(m[1]);
        return { kind: "comb", obj: JSON.parse(new TextDecoder().decode(bytes)) };
      } catch {}
    }
    m = hash.match(/RESP=([A-Za-z0-9\-_]+)/);
    if (m) {
      try {
        const bytes = b64urlDecode(m[1]);
        return { kind: "resp", obj: JSON.parse(new TextDecoder().decode(bytes)) };
      } catch {}
    }
    return null;
  }

  function combinedObject(selfResp, guestResp){
    return {
      v: 1,
      type: "combined",
      tol: { dist_m: DIST_TOL_M, ts_s: TS_TOL_S },
      a: selfResp,
      b: guestResp
    };
  }

  function makeDualMapsUrl(gA, gB){
    if (gA && gB){
      return `https://www.google.com/maps/dir/${gA.lat},${gA.lon}/${gB.lat},${gB.lon}`;
    }
    const g = gA || gB;
    if (!g) return "#";
    return `https://www.google.com/maps?q=${encodeURIComponent(g.lat + "," + g.lon)}`;
  }

  function qrSize(){
    // Keep QR comfortably within viewport on mobile
    const vw = Math.max(320, Math.min(window.innerWidth || 360, 800));
    // subtract padding/margins; clamp
    return Math.max(220, Math.min(420, Math.floor(vw - 64)));
  }

  function setPersonPanel(elCoords, elTime, elAcc, resp, mapsUrl){
    if (!resp) {
      elCoords.textContent = "Location: (missing)";
      elTime.textContent = "Time: (missing)";
      elAcc.textContent = "";
      return;
    }

    const gps = getGps(resp);
    const tsMs = getTs(resp);

    if (gps) {
      elCoords.innerHTML = `Location: <a class="maplink" href="${mapsUrl}" target="_blank" rel="noopener noreferrer">${fmtNum(gps.lat)}, ${fmtNum(gps.lon)}</a>`;
      elAcc.textContent = (typeof gps.acc === "number" && Number.isFinite(gps.acc)) ? `Accuracy: ±${Math.round(gps.acc)} m` : "";
    } else {
      elCoords.textContent = "Location: (not captured)";
      elAcc.textContent = "";
    }

    const t = formatTimeNoTs(tsMs);
    elTime.textContent = t ? `Time: ${t}` : "Time: (missing)";
  }

  async function validateResponse(resp){
    const results = {
      okStructure: false,
      okHash: false,
      okSig: false,
      computedHash: null
    };

    if (!resp || resp.type !== "response" || !resp.payload || !resp.hash || !resp.sig || !resp.pub) {
      return results;
    }
    results.okStructure = true;

    try {
      const computed = await hashPayloadToB64url(resp.payload);
      results.computedHash = computed;
      results.okHash = (computed === resp.hash);
    } catch {
      results.okHash = false;
    }

    try {
      results.okSig = await verifySig(resp.hash, resp.sig, resp.pub);
    } catch {
      results.okSig = false;
    }

    return results;
  }

  function entryBestTimeMs(combinedOrResp){
    if (!combinedOrResp) return null;

    if (combinedOrResp.type === "response") {
      return getTs(combinedOrResp);
    }

    if (combinedOrResp.type === "combined") {
      const ta = getTs(combinedOrResp.a);
      const tb = getTs(combinedOrResp.b);
      const t = Math.max(ta || -Infinity, tb || -Infinity);
      return Number.isFinite(t) ? t : null;
    }

    return null;
  }

  function pickLatestFromReceiptsKey(){
    const raw = localStorage.getItem(KEY_LIST);
    if (!raw) return null;

    const parsed = safeParseAny(raw);
    if (!parsed) return null;

    const arr = Array.isArray(parsed) ? parsed : (Array.isArray(parsed.items) ? parsed.items : null);
    if (!arr || !arr.length) return null;

    let best = null;
    let bestScore = -Infinity;

    for (let i = 0; i < arr.length; i++) {
      const entry = arr[i];

      const combined =
        (entry && entry.type === "combined") ? entry :
        (entry && entry.combined && entry.combined.type === "combined") ? entry.combined :
        null;

      const resp =
        (entry && entry.type === "response") ? entry :
        null;

      const url =
        (typeof entry === "string") ? entry :
        (entry && typeof entry.url === "string") ? entry.url :
        (entry && typeof entry.receiptUrl === "string") ? entry.receiptUrl :
        null;

      // Prefer explicit entry.ts if present; accept sec or ms.
      let score = null;
      if (entry && typeof entry.ts !== "undefined") score = normalizeEpochMs(entry.ts);

      if (score === null) {
        if (combined) score = entryBestTimeMs(combined);
        else if (resp) score = entryBestTimeMs(resp);
      }

      if (score === null) score = 0;
      score = score + (i / 1000000);

      if (score > bestScore) {
        bestScore = score;
        best = { entry, combined, resp, url, score };
      }
    }

    return best;
  }

  function setSummary(comb){
    summaryKv.style.display = "grid";

    const respA = comb && comb.a ? comb.a : null;
    const respB = comb && comb.b ? comb.b : null;

    const tsA = respA ? getTs(respA) : null;
    const tsB = respB ? getTs(respB) : null;

    let timeLine = "(missing)";
    if (tsA && tsB) {
      const a = new Date(tsA);
      const b = new Date(tsB);
      const lo = new Date(Math.min(tsA, tsB));
      const hi = new Date(Math.max(tsA, tsB));
      const deltaS = Math.round(Math.abs(tsA - tsB) / 1000);
      // concise
      timeLine = `${lo.toLocaleString()} — ${hi.toLocaleTimeString()} (Δ ${deltaS}s)`;
    } else if (tsA) {
      timeLine = `${new Date(tsA).toLocaleString()} (self)`;
    } else if (tsB) {
      timeLine = `${new Date(tsB).toLocaleString()} (guest)`;
    }
    sumTime.textContent = timeLine;

    const gA = respA ? getGps(respA) : null;
    const gB = respB ? getGps(respB) : null;

    let distLine = "(missing)";
    let distOk = false;
    if (gA && gB) {
      const d = haversineMeters(gA.lat, gA.lon, gB.lat, gB.lon);
      distOk = d <= DIST_TOL_M;
      distLine = `${d.toFixed(2)} m (limit ${DIST_TOL_M} m)`;
    }
    sumDistance.textContent = distLine;

    const mapsUrl = makeDualMapsUrl(gA, gB);
    sumMap.innerHTML = (mapsUrl !== "#")
      ? `<a href="${mapsUrl}" target="_blank" rel="noopener noreferrer">Open in Google Maps</a>`
      : "(missing)";

    // small hint if key fields are missing
    const missingBits = [];
    if (!gA) missingBits.push("self location");
    if (!gB) missingBits.push("guest location");
    if (!tsA) missingBits.push("self time");
    if (!tsB) missingBits.push("guest time");

    receiptHint.style.display = missingBits.length ? "block" : "none";
    if (missingBits.length) {
      receiptHint.textContent = "Missing: " + missingBits.join(", ");
    }
  }

  clearBtn.onclick = () => {
    localStorage.removeItem(KEY_SELF);
    localStorage.removeItem(KEY_GUEST);
    localStorage.removeItem(KEY_LAST);
    localStorage.removeItem(KEY_LIST);
    location.href = baseReceiptUrl();
  };

  (async () => {
    if (typeof refreshNav === "function") await refreshNav();

    const fromHash = parseFromHash();

    // Keep in sync if visiting via #RESP (single share)
    if (fromHash && fromHash.kind === "resp" && fromHash.obj && fromHash.obj.type === "response") {
      localStorage.setItem(KEY_LAST, JSON.stringify(fromHash.obj));
    }

    // Render: hash first (shared receipts)
    if (fromHash && fromHash.kind === "comb" && fromHash.obj && fromHash.obj.type === "combined") {
      await renderCombined(fromHash.obj, "Receipt (combined)");
      return;
    }
    if (fromHash && fromHash.kind === "resp" && fromHash.obj && fromHash.obj.type === "response") {
      await renderSingle(fromHash.obj, "Receipt (single)");
      return;
    }

    // Then: latest from history
    const best = pickLatestFromReceiptsKey();
    if (best) {
      if (best.combined) {
        await renderCombined(best.combined, "Receipt (combined)");
        return;
      }
      if (best.url && typeof best.url === "string") {
        metaPanel.style.display = "block";
        rawWrap.style.display = "block";
        peopleGrid.style.display = "none";
        checksEl.innerHTML = "";
        metaTitle.textContent = "Receipt (latest)";
        rawJson.textContent = JSON.stringify(best.entry, null, 2);
        if (typeof makeQR === "function") makeQR("topQr", best.url, qrSize());
        addCheck("Loaded latest receipt URL from localStorage[irlid_receipts]", true);
        return;
      }
      if (best.resp) {
        await renderSingle(best.resp, "Receipt (single)");
        return;
      }
    }

    // Back-compat: stored as two responses
    const selfResp  = readJson(KEY_SELF);
    const guestResp = readJson(KEY_GUEST);
    if (selfResp && guestResp) {
      const combined = combinedObject(selfResp, guestResp);
      await renderCombined(combined, "Receipt (combined)");
      return;
    }

    // Back-compat: single receipt blob
    const legacy = readJson(KEY_LAST);
    if (legacy && legacy.type === "response") {
      await renderSingle(legacy, "Receipt (single)");
      return;
    }

    emptyState.style.display = "block";
  })();

  async function renderCombined(comb, title){
    metaPanel.style.display = "block";
    rawWrap.style.display = "block";
    checksEl.innerHTML = "";
    peopleGrid.style.display = "grid";
    metaTitle.textContent = title || "Receipt";

    const url = makeReceiptUrlForCombined(comb);
    if (typeof makeQR === "function") makeQR("topQr", url, qrSize());

    rawJson.textContent = JSON.stringify(comb, null, 2);

    const respA = comb.a || null;
    const respB = comb.b || null;

    const gA = getGps(respA);
    const gB = getGps(respB);
    const mapsUrl = makeDualMapsUrl(gA, gB);

    // Compact summary first
    setSummary(comb);

    // Then per-person panels
    setPersonPanel(aCoords, aTime, aAcc, respA, mapsUrl);
    setPersonPanel(bCoords, bTime, bAcc, respB, mapsUrl);

    // Validation checks (still helpful, but keep the UI lean)
    if (respA) {
      const vr = await validateResponse(respA);
      addCheck("Self: structure", vr.okStructure);
      addCheck("Self: hash", vr.okHash, vr.okHash ? "" : `computed=${vr.computedHash || "?"}`);
      addCheck("Self: signature", vr.okSig);
    } else {
      addCheck("Self receipt present", false, "Missing Self response in combined object.");
    }

    if (respB) {
      const vr = await validateResponse(respB);
      addCheck("Guest: structure", vr.okStructure);
      addCheck("Guest: hash", vr.okHash, vr.okHash ? "" : `computed=${vr.computedHash || "?"}`);
      addCheck("Guest: signature", vr.okSig);
    } else {
      addCheck("Guest receipt present", false, "Missing Guest response in combined object.");
    }

    if (respA && respB) {
      const pubsA = (respA.payload && respA.payload.pubs) ? JSON.stringify(respA.payload.pubs) : null;
      const pubsB = (respB.payload && respB.payload.pubs) ? JSON.stringify(respB.payload.pubs) : null;
      const okPubs = (pubsA && pubsB && pubsA === pubsB);
      addCheck("Same pubs", okPubs);

      const tsAms = getTs(respA);
      const tsBms = getTs(respB);
      const okTs = (typeof tsAms === "number" && typeof tsBms === "number" && Math.abs(tsAms - tsBms) <= (TS_TOL_S * 1000));
      addCheck(`Time within ${TS_TOL_S}s`, okTs, (tsAms && tsBms) ? `Δt=${Math.round(Math.abs(tsAms-tsBms)/1000)}s` : "missing ts");

      let okDist = false;
      let dist = null;
      if (gA && gB) {
        dist = haversineMeters(gA.lat, gA.lon, gB.lat, gB.lon);
        okDist = dist <= DIST_TOL_M;
      }
      addCheck(`Distance within ${DIST_TOL_M}m`, okDist, dist !== null ? `Δ=${dist.toFixed(2)}m` : "missing gps");
    } else {
      addCheck("Need both parties", false, "Combined object missing one side.");
    }
  }

  async function renderSingle(resp, title){
    metaPanel.style.display = "block";
    rawWrap.style.display = "block";
    checksEl.innerHTML = "";
    peopleGrid.style.display = "grid";
    metaTitle.textContent = title || "Receipt";

    const url = makeReceiptUrlForResponse(resp);
    if (typeof makeQR === "function") makeQR("topQr", url, qrSize());

    rawJson.textContent = JSON.stringify(resp, null, 2);

    summaryKv.style.display = "none";
    receiptHint.style.display = "none";

    // single: show on "Self" panel only
    const mapsUrl = makeDualMapsUrl(getGps(resp), null);
    setPersonPanel(aCoords, aTime, aAcc, resp, mapsUrl);
    setPersonPanel(bCoords, bTime, bAcc, null, mapsUrl);

    const vr = await validateResponse(resp);
    addCheck("Receipt: structure", vr.okStructure);
    addCheck("Receipt: hash", vr.okHash, vr.okHash ? "" : `computed=${vr.computedHash || "?"}`);
    addCheck("Receipt: signature", vr.okSig);

    addCheck("Need both parties", false, "Have one receipt only. Show the URL QR above to the other person.");
  }

  // If the user rotates/resizes, re-render QR at a better size (without changing data)
  window.addEventListener("resize", () => {
    // If a canvas exists, rebuild using the same payload encoded in the current QR URL,
    // which is always the current page URL including hash.
    const top = document.getElementById("topQr");
    if (!top) return;
    // Only rebuild if we have previously rendered something
    if (!top.querySelector("canvas") && !top.querySelector("img")) return;
    if (typeof makeQR !== "function") return;
    makeQR("topQr", window.location.href, qrSize());
  });
</script>
