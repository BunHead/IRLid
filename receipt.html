<!DOCTYPE html>
<!-- Deploy 22 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRLid — Receipts</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    :root{
      --black:#000;
      --white:#fff;
      --mobile-nav-h: 124px;
      --side-pad: 12px;
      --top-gap: 10px;
    }

    html, body{ height:100%; }
    body{
      margin:0;
      background:#fff;
      overflow-x:hidden;
    }

    header.site-header{ width:100%; background:#fff; }
    .brand-wrap{ width:100%; padding:10px 14px 0 14px; }
    .brand{ display:inline-flex; align-items:center; text-decoration:none; color:inherit; }

    nav.site-nav{
      width:100%;
      background:var(--black);
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:0;
      padding:0;
      margin:0;
      position:sticky;
      top:0;
      z-index:1000;
    }

    a.nav-btn, summary.nav-btn{
      appearance:none; -webkit-appearance:none;
      border:0;
      background:var(--black);
      color:var(--white);
      text-decoration:none;
      font:inherit;
      font-weight:700;
      border-radius:0;
      margin:0;
      padding:10px 12px;
      line-height:1;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      white-space:nowrap;
    }
    a.nav-btn:hover, summary.nav-btn:hover{ background:#111; }

    details.nav-dropdown{ position:relative; }
    details.nav-dropdown > summary{ list-style:none; }
    details.nav-dropdown > summary::-webkit-details-marker{ display:none; }

    .dropdown-menu{
      position:absolute;
      top:100%;
      left:0;
      background:#fff;
      border:1px solid #ddd;
      border-radius:0;
      padding:0;
      min-width:220px;
      z-index:1200;
    }
    .dropdown-menu a{
      display:block;
      padding:12px 12px;
      text-decoration:none;
      color:#000;
      font-weight:700;
      border-radius:0;
      margin:0;
    }
    .dropdown-menu a:hover{ background:#f2f2f2; }

    main.page-main{
      max-width: 980px;
      margin: 0 auto;
      padding: var(--top-gap) var(--side-pad) 22px var(--side-pad);
      box-sizing:border-box;
    }

    .receipt-wrap{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 12px;
      padding-top: 6px;
    }

    .qr-box{
      width: min(92vw, 520px);
      max-width: 520px;
      box-sizing:border-box;
    }
    .qr-box canvas, .qr-box img{
      display:block;
      margin:0 auto;
      max-width:100%;
      height:auto;
      image-rendering: pixelated;
    }

    .panel{
      width: min(92vw, 720px);
      max-width: 720px;
      box-sizing:border-box;
      border: 1px solid #ddd;
      padding: 12px;
      background: #fff;
    }

    .panel h3{ margin: 0 0 8px 0; }

    a.maplink{
      color:#000;
      text-decoration: underline;
      font-weight: 800;
    }

    /* Split panels */
    .people-grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .person-panel{
      border: 1px solid #ddd;
      padding: 10px;
      background: #fff;
      box-sizing:border-box;
    }
    .person-title{
      font-weight: 900;
      margin: 0 0 6px 0;
    }
    .person-row{
      margin: 6px 0;
      font-weight: 800;
    }
    .person-note{
      font-size: 12.5px;
      font-weight: 650;
      opacity: 0.88;
      margin-top: 2px;
    }

    .checks{ margin-top: 10px; }
    .check{
      display:flex;
      align-items:flex-start;
      gap:10px;
      margin: 8px 0;
      font-weight: 700;
    }
    .badge{
      min-width: 54px;
      text-align:center;
      border: 1px solid #000;
      padding: 2px 6px;
      font-weight: 900;
    }
    .pass{ background:#eaffea; }
    .fail{ background:#ffecec; }

    details.raw{
      width: min(92vw, 720px);
      max-width: 720px;
      box-sizing:border-box;
      margin-top: 6px;
      border: 1px solid #ddd;
      border-radius: 0;
      padding: 0;
      background: #fff;
    }
    details.raw > summary{
      cursor:pointer;
      padding: 10px 12px;
      font-weight: 800;
      list-style:none;
    }
    details.raw > summary::-webkit-details-marker{ display:none; }

    pre{
      margin:0;
      padding: 10px 12px;
      border-top: 1px solid #ddd;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, monospace;
      font-size: 12px;
      background:#fff;
    }

    .btnrow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
      justify-content:center;
    }

    @media (max-width:720px){
      :root{ --top-gap: 6px; }

      .brand-wrap{ padding:4px var(--side-pad) 0 var(--side-pad); }
      #logo{
        max-width:72vw;
        max-height:90px;
        width:auto; height:auto;
        display:block;
      }

      nav.site-nav{
        position:fixed;
        top:auto;
        bottom: env(safe-area-inset-bottom, 0px);
        left:0; right:0;
        height: var(--mobile-nav-h);
        display:grid;
        grid-template-columns:1fr 1fr;
        grid-template-rows:1fr 1fr;
        gap:0;
        margin:0;
        padding:0;
        background:var(--black);
        z-index:2000;
      }

      a.nav-btn, summary.nav-btn{
        width:100%;
        height:100%;
        padding:0;
        font-size:18px;
      }

      .dropdown-menu{
        position:fixed;
        left:0; right:0;
        bottom: calc(var(--mobile-nav-h) + env(safe-area-inset-bottom, 0px));
        top:auto;
      }

      body{
        padding-bottom: calc(var(--mobile-nav-h) + env(safe-area-inset-bottom, 0px));
      }

      .people-grid{
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="brand-wrap">
      <a class="brand" href="index.html" aria-label="IRLid Home">
        <img src="logo.png" alt="IRLid Logo" id="logo">
      </a>
    </div>

    <nav class="site-nav" aria-label="Primary">
      <a class="nav-btn" href="index.html">Home</a>
      <a class="nav-btn" href="application.html">Scan</a>

      <details class="nav-dropdown">
        <summary class="nav-btn">About ▼</summary>
        <div class="dropdown-menu" role="menu" aria-label="About menu">
          <a href="about.html">About</a>
          <a href="features.html">Features</a>
          <a href="contact.html">Contact</a>
        </div>
      </details>

      <a class="nav-btn" href="receipt.html">Receipts</a>
    </nav>
  </header>

  <main class="page-main">
    <div class="receipt-wrap">

      <div class="panel" id="emptyState" style="display:none;">
        No receipts yet. Use <a href="application.html">Scan</a> to exchange return QRs.
      </div>

      <div class="qr-box" id="topQr" aria-label="Receipt QR"></div>

      <div class="panel" id="metaPanel" style="display:none;">
        <h3 id="metaTitle">Receipt</h3>

        <div class="people-grid" id="peopleGrid" style="display:none;">
          <div class="person-panel">
            <div class="person-title">Self</div>
            <div class="person-row" id="aCoords"></div>
            <div class="person-row" id="aTime"></div>
            <div class="person-note" id="aAcc"></div>
          </div>

          <div class="person-panel">
            <div class="person-title">Guest</div>
            <div class="person-row" id="bCoords"></div>
            <div class="person-row" id="bTime"></div>
            <div class="person-note" id="bAcc"></div>
          </div>
        </div>

        <div class="checks" id="checks"></div>

        <div class="btnrow">
          <button class="btn secondary" id="clearBtn">Clear stored receipts</button>
        </div>

        <div class="note" style="margin-top:10px;">
          The QR above is a URL. Any QR scanner can open this receipt page.
        </div>
      </div>

      <details class="raw" id="rawWrap" style="display:none;">
        <summary>Show stored JSON</summary>
        <pre id="rawJson"></pre>
      </details>

    </div>
  </main>

  <script src="js/sign.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="js/qr.js?v=deploy19"></script>

  <script>
    const TS_TOL_S = 60;
    const DIST_TOL_M = 2;

    const KEY_SELF  = "irlid_resp_self";
    const KEY_OTHER = "irlid_resp_other";
    const KEY_LAST  = "irlid_last_receipt";
    const KEY_LIST  = "irlid_receipts";

    const emptyState = document.getElementById("emptyState");
    const metaPanel = document.getElementById("metaPanel");
    const metaTitle = document.getElementById("metaTitle");

    const peopleGrid = document.getElementById("peopleGrid");
    const aCoords = document.getElementById("aCoords");
    const aTime = document.getElementById("aTime");
    const aAcc = document.getElementById("aAcc");
    const bCoords = document.getElementById("bCoords");
    const bTime = document.getElementById("bTime");
    const bAcc = document.getElementById("bAcc");

    const checksEl = document.getElementById("checks");
    const rawWrap = document.getElementById("rawWrap");
    const rawJson = document.getElementById("rawJson");
    const clearBtn = document.getElementById("clearBtn");

    function fmtNum(n){ return (typeof n === "number") ? n.toFixed(6) : ""; }

    function formatTime(ts){
      if (!ts || typeof ts !== "number") return null;
      const d = new Date(ts * 1000);
      return d.toLocaleString();
    }

    function haversineMeters(lat1, lon1, lat2, lon2){
      const R = 6371000;
      const toRad = (x) => x * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    function addCheck(label, ok, detail){
      const div = document.createElement("div");
      div.className = "check";
      const badge = document.createElement("div");
      badge.className = "badge " + (ok ? "pass" : "fail");
      badge.textContent = ok ? "PASS" : "FAIL";
      const txt = document.createElement("div");
      txt.innerHTML = `${label}${detail ? `<div class="note">${detail}</div>` : ""}`;
      div.appendChild(badge);
      div.appendChild(txt);
      checksEl.appendChild(div);
    }

    function readJson(key){
      const raw = localStorage.getItem(key);
      if (!raw) return null;
      try { return JSON.parse(raw); } catch { return null; }
    }

    function getGps(resp){
      const gps = resp && resp.payload ? resp.payload.gps : null;
      if (!gps) return null;
      if (typeof gps.lat !== "number" || typeof gps.lon !== "number") return null;
      return gps;
    }

    function getTs(resp){
      const ts = resp && resp.payload ? resp.payload.ts : null;
      return (typeof ts === "number") ? ts : null;
    }

    function makeDualMapUrl(gA, gB){
      if (!gA && !gB) return "#";
      if (gA && gB){
        return `https://www.google.com/maps/dir/${gA.lat},${gA.lon}/${gB.lat},${gB.lon}`;
      }
      const g = gA || gB;
      return `https://www.google.com/maps?q=${g.lat},${g.lon}`;
    }

    function setPersonPanel(elCoords, elTime, elAcc, resp, otherResp){
      if (!resp){
        elCoords.textContent = "Location: (missing)";
        elTime.textContent = "Time: (missing)";
        elAcc.textContent = "";
        return;
      }

      const gps = getGps(resp);
      const otherGps = otherResp ? getGps(otherResp) : null;
      const ts = getTs(resp);

      if (gps){
        const mapUrl = makeDualMapUrl(gps, otherGps);
        elCoords.innerHTML =
          `Location: <a class="maplink" href="${mapUrl}" target="_blank" rel="noopener noreferrer">${fmtNum(gps.lat)}, ${fmtNum(gps.lon)}</a>`;
        elAcc.textContent = (typeof gps.acc === "number") ? `Accuracy: ±${Math.round(gps.acc)} m` : "";
      } else {
        elCoords.textContent = "Location: (not captured)";
        elAcc.textContent = "";
      }

      elTime.textContent = ts ? `Time: ${formatTime(ts)}` : "Time: (missing)";
    }

    clearBtn.onclick = () => {
      localStorage.removeItem(KEY_SELF);
      localStorage.removeItem(KEY_OTHER);
      localStorage.removeItem(KEY_LAST);
      localStorage.removeItem(KEY_LIST);
      location.href = location.pathname;
    };

    (async () => {
      const selfResp  = readJson(KEY_SELF);
      const guestResp = readJson(KEY_OTHER);
      const legacy    = readJson(KEY_LAST);

      if (!selfResp && !guestResp && !legacy){
        emptyState.style.display = "block";
        return;
      }

      metaPanel.style.display = "block";
      rawWrap.style.display = "block";

      const havePair = !!(selfResp && guestResp);

      if (havePair){
        metaTitle.textContent = "Receipt";
        peopleGrid.style.display = "grid";

        setPersonPanel(aCoords, aTime, aAcc, selfResp, guestResp);
        setPersonPanel(bCoords, bTime, bAcc, guestResp, selfResp);

        rawJson.textContent = JSON.stringify({ selfResp, guestResp }, null, 2);
      } else {
        metaTitle.textContent = "Receipt";
        peopleGrid.style.display = "grid";

        setPersonPanel(aCoords, aTime, aAcc, selfResp || legacy, null);
        setPersonPanel(bCoords, bTime, bAcc, guestResp, null);

        rawJson.textContent = JSON.stringify(selfResp || guestResp || legacy, null, 2);
      }

      checksEl.innerHTML = "";

      if (selfResp){
        const vr = await validateResponse(selfResp);
        addCheck("Self receipt structure", vr.okStructure);
        addCheck("Self hash matches payload", vr.okHash);
        addCheck("Self signature valid", vr.okSig);
      }

      if (guestResp){
        const vr = await validateResponse(guestResp);
        addCheck("Guest receipt structure", vr.okStructure);
        addCheck("Guest hash matches payload", vr.okHash);
        addCheck("Guest signature valid", vr.okSig);
      }

      if (selfResp && guestResp){
        const tsA = getTs(selfResp);
        const tsB = getTs(guestResp);
        const okTs = (tsA && tsB && Math.abs(tsA - tsB) <= TS_TOL_S);
        addCheck(`Timestamps within ${TS_TOL_S}s`, okTs);

        const gA = getGps(selfResp);
        const gB = getGps(guestResp);
        let okDist = false;
        if (gA && gB){
          const dist = haversineMeters(gA.lat, gA.lon, gB.lat, gB.lon);
          okDist = dist <= DIST_TOL_M;
          addCheck(`Distance within ${DIST_TOL_M}m`, okDist, `Δ=${dist.toFixed(2)}m`);
        } else {
          addCheck(`Distance within ${DIST_TOL_M}m`, false, "missing gps");
        }
      }
    })();
  </script>
</body>
</html>
