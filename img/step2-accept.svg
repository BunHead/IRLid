<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;display=swap');
      text { font-family: 'DM Sans', 'Arial', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="#FAFAFA" stroke="#E5E5E5" stroke-width="1"/>

  <!-- Step badge -->
  <rect x="24" y="24" width="88" height="36" rx="4" fill="#000"/>
  <text x="68" y="47" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">STEP 2</text>

  <!-- Person B (left side) -->
  <circle cx="140" cy="140" r="28" fill="#555"/>
  <rect x="120" y="174" width="40" height="56" rx="6" fill="#555"/>
  <rect x="92" y="180" width="28" height="10" rx="5" fill="#555"/>
  <rect x="160" y="180" width="28" height="10" rx="5" fill="#555"/>
  <rect x="124" y="230" width="12" height="32" rx="4" fill="#555"/>
  <rect x="144" y="230" width="12" height="32" rx="4" fill="#555"/>
  <text x="140" y="290" text-anchor="middle" fill="#000" font-size="16" font-weight="700">Person B</text>
  <text x="140" y="310" text-anchor="middle" fill="#666" font-size="13" font-weight="400">Collaborator</text>

  <!-- Phone B scanning (left phone - camera view) -->
  <rect x="210" y="100" width="120" height="170" rx="12" fill="#000" stroke="#333" stroke-width="2"/>
  <rect x="220" y="118" width="100" height="134" rx="3" fill="#2a2a3a"/>
  <!-- Camera viewfinder corners -->
  <path d="M234 132 L234 140 M234 132 L242 132" stroke="#0f0" stroke-width="2" fill="none"/>
  <path d="M306 132 L306 140 M306 132 L298 132" stroke="#0f0" stroke-width="2" fill="none"/>
  <path d="M234 238 L234 230 M234 238 L242 238" stroke="#0f0" stroke-width="2" fill="none"/>
  <path d="M306 238 L306 230 M306 238 L298 238" stroke="#0f0" stroke-width="2" fill="none"/>
  <!-- Small QR in viewfinder -->
  <rect x="255" y="168" width="30" height="30" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="259" y="172" width="6" height="6" fill="rgba(255,255,255,0.6)"/>
  <rect x="271" y="172" width="6" height="6" fill="rgba(255,255,255,0.6)"/>
  <rect x="259" y="184" width="6" height="6" fill="rgba(255,255,255,0.6)"/>
  <rect x="271" y="184" width="6" height="6" fill="rgba(255,255,255,0.6)"/>
  <!-- Camera notch -->
  <rect x="252" y="104" width="36" height="8" rx="4" fill="#222"/>

  <!-- Arrow -->
  <line x1="340" y1="185" x2="380" y2="185" stroke="#000" stroke-width="2"/>
  <polygon points="380,180 392,185 380,190" fill="#000"/>

  <!-- Phone B showing Accept QR (right phone) -->
  <rect x="400" y="80" width="150" height="230" rx="14" fill="#000" stroke="#333" stroke-width="2"/>
  <rect x="410" y="100" width="130" height="188" rx="3" fill="#fff"/>
  <!-- Accept QR pattern -->
  <rect x="430" y="118" width="20" height="20" fill="#000"/>
  <rect x="458" y="118" width="20" height="20" fill="#000"/>
  <rect x="430" y="146" width="20" height="20" fill="#000"/>
  <rect x="458" y="146" width="8" height="8" fill="#000"/>
  <rect x="472" y="138" width="8" height="8" fill="#000"/>
  <rect x="486" y="118" width="20" height="20" fill="#000"/>
  <rect x="486" y="146" width="20" height="20" fill="#000"/>
  <rect x="430" y="174" width="8" height="8" fill="#000"/>
  <rect x="446" y="174" width="8" height="8" fill="#000"/>
  <rect x="462" y="174" width="8" height="8" fill="#000"/>
  <rect x="478" y="174" width="8" height="8" fill="#000"/>
  <rect x="494" y="174" width="8" height="8" fill="#000"/>
  <!-- ACCEPT label -->
  <rect x="430" y="198" width="90" height="24" rx="4" fill="#000"/>
  <text x="475" y="215" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">ACCEPT QR</text>
  <!-- Instruction text -->
  <text x="475" y="240" text-anchor="middle" fill="#888" font-size="9">Show to Person A</text>
  <!-- Camera notch -->
  <rect x="456" y="85" width="38" height="8" rx="4" fill="#222"/>

  <!-- Right side description -->
  <rect x="580" y="100" width="196" height="200" rx="8" fill="#fff" stroke="#E5E5E5" stroke-width="1"/>
  <text x="678" y="136" text-anchor="middle" fill="#000" font-size="16" font-weight="700">Scan &amp; Accept</text>
  <line x1="602" y1="150" x2="756" y2="150" stroke="#E5E5E5" stroke-width="1"/>
  <text x="602" y="174" fill="#444" font-size="13">Person B scans A's</text>
  <text x="602" y="196" fill="#444" font-size="13">QR with their camera.</text>
  <text x="602" y="224" fill="#444" font-size="13">IRLid opens, creates a</text>
  <text x="602" y="246" fill="#444" font-size="13">signed response bound</text>
  <text x="602" y="268" fill="#444" font-size="13">to A's HELLO, and</text>
  <text x="602" y="290" fill="#444" font-size="13">shows an Accept QR.</text>

  <!-- Decorative dots -->
  <circle cx="36" cy="380" r="3" fill="#DDD"/>
  <circle cx="50" cy="380" r="3" fill="#CCC"/>
  <circle cx="64" cy="380" r="3" fill="#BBB"/>
</svg>
