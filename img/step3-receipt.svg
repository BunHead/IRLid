<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" fill="none">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>text { font-family: Arial, sans-serif; }</style>
  </defs>

  <!-- Step badge -->
  <rect x="20" y="20" width="192" height="32" rx="6" fill="#000"/>
  <text x="116" y="41" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Step 3 — Verify &amp; Receipt</text>

  <!-- A: ACTIVE -->
  <circle cx="80" cy="110" r="32" fill="#000"/>
  <text x="80" y="119" text-anchor="middle" fill="#fff" font-size="26" font-weight="700">A</text>
  <text x="80" y="158" text-anchor="middle" fill="#111" font-size="11" font-weight="700">Person A</text>
  <text x="80" y="173" text-anchor="middle" fill="#555" font-size="10">Initiator · Active</text>

  <!-- Arrow A to phone -->
  <line x1="116" y1="110" x2="168" y2="110" stroke="#888" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)" opacity="0.5"/>

  <!-- Phone A scanning B's accept QR -->
  <rect x="176" y="60" width="120" height="190" rx="12" fill="#111"/>
  <rect x="186" y="76" width="100" height="158" rx="4" fill="#fff"/>
  <rect x="208" y="64" width="36" height="8" rx="4" fill="#555" opacity="0.35"/>
  <!-- Viewfinder -->
  <rect x="192" y="84" width="88" height="76" rx="4" fill="#F5F5F5"/>
  <path d="M197 89 L197 97 M197 89 L205 89" stroke="#22aa66" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M275 89 L275 97 M275 89 L267 89" stroke="#22aa66" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M197 155 L197 147 M197 155 L205 155" stroke="#22aa66" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M275 155 L275 147 M275 155 L267 155" stroke="#22aa66" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- ACCEPT QR being scanned -->
  <rect x="216" y="96" width="10" height="10" rx="1" fill="#666" opacity="0.45"/>
  <rect x="230" y="96" width="10" height="10" rx="1" fill="#666" opacity="0.45"/>
  <rect x="216" y="110" width="10" height="10" rx="1" fill="#666" opacity="0.45"/>
  <text x="236" y="137" text-anchor="middle" fill="#888" font-size="7" font-weight="700">ACCEPT</text>
  <!-- Receipt appearing on screen -->
  <rect x="200" y="170" width="76" height="52" rx="4" fill="#F5F5F5"/>
  <rect x="200" y="170" width="76" height="16" rx="4" fill="#666"/>
  <text x="238" y="182" text-anchor="middle" fill="#fff" font-size="7" font-weight="700">RECEIPT</text>
  <circle cx="238" cy="200" r="10" stroke="#22aa66" stroke-width="1.5" fill="none"/>
  <path d="M232 200 L236 204 L245 195" stroke="#22aa66" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="210" y="215" width="56" height="3" rx="1.5" fill="#E5E5E5"/>

  <!-- Arrow phone to receipt -->
  <line x1="302" y1="145" x2="316" y2="145" stroke="#888" stroke-width="1" marker-end="url(#arr)" opacity="0.4"/>

  <!-- Combined receipt -->
  <rect x="324" y="68" width="116" height="148" rx="8" fill="#fff" stroke="#DDD" stroke-width="0.5"/>
  <rect x="324" y="68" width="116" height="32" rx="8" fill="#111"/>
  <rect x="324" y="86" width="116" height="14" fill="#111"/>
  <text x="382" y="88" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">RECEIPT</text>
  <circle cx="382" cy="122" r="18" stroke="#22aa66" stroke-width="2" fill="none"/>
  <path d="M372 122 L378 128 L392 114" stroke="#22aa66" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="358" cy="152" r="8" fill="#111"/>
  <text x="358" y="156" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">A</text>
  <line x1="368" y1="152" x2="396" y2="152" stroke="#DDD" stroke-width="0.5" stroke-dasharray="2,2"/>
  <circle cx="406" cy="152" r="8" fill="#111"/>
  <text x="406" y="156" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">B</text>
  <rect x="334" y="168" width="96" height="8" rx="4" fill="#22aa66" opacity="0.55"/>
  <rect x="334" y="182" width="96" height="4" rx="2" fill="#E5E5E5"/>
  <rect x="334" y="192" width="96" height="4" rx="2" fill="#E5E5E5"/>

  <!-- Arrow receipt to B -->
  <line x1="442" y1="140" x2="562" y2="120" stroke="#888" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)" opacity="0.3"/>

  <!-- B: COMPLETE -->
  <circle cx="600" cy="110" r="32" fill="#000"/>
  <text x="600" y="119" text-anchor="middle" fill="#fff" font-size="26" font-weight="700">B</text>
  <text x="600" y="158" text-anchor="middle" fill="#111" font-size="11" font-weight="700">Person B</text>
  <text x="600" y="173" text-anchor="middle" fill="#22aa66" font-size="10">Complete ✓</text>

  <!-- Description box -->
  <rect x="454" y="60" width="210" height="198" rx="8" fill="#fff" stroke="#E5E5E5" stroke-width="0.5"/>
  <text x="559" y="88" text-anchor="middle" fill="#000" font-size="13" font-weight="700">Receipt created</text>
  <line x1="472" y1="98" x2="646" y2="98" stroke="#E5E5E5" stroke-width="0.5"/>
  <text x="470" y="118" fill="#555" font-size="11">A scans B's Accept QR. IRLid</text>
  <text x="470" y="134" fill="#555" font-size="11">validates both signatures, GPS</text>
  <text x="470" y="150" fill="#555" font-size="11">proximity, and timestamps.</text>
  <text x="470" y="174" fill="#555" font-size="11">The combined receipt proves:</text>
  <text x="482" y="190" fill="#888" font-size="11">&#x2192;  Both ECDSA sigs valid</text>
  <text x="482" y="206" fill="#888" font-size="11">&#x2192;  Within 90 seconds</text>
  <text x="482" y="222" fill="#888" font-size="11">&#x2192;  Within 12 metres</text>
  <text x="482" y="238" fill="#888" font-size="11">&#x2192;  Verifiable by anyone, forever</text>
</svg>
