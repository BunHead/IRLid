<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" fill="none">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>text { font-family: Arial, sans-serif; }</style>
  </defs>

  <!-- Step badge -->
  <rect x="20" y="20" width="192" height="32" rx="6" fill="#000"/>
  <text x="116" y="41" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Step 3 — Verify &amp; Receipt</text>

  <!-- A: ACTIVE  cx=72 -->
  <circle cx="72" cy="110" r="30" fill="#000"/>
  <text x="72" y="119" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">A</text>
  <text x="72" y="152" text-anchor="middle" fill="#111" font-size="11" font-weight="700">Person A</text>
  <text x="72" y="166" text-anchor="middle" fill="#555" font-size="10">Initiator · Active</text>

  <!-- Arrow A to phone -->
  <line x1="106" y1="110" x2="148" y2="110" stroke="#888" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)" opacity="0.5"/>

  <!-- Phone: x=156 w=100 (slightly narrower to give receipt more room) -->
  <rect x="156" y="60" width="100" height="185" rx="11" fill="#111"/>
  <rect x="164" y="75" width="84" height="154" rx="3" fill="#fff"/>
  <rect x="181" y="64" width="30" height="7" rx="3.5" fill="#555" opacity="0.35"/>
  <!-- Viewfinder scanning ACCEPT -->
  <rect x="170" y="82" width="72" height="68" rx="4" fill="#F5F5F5"/>
  <path d="M175 87 L175 94 M175 87 L182 87" stroke="#22aa66" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M237 87 L237 94 M237 87 L230 87" stroke="#22aa66" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M175 145 L175 138 M175 145 L182 145" stroke="#22aa66" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M237 145 L237 138 M237 145 L230 145" stroke="#22aa66" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- ACCEPT mini QR -->
  <rect x="188" y="94" width="9" height="9" rx="1" fill="#666" opacity="0.4"/>
  <rect x="200" y="94" width="9" height="9" rx="1" fill="#666" opacity="0.4"/>
  <rect x="188" y="106" width="9" height="9" rx="1" fill="#666" opacity="0.4"/>
  <text x="206" y="130" text-anchor="middle" fill="#888" font-size="7" font-weight="700">ACCEPT</text>
  <!-- Receipt on screen -->
  <rect x="168" y="158" width="70" height="54" rx="4" fill="#F5F5F5"/>
  <rect x="168" y="158" width="70" height="15" rx="4" fill="#555"/>
  <text x="203" y="169" text-anchor="middle" fill="#fff" font-size="7" font-weight="700">RECEIPT</text>
  <circle cx="203" cy="193" r="10" stroke="#22aa66" stroke-width="1.5" fill="none"/>
  <path d="M197 193 L201 197 L210 187" stroke="#22aa66" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow phone to receipt -->
  <line x1="260" y1="140" x2="276" y2="140" stroke="#888" stroke-width="1" marker-end="url(#arr)" opacity="0.4"/>

  <!-- Combined receipt: x=284 w=100 -->
  <rect x="284" y="68" width="100" height="144" rx="8" fill="#fff" stroke="#DDD" stroke-width="0.5"/>
  <rect x="284" y="68" width="100" height="30" rx="8" fill="#111"/>
  <rect x="284" y="84" width="100" height="14" fill="#111"/>
  <text x="334" y="88" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">RECEIPT</text>
  <circle cx="334" cy="120" r="16" stroke="#22aa66" stroke-width="2" fill="none"/>
  <path d="M325 120 L330 126 L343 113" stroke="#22aa66" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- A+B dots -->
  <circle cx="310" cy="150" r="7" fill="#111"/>
  <text x="310" y="154" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">A</text>
  <line x1="319" y1="150" x2="349" y2="150" stroke="#DDD" stroke-width="0.5" stroke-dasharray="2,2"/>
  <circle cx="358" cy="150" r="7" fill="#111"/>
  <text x="358" y="154" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">B</text>
  <!-- Verified bar -->
  <rect x="294" y="165" width="80" height="7" rx="3.5" fill="#22aa66" opacity="0.55"/>
  <rect x="294" y="178" width="80" height="4" rx="2" fill="#E5E5E5"/>
  <rect x="294" y="188" width="80" height="4" rx="2" fill="#E5E5E5"/>

  <!-- Description box: x=396 w=222 -->
  <rect x="396" y="60" width="222" height="185" rx="8" fill="#fff" stroke="#E5E5E5" stroke-width="0.5"/>
  <text x="507" y="88" text-anchor="middle" fill="#000" font-size="13" font-weight="700">Receipt created</text>
  <line x1="414" y1="97" x2="600" y2="97" stroke="#E5E5E5" stroke-width="0.5"/>
  <text x="412" y="116" fill="#555" font-size="11">A scans B's Accept QR. IRLid</text>
  <text x="412" y="132" fill="#555" font-size="11">validates both signatures, GPS</text>
  <text x="412" y="148" fill="#555" font-size="11">proximity, and timestamps.</text>
  <text x="412" y="172" fill="#555" font-size="11">The combined receipt proves:</text>
  <text x="424" y="188" fill="#888" font-size="11">&#x2192;  Both ECDSA sigs valid</text>
  <text x="424" y="204" fill="#888" font-size="11">&#x2192;  Within 90 seconds</text>
  <text x="424" y="220" fill="#888" font-size="11">&#x2192;  Within 12 metres</text>

  <!-- B: COMPLETE  cx=638 — safely right of desc box ending at 618 -->
  <circle cx="638" cy="110" r="30" fill="#000"/>
  <text x="638" y="119" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">B</text>
  <text x="638" y="152" text-anchor="middle" fill="#111" font-size="11" font-weight="700">Person B</text>
  <text x="638" y="166" text-anchor="middle" fill="#22aa66" font-size="10">Complete ✓</text>
</svg>
