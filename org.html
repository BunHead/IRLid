<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRLid — Org Portal (lowercase redirect)</title>
  <meta name="robots" content="noindex,nofollow">
  <meta http-equiv="refresh" content="0; url=Org.html">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: #0d1117; color: #e6edf3; display: grid; place-items: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
    .moved-card { max-width: 460px; padding: 28px 32px; background: #161b22; border: 1px solid #30363d; border-radius: 12px; box-shadow: 0 18px 42px rgba(0,0,0,0.4); }
    .moved-card h1 { font-size: 18px; margin: 0 0 12px; color: #f0f6fc; }
    .moved-card p { font-size: 14px; line-height: 1.5; margin: 0 0 14px; color: #8b949e; }
    .moved-card a { color: #58a6ff; text-decoration: underline; font-weight: 600; }
    .moved-card .small { font-size: 11px; color: #6e7681; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="moved-card">
    <h1>Org Portal lives at /Org.html</h1>
    <p>Redirecting to <a id="destLink" href="Org.html">Org.html</a> in a moment.</p>
    <p class="small">If the redirect doesn't fire, click the link above. The canonical URL uses capital "Org".</p>
  </div>
  <script>
    (function () {
      var dest = 'Org.html' + (location.search || '') + (location.hash || '');
      var link = document.getElementById('destLink');
      if (link) link.href = dest;
      location.replace(dest);
    })();
  </script>
</body>
</html>
