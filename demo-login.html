<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | ExampleForum</title>
  <style>
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #f4f7f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .login-card {
      background: white;
      padding: 36px 40px;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.09);
      width: 100%;
      max-width: 420px;
    }
    .forum-logo {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    .forum-tagline {
      font-size: 13px;
      color: #999;
      margin-bottom: 28px;
    }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #555;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      outline: none;
      border-color: #1a1a1a;
    }

    /* ── CAPTCHA-style IRLid widget ── */
    .irlid-captcha {
      margin: 22px 0;
      border: 1px solid #d3d3d3;
      border-radius: 4px;
      background: #f9f9f9;
      overflow: hidden;
    }

    /* Collapsed row — looks like reCAPTCHA checkbox */
    .irlid-collapsed {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
    }
    .irlid-collapsed:hover { background: #f0f0f0; }
    .irlid-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .irlid-checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid #c1c1c1;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: white;
      transition: all 0.2s;
    }
    .irlid-checkbox.checked {
      background: #1a1a1a;
      border-color: #1a1a1a;
    }
    .irlid-checkbox.checked::after {
      content: "✓";
      color: white;
      font-size: 14px;
      font-weight: 700;
    }
    .irlid-label {
      font-size: 14px;
      color: #1a1a1a;
      font-weight: 500;
    }
    .irlid-branding {
      text-align: right;
      font-size: 10px;
      color: #aaa;
      line-height: 1.4;
    }
    .irlid-branding strong {
      display: block;
      font-size: 11px;
      color: #555;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    /* Expanded verification panel */
    .irlid-panel {
      border-top: 1px solid #e0e0e0;
      background: white;
      padding: 14px 16px 12px;
      display: none;
    }
    .irlid-panel p {
      font-size: 12px;
      color: #777;
      margin: 0 0 10px;
      line-height: 1.5;
    }
    iframe {
      width: 100%;
      height: 125px;
      border: none;
      display: block;
    }

    /* Sign In button */
    #signInBtn {
      width: 100%;
      padding: 13px;
      background-color: #1a1a1a;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: not-allowed;
      opacity: 0.35;
      transition: all 0.25s;
    }
    #signInBtn.active {
      cursor: pointer;
      opacity: 1;
    }
    #signInBtn.active:hover { background-color: #333; }

    .require-note {
      font-size: 11px;
      color: #bbb;
      text-align: center;
      margin-top: 10px;
    }
    .require-note.verified {
      color: #2d7a3a;
      font-weight: 500;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="forum-logo">ExampleForum</div>
  <div class="forum-tagline">A community of verified humans.</div>

  <div class="form-group">
    <label>Username</label>
    <input type="text" placeholder="Enter your username">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" placeholder="••••••••">
  </div>

  <!-- IRLid CAPTCHA widget -->
  <div class="irlid-captcha">

    <!-- Collapsed row (click to expand) -->
    <div class="irlid-collapsed" id="irlidToggle" onclick="togglePanel()">
      <div class="irlid-left">
        <div class="irlid-checkbox" id="irlidCheck"></div>
        <span class="irlid-label">I've met a real person in real life</span>
      </div>
      <div class="irlid-branding">
        <strong>IRLid</strong>
        irlid.co.uk
      </div>
    </div>

    <!-- Expanded panel with widget iframe -->
    <div class="irlid-panel" id="irlidPanel">
      <p>
        Paste your IRLid receipt hash to confirm you've physically met another person.
        No receipt yet? <a href="https://irlid.co.uk" target="_blank" style="color:#555;">Get one at irlid.co.uk</a>
      </p>
      <iframe
        src="widget.html"
        id="irlid-widget"
        title="IRLid receipt verification"
        allow="camera"
      ></iframe>
    </div>

  </div>

  <button id="signInBtn" disabled>Sign In</button>
  <div class="require-note" id="requireNote">IRLid verification required to sign in</div>
</div>

<script>
  var panelOpen = false;
  var verified = false;

  function togglePanel() {
    if (verified) return; // already done, don't collapse
    panelOpen = !panelOpen;
    document.getElementById("irlidPanel").style.display = panelOpen ? "block" : "none";
  }

  window.addEventListener("message", function(event) {
    // Production: restrict to event.origin === "https://irlid.co.uk"
    if (!event.data || event.data.type !== "irlid-verified") return;

    verified = true;
    panelOpen = false;

    // Tick the checkbox
    var box = document.getElementById("irlidCheck");
    box.classList.add("checked");

    // Collapse the panel
    document.getElementById("irlidPanel").style.display = "none";

    // Update label
    document.querySelector(".irlid-label").textContent = "Verified — you've met a real person ✓";
    document.querySelector(".irlid-label").style.color = "#2d7a3a";

    // Unlock sign in
    var btn = document.getElementById("signInBtn");
    btn.disabled = false;
    btn.classList.add("active");

    var note = document.getElementById("requireNote");
    note.textContent = "✓ IRLid verified — you're good to go";
    note.classList.add("verified");
  });

  document.getElementById("signInBtn").addEventListener("click", function() {
    if (!this.disabled) {
      alert("Signed in successfully. Welcome to ExampleForum!");
    }
  });
</script>

</body>
</html>
