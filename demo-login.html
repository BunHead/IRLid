<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | ExampleForum</title>
  <style>
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #f4f7f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .login-card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 420px;
    }
    .forum-logo {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 6px;
    }
    .forum-tagline {
      font-size: 13px;
      color: #999;
      margin-bottom: 28px;
    }
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #555;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      outline: none;
      border-color: #1a1a1a;
    }
    .irlid-section {
      margin: 24px 0;
      padding: 16px;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      background-color: #fafafa;
    }
    .irlid-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .irlid-badge {
      background: #1a1a1a;
      color: white;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 11px;
      letter-spacing: 0.03em;
    }
    .irlid-title {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
    }
    .irlid-text {
      font-size: 12px;
      color: #777;
      margin: 0 0 12px 0;
      line-height: 1.5;
    }
    iframe {
      width: 100%;
      height: 130px;
      border: none;
      display: block;
    }
    #signInBtn {
      width: 100%;
      padding: 13px;
      background-color: #1a1a1a;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: not-allowed;
      opacity: 0.4;
      transition: all 0.25s;
      letter-spacing: 0.01em;
    }
    #signInBtn.active {
      cursor: pointer;
      opacity: 1;
    }
    #signInBtn.active:hover {
      background-color: #333;
    }
    .verified-notice {
      font-size: 12px;
      color: #155724;
      text-align: center;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="forum-logo">ExampleForum</div>
  <div class="forum-tagline">A community of verified humans.</div>

  <div class="form-group">
    <label>Username</label>
    <input type="text" placeholder="Enter your username">
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" placeholder="••••••••">
  </div>

  <div class="irlid-section">
    <div class="irlid-header">
      <span class="irlid-badge">IRLid</span>
      <span class="irlid-title">Prove you're human</span>
    </div>
    <p class="irlid-text">
      Paste your IRLid receipt hash below to confirm you've physically met another real person.
      Don't have one? <a href="https://irlid.co.uk" target="_blank" style="color:#555;">Get started at irlid.co.uk</a>
    </p>
    <iframe
      src="widget.html"
      id="irlid-widget"
      title="IRLid receipt verification"
      allow="camera"
    ></iframe>
  </div>

  <button id="signInBtn" disabled>Sign In</button>
  <div class="verified-notice" id="verifiedNotice">✓ IRLid verified — you're good to go</div>
</div>

<script>
  window.addEventListener("message", function(event) {
    // In production: restrict to event.origin === "https://irlid.co.uk"
    if (!event.data || event.data.type !== "irlid-verified") return;

    const btn = document.getElementById("signInBtn");
    const notice = document.getElementById("verifiedNotice");
    btn.disabled = false;
    btn.classList.add("active");
    notice.style.display = "block";
  });

  document.getElementById("signInBtn").addEventListener("click", function() {
    if (!this.disabled) {
      alert("Signed in successfully. Welcome to ExampleForum!");
    }
  });
</script>

</body>
</html>
