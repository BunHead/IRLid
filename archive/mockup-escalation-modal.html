<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>IRLid escalation modal — mockup</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #05070c;
    color: #e6edf3;
    font: 15px/1.5 -apple-system, "Segoe UI", system-ui, sans-serif;
    min-height: 100vh;
    padding: 16px;
  }
  .frame {
    max-width: 480px;
    margin: 0 auto;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 12px;
    overflow: hidden;
  }
  .head {
    padding: 16px 18px 14px;
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .head h3 { font-size: 18px; font-weight: 700; margin: 0 0 4px; color: #f0f6fc; }
  .head p { font-size: 13px; color: #8b949e; margin: 0; }
  .head code { font-size: 12px; padding: 2px 6px; background: #161b22; border-radius: 4px; }
  .close { width: 40px; height: 40px; padding: 0; font-size: 22px; line-height: 1; background: transparent; border: 1px solid #30363d; color: #8b949e; border-radius: 8px; }
  .section { padding: 14px 16px; }
  .section + .section { border-top: 1px solid #30363d; }
  .section h4 { font-size: 15px; font-weight: 600; margin: 0 0 4px; color: #f0f6fc; }
  .section p { font-size: 13px; color: #8b949e; margin: 0 0 10px; }
  .search {
    width: 100%; padding: 12px 14px; font-size: 15px; min-height: 44px;
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    color: #e6edf3; margin-bottom: 12px;
  }
  .list { display: grid; gap: 8px; }
  .row {
    width: 100%; text-align: left;
    padding: 14px 16px; min-height: 64px;
    background: #161b22; border: 1px solid #30363d; border-radius: 7px;
    color: #e6edf3; cursor: pointer;
    display: flex; justify-content: space-between; gap: 14px; align-items: center;
  }
  .row:hover { border-color: rgba(255,149,0,0.52); }
  .row strong { display: block; font-size: 17px; font-weight: 700; line-height: 1.25; }
  .row span.meta { display: block; font-size: 13px; color: #8b949e; margin-top: 6px; line-height: 1.35; }
  .row .action { font-size: 13px; color: #58a6ff; font-weight: 600; flex-shrink: 0; }
  .row.claimed { background: rgba(13,17,23,0.32); border-style: dashed; }
  .row.claimed strong { opacity: 0.85; }
  .row.claimed span.meta { font-style: italic; }
  .row.claimed .action { color: #8b949e; font-weight: 400; }
  .role-chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0 14px; }
  .role-chip {
    padding: 10px 14px; font-size: 14px; min-height: 40px;
    background: transparent; border: 1px solid #30363d; border-radius: 8px;
    color: #e6edf3; cursor: pointer;
  }
  .role-chip.active { background: rgba(255,149,0,0.16); border: 2px solid #ff9500; color: #ff9500; padding: 9px 13px; font-weight: 700; }
  .fields { display: grid; gap: 12px; margin-bottom: 14px; }
  .fields label { display: block; font-size: 13px; color: #8b949e; }
  .fields input {
    width: 100%; margin-top: 4px;
    padding: 12px 14px; font-size: 15px; min-height: 44px;
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    color: #e6edf3;
  }
  .submit {
    width: 100%; min-height: 48px; font-size: 15px; font-weight: 600;
    background: #238636; border: 1px solid #2ea043; border-radius: 8px;
    color: #fff; cursor: pointer;
  }
  .note { font-size: 12px; color: #6e7681; margin: 20px auto; text-align: center; max-width: 480px; }
</style>
</head>
<body>
<div class="frame" role="dialog" aria-labelledby="modal-title">
  <div class="head">
    <div>
      <h3 id="modal-title">Unrecognised device</h3>
      <p>Device <code>6vWr4o…</code> wants to check in.</p>
    </div>
    <button class="close" aria-label="Close" type="button">×</button>
  </div>

  <div class="section">
    <h4>Choose from list</h4>
    <p>Bind this device to an existing unclaimed Expected entry.</p>
    <input class="search" type="text" placeholder="Search expected attendees" aria-label="Search expected attendees" />
    <div class="list">
      <button class="row" type="button">
        <span><strong>Kerry Austin</strong><span class="meta">Staff · unclaimed</span></span>
        <span class="action">Bind</span>
      </button>
      <button class="row claimed" type="button">
        <span><strong>Spencer Austin</strong><span class="meta">Lead admin · already bound to 65u-S-W…</span></span>
        <span class="action">Bound</span>
      </button>
      <button class="row" type="button">
        <span><strong>Becky Williams</strong><span class="meta">Attendee · unclaimed</span></span>
        <span class="action">Bind</span>
      </button>
      <button class="row" type="button">
        <span><strong>Wisdom Aidenogie</strong><span class="meta">Manager · unclaimed</span></span>
        <span class="action">Bind</span>
      </button>
    </div>
  </div>

  <div class="section">
    <h4>Add at the door</h4>
    <p>Create a new entry with this device already bound.</p>
    <div class="role-chips">
      <button class="role-chip active" type="button">Attendee</button>
      <button class="role-chip" type="button">Staff</button>
      <button class="role-chip" type="button">Manager</button>
      <button class="role-chip" type="button">Lead admin</button>
    </div>
    <div class="fields">
      <label>First name<input type="text" placeholder="e.g. Maya" /></label>
      <label>Surname<input type="text" placeholder="e.g. Rodriguez" /></label>
    </div>
    <button class="submit" type="button">Add attendee</button>
  </div>
</div>
<p class="note">Mockup of the doorman escalation modal. v5.9.0.13.21 — IRLid.</p>
</body>
</html>
